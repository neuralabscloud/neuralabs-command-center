<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Center — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: hsl(0 0% 0%);
  --border: hsl(217 32% 20%);
  --primary: hsl(264 65% 49%);
  --primary-glow: hsla(264 65% 65% / 0.4);
  --danger: hsl(0 72% 51%);
  --text: hsl(210 40% 98%);
  --text-dim: hsl(215 20% 65%);
  --font-display: 'Akira Expanded', 'Orbitron', sans-serif;
  --font-data: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-data); background: var(--bg-deep); color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 40%, hsla(264 65% 49% / 0.04) 0%, transparent 70%);
  pointer-events: none;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: linear-gradient(hsla(217 32% 20% / 0.15) 1px, transparent 1px), linear-gradient(90deg, hsla(217 32% 20% / 0.15) 1px, transparent 1px);
  background-size: 60px 60px; opacity: 0.04; pointer-events: none;
}
.login-box {
  position: relative; z-index: 1; width: 380px;
  background: linear-gradient(180deg, hsla(0 0% 6% / 1) 0%, hsla(0 0% 3% / 1) 100%);
  border: 1px solid var(--border); border-radius: 16px; padding: 40px 32px;
}
.login-logo {
  font-family: var(--font-display); font-size: 24px; font-weight: 900;
  text-align: center; margin-bottom: 6px; letter-spacing: 0.15em;
  background: linear-gradient(135deg, var(--primary), hsl(264 65% 65%));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.login-sub {
  font-size: 11px; color: var(--text-dim); text-align: center;
  margin-bottom: 32px; letter-spacing: 0.06em; text-transform: uppercase;
}
.login-label {
  font-size: 10px; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 0.08em; margin-bottom: 6px; display: block;
}
.login-input {
  width: 100%; background: hsl(0 0% 5%); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); padding: 12px 16px; font-size: 14px;
  font-family: var(--font-data); outline: none; transition: border-color 0.2s;
  margin-bottom: 20px;
}
.login-input:focus { border-color: var(--primary); }
.login-input::placeholder { color: hsla(215 20% 65% / 0.5); }
.login-btn {
  width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer;
  font-family: var(--font-data); font-size: 13px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  background: linear-gradient(135deg, var(--primary), hsl(264 65% 65%));
  color: white; transition: all 0.2s;
}
.login-btn:hover { box-shadow: 0 0 30px var(--primary-glow); transform: translateY(-1px); }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.login-error {
  font-size: 11px; color: var(--danger); text-align: center;
  margin-top: 12px; min-height: 16px; font-family: var(--font-data);
}
@keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.login-box { animation: fade-in 0.5s ease-out; }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo" id="login-logo">COMMAND</div>
  <div class="login-sub" id="login-sub">Command Center</div>
  <label class="login-label">Password</label>
  <input class="login-input" id="pw" type="password" placeholder="Enter password..." autofocus
    onkeydown="if(event.key==='Enter')doLogin()">
  <button class="login-btn" id="btn" onclick="doLogin()">Authenticate</button>
  <div class="login-error" id="err"></div>
</div>
<script>
async function doLogin() {
  const pw = document.getElementById('pw').value;
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  if (!pw) { err.textContent = 'Enter a password'; return; }
  btn.disabled = true;
  err.textContent = '';
  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ password: pw }),
    });
    if (res.ok) {
      window.location.href = '/index.html';
    } else {
      err.textContent = 'Incorrect password';
      document.getElementById('pw').select();
    }
  } catch (e) {
    err.textContent = 'Connection error';
  }
  btn.disabled = false;
}
// Dynamic logo from brand config
fetch('/brand').then(r => r.ok ? r.json() : null).then(b => {
  if (b && b.company_name) {
    const logo = document.getElementById('login-logo');
    if (logo) logo.textContent = String(b.company_name).toUpperCase();
  }
}).catch(() => {});
</script>
</body>
</html>
