<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>try{var t=localStorage.getItem("cc_theme");if(t==="light")document.documentElement.setAttribute("data-theme","light");}catch(e){}</script>
<link rel="stylesheet" href="/theme.css">
<script src="/brand-loader.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Audit</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: hsl(0 0% 0%);
  --bg-base: hsl(0 0% 3%);
  --bg-surface: hsl(0 0% 5%);
  --bg-card: hsl(0 0% 5%);
  --bg-card-hover: hsl(0 0% 8%);
  --bg-sidebar: hsl(0 0% 2%);
  --border: hsl(217 32% 20%);
  --border-glow: hsla(264 65% 49% / 0.3);
  --primary: hsl(264 65% 49%);
  --primary-glow: hsla(264 65% 65% / 0.4);
  --success: hsl(142 76% 36%);
  --danger: hsl(0 72% 51%);
  --warning: hsl(45 93% 55%);
  --text: hsl(210 40% 98%);
  --text-dim: hsl(215 20% 65%);
  --text-muted: hsl(217 32% 17%);
  --font-display: 'Akira Expanded', 'Orbitron', sans-serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --radius: 10px;
  --sidebar-w: 62px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: var(--font-body); background: var(--bg-deep); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, hsla(264 65% 49% / 0.02) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, hsla(264 65% 49% / 0.02) 0%, transparent 60%);
  pointer-events: none;
}
body::after {
  content: ''; position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(var(--text-muted) 1px, transparent 1px),
    linear-gradient(90deg, var(--text-muted) 1px, transparent 1px);
  background-size: 60px 60px; opacity: 0.04; pointer-events: none;
}
.layout { display: flex; min-height: 100vh; position: relative; z-index: 1; }
.sidebar {
  width: var(--sidebar-w); min-height: 100vh; background: var(--bg-sidebar);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  align-items: center; padding: 16px 0; position: fixed; left: 0; top: 0; bottom: 0; z-index: 100;
}
.sidebar-logo {
  font-family: var(--font-display); font-size: 10px; font-weight: 900;
  color: var(--primary); letter-spacing: 0.2em; margin-bottom: 28px;
  text-shadow: 0 0 20px var(--primary-glow);
}
.sidebar-nav { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.nav-item {
  width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
  border-radius: 8px; color: var(--text-dim); cursor: pointer; transition: all 0.2s;
  position: relative; border: 1px solid transparent; text-decoration: none;
}
.nav-item:hover { color: var(--primary); background: hsla(264 65% 49% / 0.03); }
.nav-item.active {
  color: var(--primary); background: hsla(264 65% 49% / 0.06);
  border-color: var(--border-glow); box-shadow: 0 0 16px hsla(264 65% 49% / 0.06);
}
.nav-item .tooltip {
  position: absolute; left: 52px; top: 50%; transform: translateY(-50%);
  background: var(--bg-card); border: 1px solid var(--border); padding: 4px 10px;
  border-radius: 6px; font-size: 11px; color: var(--text);
  white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.15s;
}
.nav-item:hover .tooltip { opacity: 1; }
.nav-item svg { width: 18px; height: 18px; }
.main { flex: 1; margin-left: var(--sidebar-w); padding: 32px 40px 80px; max-width: 1500px; }

.header { display: flex; align-items: flex-end; gap: 24px; margin-bottom: 28px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
.header-title { font-family: var(--font-display); font-size: 22px; font-weight: 900; letter-spacing: 0.16em; color: var(--text); text-transform: uppercase; }
.header-sub { font-size: 12px; color: var(--text-dim); margin-top: 6px; letter-spacing: 0.04em; }

/* Input panel */
.input-panel {
  background: linear-gradient(180deg, hsl(0 0% 6%) 0%, hsl(0 0% 4%) 100%);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px 24px; margin-bottom: 24px; display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap;
}
.input-panel .field { display: flex; flex-direction: column; gap: 6px; }
.input-panel label { font-size: 10px; letter-spacing: 0.18em; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }
.input-panel input, .input-panel select {
  background: hsl(0 0% 3%); color: var(--text); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; font-family: var(--font-body); font-size: 14px;
  min-width: 220px; outline: none; transition: border-color 0.2s;
}
.input-panel input:focus { border-color: var(--primary); }
.input-panel input[name="url"] { min-width: 380px; }
.input-panel input[name="max_pages"] { width: 90px; min-width: 90px; }
.btn {
  background: var(--primary); color: white; border: none; border-radius: 8px;
  padding: 11px 22px; font-family: var(--font-body); font-size: 13px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
  transition: all 0.2s; box-shadow: 0 0 14px var(--primary-glow);
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 4px 22px var(--primary-glow); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); box-shadow: none; }
.btn-ghost:hover { color: var(--text); border-color: var(--primary); }

/* Status banner */
.status-banner {
  background: linear-gradient(90deg, hsla(264 65% 49% / 0.12) 0%, transparent 100%);
  border: 1px solid hsla(264 65% 49% / 0.35); border-radius: var(--radius);
  padding: 14px 18px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px;
  font-size: 13px; color: var(--text);
}
.status-banner.failed { background: linear-gradient(90deg, hsla(0 72% 51% / 0.12) 0%, transparent 100%); border-color: hsla(0 72% 51% / 0.4); }
.status-banner .spinner {
  width: 14px; height: 14px; border: 2px solid hsla(264 65% 49% / 0.3);
  border-top-color: var(--primary); border-radius: 50%; animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Result grid */
.result-grid {
  display: grid; grid-template-columns: 360px 1fr; gap: 20px; margin-bottom: 24px;
}
@media (max-width: 1100px) { .result-grid { grid-template-columns: 1fr; } }

.seo-card {
  background: linear-gradient(180deg, hsl(0 0% 5%) 0%, hsl(0 0% 3%) 100%);
  border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 24px;
  position: relative;
}
.seo-card .card-title {
  font-family: var(--font-display); font-size: 11px; letter-spacing: 0.22em;
  color: var(--text-dim); text-transform: uppercase; margin-bottom: 14px; font-weight: 700;
}
.seo-card .card-title b { color: var(--primary); }

/* Score gauge */
.score-card { text-align: center; padding: 32px 24px; }
.score-circle {
  width: 180px; height: 180px; margin: 0 auto 18px; position: relative;
}
.score-circle svg { transform: rotate(-90deg); }
.score-circle .track { stroke: hsl(0 0% 10%); }
.score-circle .fill { transition: stroke-dashoffset 0.8s ease-out; }
.score-circle .num {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.score-circle .num-val { font-family: var(--font-display); font-size: 48px; font-weight: 900; }
.score-circle .num-out { font-size: 11px; color: var(--text-dim); letter-spacing: 0.18em; margin-top: 2px; }
.score-summary { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
.sev-pill {
  font-size: 11px; padding: 5px 11px; border-radius: 999px; font-weight: 700;
  letter-spacing: 0.06em; display: inline-flex; align-items: center; gap: 6px;
}
.sev-pill.critical { background: hsla(0 72% 51% / 0.15); color: var(--danger); border: 1px solid hsla(0 72% 51% / 0.4); }
.sev-pill.warning  { background: hsla(45 93% 55% / 0.15); color: var(--warning); border: 1px solid hsla(45 93% 55% / 0.4); }
.sev-pill.info     { background: hsla(264 65% 49% / 0.15); color: var(--primary); border: 1px solid hsla(264 65% 49% / 0.4); }

/* Strategic review markdown */
.strategic-body { font-size: 14px; line-height: 1.7; color: var(--text); }
.strategic-body h1, .strategic-body h2, .strategic-body h3 {
  font-family: var(--font-display); margin: 18px 0 10px; letter-spacing: 0.04em;
  text-transform: uppercase; font-size: 13px; color: var(--text);
}
.strategic-body p { margin: 10px 0; }
.strategic-body strong { color: var(--text); }
.strategic-body ul, .strategic-body ol { padding-left: 22px; margin: 10px 0; }
.strategic-body li { margin: 6px 0; }
.strategic-body code { background: hsl(0 0% 8%); padding: 2px 6px; border-radius: 4px; font-size: 12px; }

/* PSI cards */
.psi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 700px) { .psi-grid { grid-template-columns: 1fr; } }
.psi-block { background: hsl(0 0% 4%); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.psi-strategy { font-family: var(--font-display); font-size: 11px; letter-spacing: 0.2em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; }
.psi-scores { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
.psi-score { text-align: center; }
.psi-score .v { font-family: var(--font-display); font-size: 24px; font-weight: 900; }
.psi-score .l { font-size: 9px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px; }
.psi-cwv { display: flex; flex-wrap: wrap; gap: 10px 18px; font-size: 12px; color: var(--text-dim); padding-top: 10px; border-top: 1px solid var(--border); }
.psi-cwv b { color: var(--text); font-weight: 600; }

/* Category cards */
.category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 18px; }
.cat-card .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.cat-card .cat-header b { font-family: var(--font-display); font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; }
.cat-card .cat-counts { display: flex; gap: 6px; }
.cat-card .cat-counts .dot { width: 8px; height: 8px; border-radius: 50%; }
.cat-card .cat-counts .dot.critical { background: var(--danger); }
.cat-card .cat-counts .dot.warning  { background: var(--warning); }
.cat-card .cat-counts .dot.info     { background: var(--primary); }
.finding { border-left: 3px solid var(--text-muted); padding: 10px 0 10px 14px; margin: 10px 0; }
.finding.critical { border-color: var(--danger); }
.finding.warning  { border-color: var(--warning); }
.finding.info     { border-color: var(--primary); }
.finding .ftitle { font-weight: 600; font-size: 13px; color: var(--text); margin-bottom: 4px; }
.finding .fdetail { font-size: 12px; color: var(--text-dim); line-height: 1.55; }
.finding .faffected {
  margin-top: 8px; padding: 8px 10px; background: hsl(0 0% 3%); border-radius: 6px;
  font-size: 11px; color: var(--text-dim); font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  max-height: 110px; overflow-y: auto; white-space: pre-wrap; word-break: break-all;
}
.cat-empty { font-size: 12px; color: var(--text-dim); padding: 10px 0; font-style: italic; }

/* Pages table */
.pages-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.pages-table th { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--border); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); font-weight: 600; }
.pages-table td { padding: 9px 8px; border-bottom: 1px solid hsla(217 32% 20% / 0.5); color: var(--text-dim); }
.pages-table td.url { color: var(--text); max-width: 360px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pages-table tr.bad td { color: var(--danger); }

/* History */
.history-row { display: flex; gap: 10px; align-items: center; margin-top: 14px; flex-wrap: wrap; }
.history-row .label { font-size: 10px; letter-spacing: 0.18em; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }
.history-row select { background: hsl(0 0% 3%); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; font-size: 12px; min-width: 280px; }

.empty-state { text-align: center; padding: 80px 24px; color: var(--text-dim); }
.empty-state .icon { font-size: 40px; margin-bottom: 14px; opacity: 0.4; }
.empty-state .ttl { font-family: var(--font-display); font-size: 14px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text); margin-bottom: 8px; }
.empty-state .sub { font-size: 13px; max-width: 460px; margin: 0 auto; line-height: 1.6; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar"></aside>

  <main class="main">
    <div class="header">
      <div style="flex:1">
        <div class="header-title">SEO Audit</div>
        <div class="header-sub">Crawl a site, surface technical & on-page issues, get strategic recommendations.</div>
      </div>
    </div>

    <!-- INPUT -->
    <div class="input-panel">
      <div class="field">
        <label>Website URL</label>
        <input type="url" name="url" placeholder="https://example.com" id="seo-url">
      </div>
      <div class="field">
        <label>Max pages</label>
        <input type="number" name="max_pages" id="seo-max" value="25" min="1" max="100">
      </div>
      <button class="btn" id="seo-go">Analyze</button>
      <div class="history-row" style="margin-left:auto;">
        <span class="label">History</span>
        <select id="seo-history"><option value="">— select previous report —</option></select>
        <button class="btn btn-ghost" id="seo-delete" title="Delete selected report">Delete</button>
      </div>
    </div>

    <!-- STATUS -->
    <div id="seo-status" style="display:none;"></div>

    <!-- RESULTS -->
    <div id="seo-results"></div>

    <!-- EMPTY STATE -->
    <div class="empty-state" id="seo-empty">
      <div class="icon">⌕</div>
      <div class="ttl">No report yet</div>
      <div class="sub">Enter a website URL above and click Analyze. The audit will crawl up to ~25 pages, run on-page and technical SEO checks, and (if PSI_API_KEY is set) include Core Web Vitals.</div>
    </div>
  </main>
</div>

<script src="/sidebar.js"></script>
<script src="/notif-panel.js"></script>
<script>
let currentTaskId = null;
let pollTimer = null;

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => [...document.querySelectorAll(sel)];

function fmtTime(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleString();
}

function scoreColor(score) {
  if (score >= 80) return "hsl(142 76% 50%)";
  if (score >= 60) return "hsl(45 93% 55%)";
  if (score >= 40) return "hsl(20 90% 55%)";
  return "hsl(0 72% 51%)";
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

// Minimal markdown for strategic review (headings, bold, lists, paragraphs)
function renderMarkdown(md) {
  if (!md) return "";
  let html = escapeHtml(md);
  html = html.replace(/^### (.*)$/gm, "<h3>$1</h3>");
  html = html.replace(/^## (.*)$/gm, "<h2>$1</h2>");
  html = html.replace(/^# (.*)$/gm, "<h1>$1</h1>");
  html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
  // Lists
  html = html.replace(/(^|\n)((?:[-*]\s+.*(?:\n|$))+)/g, (m, pre, block) => {
    const items = block.trim().split(/\n/).map(l => l.replace(/^[-*]\s+/, "")).map(l => `<li>${l}</li>`).join("");
    return pre + "<ul>" + items + "</ul>";
  });
  html = html.replace(/(^|\n)((?:\d+\.\s+.*(?:\n|$))+)/g, (m, pre, block) => {
    const items = block.trim().split(/\n/).map(l => l.replace(/^\d+\.\s+/, "")).map(l => `<li>${l}</li>`).join("");
    return pre + "<ol>" + items + "</ol>";
  });
  // Paragraphs
  html = html.split(/\n{2,}/).map(p => {
    if (/^<(h\d|ul|ol|pre)/.test(p.trim())) return p;
    return "<p>" + p.replace(/\n/g, "<br>") + "</p>";
  }).join("\n");
  return html;
}

const CATEGORIES = [
  { key: "technical",      label: "Technical SEO" },
  { key: "onPage",         label: "On-Page" },
  { key: "content",        label: "Content & Images" },
  { key: "structuredData", label: "Structured Data" },
  { key: "mobile",         label: "Mobile" },
  { key: "links",          label: "Internal Linking" },
  { key: "international",  label: "International / hreflang" },
];

function renderResults(report) {
  $("#seo-empty").style.display = "none";
  const score = report.score ?? 0;
  const color = scoreColor(score);
  const counts = report.counts || { critical: 0, warning: 0, info: 0 };
  const r = 78, circ = 2 * Math.PI * r;
  const dash = circ * (1 - score / 100);

  const psiHtml = report.psi ? renderPsi(report.psi) : "";

  const catHtml = CATEGORIES.map(cat => {
    const items = (report.findings && report.findings[cat.key]) || [];
    const c = items.filter(f => f.severity === "critical").length;
    const w = items.filter(f => f.severity === "warning").length;
    const i = items.filter(f => f.severity === "info").length;
    const findingsHtml = items.length
      ? items.map(f => `
          <div class="finding ${f.severity}">
            <div class="ftitle">${escapeHtml(f.title)}</div>
            <div class="fdetail">${escapeHtml(f.detail || "")}</div>
            ${f.affected && f.affected.length ? `<div class="faffected">${f.affected.map(escapeHtml).join("\n")}</div>` : ""}
          </div>`).join("")
      : `<div class="cat-empty">No issues found in this category. ✓</div>`;
    return `
      <div class="seo-card cat-card">
        <div class="cat-header">
          <b>${cat.label}</b>
          <div class="cat-counts" title="${c} critical, ${w} warning, ${i} info">
            ${c ? `<span class="dot critical" title="${c} critical"></span>` : ""}
            ${w ? `<span class="dot warning" title="${w} warning"></span>` : ""}
            ${i ? `<span class="dot info" title="${i} info"></span>` : ""}
          </div>
        </div>
        ${findingsHtml}
      </div>`;
  }).join("");

  const pagesHtml = report.pages && report.pages.length ? `
    <div class="seo-card">
      <div class="card-title">Crawled <b>${report.pages.length}</b> page${report.pages.length === 1 ? "" : "s"} · method: ${report.crawlMethod || "—"}</div>
      <table class="pages-table">
        <thead><tr><th>URL</th><th>Status</th><th>Title (len)</th><th>Meta (len)</th><th>H1</th><th>Words</th></tr></thead>
        <tbody>
          ${report.pages.map(p => `
            <tr class="${p.status >= 400 || p.status === 0 ? 'bad' : ''}">
              <td class="url" title="${escapeHtml(p.url)}">${escapeHtml(p.url)}</td>
              <td>${p.status || "—"}</td>
              <td>${p.titleLen ?? "—"}</td>
              <td>${p.metaDescLen ?? "—"}</td>
              <td>${p.h1Count ?? "—"}</td>
              <td>${p.wordCount ?? "—"}</td>
            </tr>`).join("")}
        </tbody>
      </table>
    </div>` : "";

  $("#seo-results").innerHTML = `
    <div class="result-grid">
      <div class="seo-card score-card">
        <div class="card-title">SEO score for <b>${escapeHtml(report.url || "")}</b></div>
        <div class="score-circle">
          <svg width="180" height="180">
            <circle class="track" cx="90" cy="90" r="${r}" fill="none" stroke-width="14"/>
            <circle class="fill" cx="90" cy="90" r="${r}" fill="none" stroke-width="14"
              stroke="${color}" stroke-linecap="round"
              stroke-dasharray="${circ}" stroke-dashoffset="${dash}"/>
          </svg>
          <div class="num">
            <div class="num-val" style="color:${color}">${score}</div>
            <div class="num-out">/ 100</div>
          </div>
        </div>
        <div class="score-summary">
          <span class="sev-pill critical">${counts.critical} critical</span>
          <span class="sev-pill warning">${counts.warning} warning</span>
          <span class="sev-pill info">${counts.info} info</span>
        </div>
        <div style="margin-top:18px;font-size:11px;color:var(--text-dim);">
          ${fmtTime(report.created_at)} · ${report.pagesCrawled || 0} pages crawled
        </div>
      </div>

      <div class="seo-card">
        <div class="card-title">Strategic review</div>
        <div class="strategic-body">${renderMarkdown(report.strategic || "")}</div>
      </div>
    </div>

    ${psiHtml}

    <div class="category-grid">${catHtml}</div>

    ${pagesHtml}
  `;
}

function renderPsi(psi) {
  function block(strategy, data) {
    if (!data || data.error) {
      return `<div class="psi-block">
        <div class="psi-strategy">${strategy}</div>
        <div style="font-size:12px;color:var(--text-dim);">${data?.error ? "Error: " + escapeHtml(data.error) : "No data"}</div>
      </div>`;
    }
    const s = data.scores || {};
    const c = data.cwv || {};
    const sc = (v) => v == null ? "—" : `<span style="color:${scoreColor(v)}">${v}</span>`;
    return `<div class="psi-block">
      <div class="psi-strategy">${strategy}</div>
      <div class="psi-scores">
        <div class="psi-score"><div class="v">${sc(s.performance)}</div><div class="l">Perf</div></div>
        <div class="psi-score"><div class="v">${sc(s.accessibility)}</div><div class="l">A11y</div></div>
        <div class="psi-score"><div class="v">${sc(s.bestPractices)}</div><div class="l">Best</div></div>
        <div class="psi-score"><div class="v">${sc(s.seo)}</div><div class="l">SEO</div></div>
      </div>
      <div class="psi-cwv">
        <span>LCP <b>${c.lcp || "—"}</b></span>
        <span>CLS <b>${c.cls || "—"}</b></span>
        <span>FCP <b>${c.fcp || "—"}</b></span>
        <span>TBT <b>${c.tbt || "—"}</b></span>
        <span>SI <b>${c.si || "—"}</b></span>
      </div>
      ${data.opportunities && data.opportunities.length ? `
        <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px;">
          <div style="font-size:10px;letter-spacing:0.18em;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;">Top opportunities</div>
          ${data.opportunities.slice(0, 5).map(o => `
            <div style="font-size:12px;margin:6px 0;">
              <b style="color:var(--text);">${escapeHtml(o.title)}</b>
              ${o.savings ? ` <span style="color:var(--warning);">— ${escapeHtml(o.savings)}</span>` : ""}
            </div>`).join("")}
        </div>` : ""}
    </div>`;
  }
  return `<div class="seo-card" style="margin-bottom:20px;">
    <div class="card-title">Google PageSpeed Insights</div>
    <div class="psi-grid">
      ${block("Mobile", psi.mobile)}
      ${block("Desktop", psi.desktop)}
    </div>
  </div>`;
}

function showStatus(html, kind = "running") {
  const banner = $("#seo-status");
  banner.style.display = "flex";
  banner.className = "status-banner" + (kind === "failed" ? " failed" : "");
  banner.innerHTML = (kind === "running" ? `<div class="spinner"></div>` : "") + `<div>${html}</div>`;
}

function hideStatus() { $("#seo-status").style.display = "none"; }

async function loadHistory(selectId) {
  const r = await fetch("/seo/reports");
  if (!r.ok) return;
  const reports = await r.json();
  const sel = $("#seo-history");
  sel.innerHTML = `<option value="">— select previous report —</option>` +
    reports.map(rep => `<option value="${rep.id}">${escapeHtml(rep.url)} · score ${rep.score} · ${fmtTime(rep.created_at)}</option>`).join("");
  if (selectId) sel.value = selectId;
  return reports;
}

async function loadReport(id) {
  const r = await fetch(`/seo/reports/${id}`);
  if (!r.ok) return null;
  const report = await r.json();
  renderResults(report);
  return report;
}

async function pollTask(taskId, url) {
  const r = await fetch("/seo/tasks");
  if (!r.ok) return;
  const tasks = await r.json();
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;

  if (task.status === "completed") {
    clearInterval(pollTimer); pollTimer = null;
    const reports = await loadHistory();
    const report = reports.find(rep => rep.task_id === taskId);
    if (report) { await loadReport(report.id); $("#seo-history").value = report.id; }
    showStatus(`Analysis complete for <b>${escapeHtml(url)}</b>.`, "done");
    setTimeout(hideStatus, 4000);
    $("#seo-go").disabled = false;
  } else if (task.status === "failed") {
    clearInterval(pollTimer); pollTimer = null;
    showStatus(`Analysis failed for <b>${escapeHtml(url)}</b>: ${escapeHtml(task.error || "unknown error")}`, "failed");
    $("#seo-go").disabled = false;
  } else {
    showStatus(`Analysing <b>${escapeHtml(url)}</b> — status: ${task.status}…`, "running");
  }
}

$("#seo-go").addEventListener("click", async () => {
  const url = $("#seo-url").value.trim();
  if (!url) { $("#seo-url").focus(); return; }
  const max_pages = parseInt($("#seo-max").value, 10) || 25;
  $("#seo-go").disabled = true;
  showStatus(`Starting SEO analysis for <b>${escapeHtml(url)}</b>…`, "running");
  try {
    const r = await fetch("/seo/tasks", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url, max_pages }),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      showStatus(`Could not start: ${escapeHtml(err.error || r.statusText)}`, "failed");
      $("#seo-go").disabled = false;
      return;
    }
    const task = await r.json();
    currentTaskId = task.id;
    pollTimer = setInterval(() => pollTask(task.id, url), 5000);
    pollTask(task.id, url);
  } catch (e) {
    showStatus(`Network error: ${escapeHtml(e.message)}`, "failed");
    $("#seo-go").disabled = false;
  }
});

$("#seo-history").addEventListener("change", (e) => {
  const id = e.target.value;
  if (id) loadReport(id);
});

$("#seo-delete").addEventListener("click", async () => {
  const id = $("#seo-history").value;
  if (!id) return;
  if (!confirm("Delete this SEO report?")) return;
  await fetch(`/seo/reports/${id}`, { method: "DELETE" });
  $("#seo-results").innerHTML = "";
  $("#seo-empty").style.display = "block";
  await loadHistory();
});

// Initial load: show latest report if any
(async function init() {
  const reports = await loadHistory();
  if (reports && reports.length) {
    $("#seo-history").value = reports[0].id;
    loadReport(reports[0].id);
  }
})();
</script>
</body>
</html>
