<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>try{var t=localStorage.getItem("cc_theme");if(t==="light")document.documentElement.setAttribute("data-theme","light");}catch(e){}</script>
<link rel="stylesheet" href="/theme.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Center — Agents</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: hsl(0 0% 0%); --bg-base: hsl(0 0% 3%); --bg-surface: hsl(0 0% 5%);
  --bg-card: hsl(0 0% 5%); --bg-card-hover: hsl(0 0% 8%); --bg-sidebar: hsl(0 0% 2%);
  --border: hsl(217 32% 20%); --border-glow: hsla(264 65% 49% / 0.3);
  --primary: hsl(264 65% 49%); --primary-dim: hsla(264 65% 49% / 0.5); --primary-glow: hsla(264 65% 65% / 0.4);
  --accent: hsl(264 65% 49%); --success: hsl(142 76% 36%); --danger: hsl(0 72% 51%);
  --warning: hsl(45 93% 55%); --premium: hsl(270 95% 65%);
  --text: hsl(210 40% 98%); --text-dim: hsl(215 20% 65%); --text-muted: hsl(217 32% 17%);
  --font-display: 'Akira Expanded', 'Orbitron', sans-serif;
  --font-data: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --radius: 10px; --sidebar-w: 62px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; overflow-x: hidden; width: 100%; }
body { font-family: var(--font-body); background: var(--bg-deep); color: var(--text); min-height: 100vh; overflow-x: hidden; width: 100%; }
body::before { content: ''; position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 80% 60% at 20% 10%, hsla(264 65% 49% / 0.024) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 80% 80%, hsla(264 65% 49% / 0.024) 0%, transparent 60%); pointer-events: none; }
body::after { content: ''; position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(var(--text-muted) 1px, transparent 1px), linear-gradient(90deg, var(--text-muted) 1px, transparent 1px); background-size: 60px 60px; opacity: 0.04; pointer-events: none; }
.layout { display: flex; min-height: 100vh; position: relative; z-index: 1; width: 100%; overflow-x: hidden; }
.sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 16px 0; position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; }
.sidebar-logo { font-family: var(--font-display); font-size: 10px; font-weight: 900; color: var(--primary); letter-spacing: 0.2em; margin-bottom: 28px; text-shadow: 0 0 20px var(--primary-glow); }
.sidebar-nav { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.nav-item { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: var(--text-dim); cursor: pointer; transition: all 0.2s; position: relative; border: 1px solid transparent; text-decoration: none; }
.nav-item:hover { color: var(--primary); background: hsla(264 65% 49% / 0.03); }
.nav-item.active { color: var(--primary); background: hsla(264 65% 49% / 0.063); border-color: var(--border-glow); box-shadow: 0 0 16px hsla(264 65% 49% / 0.063); }
.nav-item .tooltip { position: absolute; left: 52px; top: 50%; transform: translateY(-50%); background: var(--bg-card); border: 1px solid var(--border); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-family: var(--font-body); color: var(--text); white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
.nav-item:hover .tooltip { opacity: 1; }
.nav-item svg { width: 18px; height: 18px; }
.notif-badge { position: absolute; top: 4px; right: 4px; background: var(--danger); color: white; font-size: 8px; font-weight: 700; min-width: 14px; height: 14px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: var(--font-data); }
.main { flex: 1; margin-left: var(--sidebar-w); padding: 28px 32px; display: flex; flex-direction: column; gap: 28px; min-width: 0; max-width: 100%; overflow-x: hidden; }
.header-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; font-family: var(--font-data); }
.section-header { font-family: var(--font-display); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--primary); margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.section-header::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }
/* ── SCHEDULED TASKS ── */
.sched-grid { display: flex; flex-wrap: wrap; gap: 10px; }
.sched-card {
  background: linear-gradient(180deg, hsla(0 0% 6% / 1) 0%, hsla(0 0% 3% / 1) 100%);
  border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px;
  flex: 1; min-width: 260px; max-width: 360px; transition: all 0.2s; position: relative;
}
.sched-card:hover { border-color: hsla(264 65% 49% / 0.3); }
.sched-card.disabled { opacity: 0.45; }
.sched-name { font-family: var(--font-body); font-size: 12px; color: var(--text); font-weight: 600; margin-bottom: 4px; }
.sched-agent { font-family: var(--font-data); font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
.sched-time { font-family: var(--font-data); font-size: 10px; color: var(--primary); font-weight: 600; letter-spacing: 0.05em; margin-bottom: 4px; }
.sched-details { font-family: var(--font-data); font-size: 9px; color: var(--text-dim); line-height: 1.5; }
.sched-badge {
  display: inline-block; font-family: var(--font-data); font-size: 8px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 6px; border-radius: 3px;
  margin-right: 6px;
}
.sched-badge.on { background: hsla(142 76% 36% / 0.08); color: var(--success); border: 1px solid hsla(142 76% 36% / 0.2); }
.sched-badge.off { background: hsla(0 0% 50% / 0.08); color: var(--text-dim); border: 1px solid hsla(0 0% 50% / 0.2); }
.sched-actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 4px; }
.sched-btn {
  font-family: var(--font-data); font-size: 9px; padding: 2px 8px; border-radius: 4px; cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--text-dim); transition: all 0.2s;
}
.sched-btn:hover { border-color: var(--primary); color: var(--primary); }
.sched-btn.del:hover { border-color: var(--danger); color: var(--danger); }
.sched-last { font-family: var(--font-data); font-size: 9px; color: var(--text-dim); margin-top: 6px; opacity: 0.7; }
.sched-add-btn {
  background: linear-gradient(135deg, var(--primary), hsl(270 65% 55%)); color: white;
  border: none; padding: 6px 16px; border-radius: 6px; font-family: var(--font-data);
  font-size: 11px; font-weight: 600; cursor: pointer; letter-spacing: 0.05em; transition: all 0.2s;
}
.sched-add-btn:hover { filter: brightness(1.15); }
/* ── SCHEDULE MODAL ── */
.sched-modal-bg {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
.sched-modal-bg.open { display: flex; }
.sched-modal {
  background: hsl(0 0% 5%); border: 1px solid var(--border); border-radius: 12px;
  padding: 28px; width: 440px; max-height: 80vh; overflow-y: auto;
}
.sched-modal h3 { font-family: var(--font-display); font-size: 12px; letter-spacing: 0.15em; color: var(--primary); margin-bottom: 18px; }
.sched-form-row { display: flex; gap: 10px; margin-bottom: 10px; }
.sched-form-row > * { flex: 1; }
.sched-label { font-family: var(--font-data); font-size: 9px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; display: block; }
.sched-input, .sched-select {
  width: 100%; background: hsl(0 0% 8%); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-family: var(--font-data); font-size: 11px; padding: 7px 10px;
}
.sched-select { appearance: none; cursor: pointer; }
.sched-days { display: flex; gap: 4px; margin-bottom: 10px; }
.sched-day-btn {
  font-family: var(--font-data); font-size: 9px; font-weight: 600; padding: 4px 8px;
  border-radius: 4px; border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); cursor: pointer; transition: all 0.2s; text-transform: uppercase;
}
.sched-day-btn.active { background: hsla(264 65% 49% / 0.15); border-color: var(--primary); color: var(--primary); }
.sched-payload { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.sched-modal-actions { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }
.sched-modal-btn {
  font-family: var(--font-data); font-size: 11px; font-weight: 600; padding: 7px 18px;
  border-radius: 6px; cursor: pointer; border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); transition: all 0.2s;
}
.sched-modal-btn.primary { background: linear-gradient(135deg, var(--primary), hsl(270 65% 55%)); color: white; border-color: transparent; }
.sched-modal-btn:hover { filter: brightness(1.15); }

@keyframes fade-up { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse-glow { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
@keyframes agent-border-scan { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
@keyframes agent-shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
.fade-up { opacity: 0; animation: fade-up 0.5s ease-out forwards; }
.delay-1 { animation-delay: 0.05s; } .delay-2 { animation-delay: 0.10s; } .delay-3 { animation-delay: 0.15s; }
::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── AI TEAM CARDS (same as overview) ── */
.agents-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; width: 100%; min-width: 0; }
.agent-card {
  background: linear-gradient(180deg, hsla(0 0% 6% / 1) 0%, hsla(0 0% 3% / 1) 100%);
  border: 1px solid var(--border); border-radius: 14px; padding: 0;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; min-width: 0;
}
.agent-card.is-running::before {
  content: ''; position: absolute; inset: -1px; border-radius: 14px; padding: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--agent-glow) 25%, transparent 50%, var(--agent-glow) 75%, transparent 100%);
  background-size: 200% 100%;
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  animation: agent-border-scan 3s linear infinite;
}
.agent-card:not(.is-running)::before {
  content: ''; position: absolute; inset: -1px; border-radius: 14px; padding: 1px;
  background: linear-gradient(135deg, transparent 30%, var(--agent-glow, hsla(264 65% 49% / 0.4)) 70%, transparent 100%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0; transition: opacity 0.4s;
}
.agent-card:not(.is-running):hover::before { opacity: 1; }
.agent-card:hover { border-color: hsla(264 65% 49% / 0.3); box-shadow: 0 8px 40px hsla(264 65% 49% / 0.08); transform: translateY(-2px); }
.agent-card-header { padding: 18px 20px 14px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid hsla(217 32% 20% / 0.4); }
.agent-avatar { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; position: relative; }
.agent-avatar-bg { position: absolute; inset: 0; border-radius: 12px; opacity: 0.12; }
.agent-header-info { flex: 1; }
.agent-name { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--text); margin-bottom: 2px; }
.agent-role { font-size: 10px; color: var(--text-dim); font-family: var(--font-data); }
.agent-status { font-family: var(--font-data); font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; padding: 4px 10px; border-radius: 6px; display: inline-flex; align-items: center; gap: 5px; flex-shrink: 0; }
.agent-status.running { color: var(--success); background: hsla(142 76% 36% / 0.08); }
.agent-status.running::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse-glow 2s infinite; }
.agent-status.idle { color: var(--warning); background: hsla(45 93% 55% / 0.08); }
.agent-status.idle::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--warning); opacity: 0.5; }
.agent-status.queued { color: var(--accent); background: hsla(264 65% 49% / 0.08); }
.agent-status.queued::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0.5; }
.agent-card-body { padding: 16px 20px; }
.agent-task { font-family: var(--font-data); font-size: 10px; color: var(--text-dim); line-height: 1.4; }
.is-running .agent-task::after { content: '\25CB'; color: var(--agent-color, var(--primary)); font-size: 10px; margin-left: 2px; animation: pulse-glow 1s infinite; }
.agent-card-footer { padding: 10px 20px 14px; border-top: 1px solid hsla(217 32% 20% / 0.3); display: flex; align-items: center; justify-content: space-between; }
.agent-footer-label { font-family: var(--font-data); font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
.agent-footer-label span { color: var(--text); font-weight: 600; }
.health-row { display: flex; gap: 10px; margin-top: 6px; font-family: var(--font-data); font-size: 9px; letter-spacing: 0.04em; }
.health-tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px; border-radius: 4px; background: hsla(0 0% 100% / 0.03); border: 1px solid var(--border); }
.health-tag .dot { width: 5px; height: 5px; border-radius: 50%; }
.health-tag .dot.ok { background: var(--success); }
.health-tag .dot.err { background: var(--danger); }

/* ── TASK FEED ── */
.task-feed { display: flex; flex-direction: column; gap: 2px; }
.task-feed-header { display: flex; gap: 8px; margin-bottom: 12px; }
.filter-btn { padding: 5px 14px; border: 1px solid var(--border); border-radius: 6px; background: none; color: var(--text-dim); font-size: 11px; font-family: var(--font-data); cursor: pointer; transition: all 0.2s; }
.filter-btn:hover { color: var(--text); border-color: var(--primary); }
.filter-btn.active { color: var(--primary); border-color: var(--primary); background: hsla(264 65% 49% / 0.06); }
.task-row {
  display: grid; grid-template-columns: 90px 1fr 110px 85px 60px 55px;
  align-items: center; gap: 12px; padding: 12px 16px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  transition: all 0.2s; margin-bottom: 4px;
}
.task-row:hover { border-color: hsla(264 65% 49% / 0.2); }
.task-row.is-processing { border-left: 3px solid var(--primary); }
.task-row.is-completed { border-left: 3px solid var(--success); opacity: 0.75; }
.task-row.is-failed { border-left: 3px solid var(--danger); opacity: 0.75; }
.task-row.is-cancelled { border-left: 3px solid var(--text-dim); opacity: 0.6; }
.task-row.is-pending { border-left: 3px solid var(--warning); }
.task-agent-tag { font-family: var(--font-data); font-size: 9px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; text-align: center; }
.task-desc { font-size: 12px; color: var(--text); font-family: var(--font-data); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; max-width: 100%; }
.task-row > div:nth-child(2) { min-width: 0; overflow: hidden; }
.task-desc-sub { font-size: 10px; color: var(--text-dim); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.task-status-pill { font-family: var(--font-data); font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; padding: 3px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; }
.task-status-pill.pending { color: var(--warning); background: hsla(45 93% 55% / 0.08); }
.task-status-pill.processing { color: var(--primary); background: hsla(264 65% 49% / 0.08); }
.task-status-pill.completed { color: var(--success); background: hsla(142 76% 36% / 0.08); }
.task-status-pill.failed { color: var(--danger); background: hsla(0 72% 51% / 0.08); }
.task-status-pill.cancelled { color: var(--text-dim); background: hsla(0 0% 50% / 0.08); }
.task-status-pill.processing::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--primary); animation: pulse-glow 2s infinite; }
.task-cancel-btn { font-family: var(--font-data); font-size: 9px; font-weight: 600; letter-spacing: 0.04em; padding: 3px 10px; border-radius: 4px; border: 1px solid hsla(0 72% 51% / 0.3); background: hsla(0 72% 51% / 0.08); color: var(--danger); cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
.task-cancel-btn:hover { background: hsla(0 72% 51% / 0.2); border-color: var(--danger); }
.task-time { font-family: var(--font-data); font-size: 10px; color: var(--text-dim); text-align: right; }
.task-actions { text-align: right; }
.task-actions a { font-size: 10px; color: var(--success); font-family: var(--font-data); text-decoration: none; }
.task-actions a:hover { text-decoration: underline; }
.task-empty { text-align: center; padding: 40px; color: var(--text-dim); font-size: 12px; font-family: var(--font-data); }
.task-result-preview { font-size: 10px; color: var(--text-dim); font-family: var(--font-data); margin-top: 4px; padding: 6px 10px; background: hsla(0 0% 100% / 0.02); border-radius: 6px; max-height: 60px; overflow: hidden; white-space: pre-wrap; line-height: 1.5; }

/* ── RESPONSIVE: TABLET ── */
@media (max-width: 1024px) {
  .agents-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ── RESPONSIVE: MOBILE ── */
@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }
  .sidebar, .sidebar.open {
    position: fixed; left: 0; right: 0; bottom: 0; top: auto;
    width: 100%; min-height: auto; height: auto;
    flex-direction: row; border-right: none;
    border-top: 1px solid var(--border);
    padding: 6px 0 env(safe-area-inset-bottom, 4px);
    overflow-x: auto; overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    z-index: 120; background: var(--bg-sidebar);
    scrollbar-width: none; transform: none;
  }
  .sidebar::-webkit-scrollbar { display: none; }
  .sidebar::after {
    content: ''; position: sticky; right: 0; top: 0; bottom: 0;
    width: 28px; flex-shrink: 0;
    background: linear-gradient(90deg, transparent, var(--bg-sidebar));
    pointer-events: none;
  }
  .sidebar-logo { display: none; }
  .sidebar-nav { flex-direction: row; gap: 1px; flex: none; padding: 0 4px; }
  .nav-item { width: 36px; height: 36px; flex-shrink: 0; }
  .nav-item .tooltip { display: none; }
  .nav-item svg { width: 17px; height: 17px; }
  .sidebar .notif-bell { width: 36px; height: 36px; margin-top: 0; }
  .sidebar > .nav-item:last-child { display: none; }

  .main { margin-left: 0; padding: 16px 14px 68px; gap: 20px; width: 100%; overflow-x: hidden; }
  .header-title { font-size: 17px; }
  .header-sub { font-size: 11px; }
  .agents-grid { grid-template-columns: 1fr; gap: 10px; }
  .agent-card-header { padding: 14px 16px 10px; gap: 10px; }
  .agent-avatar { width: 36px; height: 36px; border-radius: 10px; font-size: 17px; }
  .agent-name { font-size: 9px; }
  .agent-card-body { padding: 12px 16px; }
  .agent-card-footer { padding: 8px 16px 12px; }

  .task-feed-header { flex-wrap: wrap; gap: 6px; }
  .filter-btn { padding: 5px 10px; font-size: 10px; }
  .task-feed { max-width: 100%; overflow: hidden; }
  .task-row {
    display: flex !important; flex-direction: column !important;
    gap: 6px; padding: 12px 14px; max-width: 100%; overflow: hidden;
  }
  .task-row > div:nth-child(3) { display: none; }
  .task-cancel-btn { font-size: 8px; padding: 2px 8px; }
  .task-desc, .task-desc-sub { white-space: normal !important; word-break: break-word; overflow-wrap: break-word; }
  .task-result-preview { max-width: 100%; word-break: break-word; overflow-wrap: break-word; white-space: normal !important; }
  .task-agent-tag { font-size: 8px; }
  .task-time { text-align: left; }
}

/* ── RESPONSIVE: SMALL MOBILE ── */
@media (max-width: 480px) {
  .main { padding: 12px 10px 64px; gap: 16px; }
  .header-title { font-size: 15px; }
  .sidebar-nav { gap: 0; padding: 0 2px; }
  .nav-item { width: 33px; height: 33px; }
  .nav-item svg { width: 15px; height: 15px; }
  .agent-card-header { padding: 12px 12px 8px; }
  .agent-card-body { padding: 10px 12px; }
  .agent-card-footer { padding: 6px 12px 10px; }
  .task-row { padding: 10px 12px; }
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar"></aside>

  <main class="main">
    <div class="fade-up delay-1">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div class="header-title">AI AGENTS</div>
          <div class="header-sub">Team overview, task queue & real-time activity</div>
        </div>
        <div id="canva-status"></div>
      </div>
    </div>

<script>
const AI_TEAM = [
  { name: 'RESEARCHER', emoji: '\u{1F50D}', role: 'Trend Analysis & Web Research', color: 'var(--accent)', hsl: '264 65% 49%', taskApi: '/research/tasks', type: 'RESEARCH' },
  { name: 'DESIGNER', emoji: '\u{1F3A8}', role: 'Visual Assets (Canva)', color: 'var(--warning)', hsl: '45 93% 55%', taskApi: '/designer/tasks', type: 'DESIGN' },
  { name: 'VIDEO EDITOR', emoji: '\u2702\uFE0F', role: 'Video Production (Remotion + AI)', color: 'var(--danger)', hsl: '0 72% 51%', taskApis: ['/video/tasks', '/video/ai-generate'], type: 'VIDEO' },
  { name: 'CONTENT CREATOR', emoji: '\u{1F3AC}', role: 'HeyGen AI Avatar & Video Agent', color: 'hsl(180 70% 45%)', hsl: '180 70% 45%', taskApis: ['/avatar/tasks', '/video-agent/tasks'], type: 'CONTENT' },
  { name: 'SCRIPT WRITER', emoji: '\u270D\uFE0F', role: 'Video & Content Scripts', color: 'hsl(30 90% 55%)', hsl: '30 90% 55%', taskApi: '/scriptwriter/tasks', type: 'SCRIPT' },
  { name: 'COMMUNITY MANAGER', emoji: '\u{1F4AC}', role: 'Telegram / Discord Posts', color: 'hsl(200 90% 55%)', hsl: '200 90% 55%', isCommunity: true },
  { name: 'MARKETEER', emoji: '\u{1F4E3}', role: 'Marketing Strategy & Content', color: 'hsl(340 80% 55%)', hsl: '340 80% 55%', isMarketeer: true },
  { name: 'ASSISTANT', emoji: '\u{1F4C5}', role: 'Google Calendar Assistant', color: 'hsl(210 90% 55%)', hsl: '210 90% 55%', isCalendar: true },
];

const AGENT_COLORS = {
  RESEARCH: 'var(--accent)', DESIGN: 'var(--warning)',
  VIDEO: 'var(--danger)', CONTENT: 'hsl(180 70% 45%)', SCRIPT: 'hsl(30 90% 55%)',
  COMMUNITY: 'hsl(200 90% 55%)',
};

let currentFilter = 'all';
let allTasks = [];

function fmtTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return d.toLocaleString('nl-NL', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  renderTaskFeed();
}

// ── AI TEAM ──
async function loadAiTeam() {
  const grid = document.getElementById('ai-team-grid');
  const cards = [];

  for (const agent of AI_TEAM) {
    if (agent.isMarketeer) {
      cards.push(`<div class="agent-card is-running" style="--agent-glow: hsla(${agent.hsl} / 0.4); --agent-color: ${agent.color}">
        <div class="agent-card-header">
          <div class="agent-avatar"><div class="agent-avatar-bg" style="background:${agent.color}"></div><span style="position:relative;z-index:1">${agent.emoji}</span></div>
          <div class="agent-header-info"><div class="agent-name">${agent.name}</div><div class="agent-role">${agent.role}</div></div>
          <span class="agent-status running">25 skills</span>
        </div>
        <div class="agent-card-body">
          <div class="agent-task">Content, copy, ads, SEO & growth strategy</div>
        </div>
        <div class="agent-card-footer">
          <span class="agent-footer-label">engine <span>Claude + Skills</span></span>
          <a href="chat.html" style="font-family:var(--font-data);font-size:10px;color:var(--primary);text-decoration:none;">Open in chat</a>
        </div>
      </div>`);
      continue;
    }

    if (agent.isCalendar) {
      cards.push(`<div class="agent-card is-running" style="--agent-glow: hsla(${agent.hsl} / 0.4); --agent-color: ${agent.color}">
        <div class="agent-card-header">
          <div class="agent-avatar"><div class="agent-avatar-bg" style="background:${agent.color}"></div><span style="position:relative;z-index:1">${agent.emoji}</span></div>
          <div class="agent-header-info"><div class="agent-name">${agent.name}</div><div class="agent-role">${agent.role}</div></div>
          <span class="agent-status running">connected</span>
        </div>
        <div class="agent-card-body">
          <div class="agent-task">Google Calendar via Composio</div>
        </div>
        <div class="agent-card-footer">
          <span class="agent-footer-label">engine <span>Composio</span></span>
          <a href="chat.html" style="font-family:var(--font-data);font-size:10px;color:var(--primary);text-decoration:none;">Open in chat</a>
        </div>
      </div>`);
      continue;
    }

    if (agent.isCommunity) {
      let tasks = [];
      let channels = [];
      try { tasks = await (await fetch('/community/tasks')).json(); } catch {}
      try { channels = await (await fetch('/community/channels')).json(); } catch {}
      if (!Array.isArray(tasks)) tasks = [];
      if (!Array.isArray(channels)) channels = [];
      const nowMs = Date.now();
      const scheduled = tasks.filter(t => t.status === 'scheduled').length;
      const drafts = tasks.filter(t => t.status === 'draft').length;
      const published = tasks.filter(t => t.status === 'published').length;
      const failed = tasks.filter(t => t.status === 'failed').length;
      const firingSoon = tasks.some(t => t.status === 'scheduled' && (Date.parse(t.scheduled_at || '') - nowMs) <= 15*60*1000 && (Date.parse(t.scheduled_at || '') - nowMs) > -60*1000);
      const status = firingSoon ? 'running' : scheduled > 0 || drafts > 0 ? 'queued' : 'idle';
      const nextPost = tasks
        .filter(t => t.status === 'scheduled' && Date.parse(t.scheduled_at || '') > nowMs)
        .sort((a, b) => Date.parse(a.scheduled_at) - Date.parse(b.scheduled_at))[0];
      const statusText = firingSoon ? 'Publishing soon…'
        : nextPost ? `Next: ${fmtTime(nextPost.scheduled_at)}`
        : scheduled > 0 ? `${scheduled} scheduled`
        : drafts > 0 ? `${drafts} draft(s) awaiting review`
        : 'No posts queued';
      cards.push(`<div class="agent-card ${status === 'running' ? 'is-running' : ''}" style="--agent-glow: hsla(${agent.hsl} / 0.4); --agent-color: ${agent.color}">
        <div class="agent-card-header">
          <div class="agent-avatar"><div class="agent-avatar-bg" style="background:${agent.color}"></div><span style="position:relative;z-index:1">${agent.emoji}</span></div>
          <div class="agent-header-info"><div class="agent-name">${agent.name}</div><div class="agent-role">${agent.role}</div></div>
          <span class="agent-status ${status}">${status}</span>
        </div>
        <div class="agent-card-body">
          <div style="display:flex;gap:12px;margin-bottom:8px;font-family:var(--font-data);font-size:11px;">
            <span style="color:var(--text-dim)">${drafts} draft</span>
            <span style="color:var(--warning)">${scheduled} scheduled</span>
            <span style="color:var(--success)">${published} published</span>
            ${failed ? '<span style="color:var(--danger)">'+failed+' failed</span>' : ''}
          </div>
          <div class="agent-task">${esc(statusText)}</div>
        </div>
        <div class="agent-card-footer">
          <span class="agent-footer-label">channels <span>${channels.length}</span></span>
          <a href="community-manager.html" style="font-family:var(--font-data);font-size:10px;color:var(--primary);text-decoration:none;">Open</a>
        </div>
      </div>`);
      continue;
    }

    // Fetch tasks
    let tasks = [];
    if (agent.taskApis) {
      for (const api of agent.taskApis) { try { tasks = tasks.concat(await (await fetch(api)).json()); } catch {} }
    } else if (agent.taskApi) {
      try { tasks = await (await fetch(agent.taskApi)).json(); } catch {}
    }

    const pending = tasks.filter(t => t.status === 'pending').length;
    const processing = tasks.filter(t => t.status === 'processing').length;
    const completed = tasks.filter(t => t.status === 'completed').length;
    const failed = tasks.filter(t => t.status === 'failed').length;
    const total = tasks.length;
    const status = processing > 0 ? 'running' : pending > 0 ? 'queued' : 'idle';
    const currentTask = tasks.find(t => t.status === 'processing');
    const statusText = processing > 0
      ? (currentTask?.description || currentTask?.topic || currentTask?.query || currentTask?.prompt || 'Processing...').substring(0, 50)
      : pending > 0 ? `${pending} task(s) in queue` : 'Awaiting assignment';

    cards.push(`<div class="agent-card ${status === 'running' ? 'is-running' : ''}" style="--agent-glow: hsla(${agent.hsl} / 0.4); --agent-color: ${agent.color}">
      <div class="agent-card-header">
        <div class="agent-avatar"><div class="agent-avatar-bg" style="background:${agent.color}"></div><span style="position:relative;z-index:1">${agent.emoji}</span></div>
        <div class="agent-header-info"><div class="agent-name">${agent.name}</div><div class="agent-role">${agent.role}</div></div>
        <span class="agent-status ${status}">${status}</span>
      </div>
      <div class="agent-card-body">
        <div style="display:flex;gap:12px;margin-bottom:8px;font-family:var(--font-data);font-size:11px;">
          <span style="color:var(--warning)">${pending} pending</span>
          <span style="color:var(--primary)">${processing} active</span>
          <span style="color:var(--success)">${completed} done</span>
          ${failed ? '<span style="color:var(--danger)">'+failed+' failed</span>' : ''}
        </div>
        <div class="agent-task">${esc(statusText)}</div>
      </div>
      <div class="agent-card-footer">
        <span class="agent-footer-label"><span>${total}</span> total tasks</span>
        <span class="agent-footer-label">status <span>${status}</span></span>
      </div>
    </div>`);
  }

  grid.innerHTML = cards.join('');
}

// ── TASK FEED ──
async function loadAllTasks() {
  const sources = [
    { api: '/avatar/tasks', agent: 'CONTENT CREATOR', type: 'CONTENT', subtype: 'Avatar' },
    { api: '/video-agent/tasks', agent: 'CONTENT CREATOR', type: 'CONTENT', subtype: 'Video Agent' },
    { api: '/scriptwriter/tasks', agent: 'SCRIPT WRITER', type: 'SCRIPT' },
    { api: '/designer/tasks', agent: 'DESIGNER', type: 'DESIGN' },
    { api: '/video/tasks', agent: 'VIDEO EDITOR', type: 'VIDEO', subtype: 'Remotion' },
    { api: '/video/ai-generate', agent: 'VIDEO EDITOR', type: 'VIDEO', subtype: 'AI Generate' },
    { api: '/research/tasks', agent: 'RESEARCHER', type: 'RESEARCH' },
    { api: '/community-manager/tasks', agent: 'COMMUNITY MANAGER', type: 'COMMUNITY' },
  ];

  allTasks = [];
  for (const src of sources) {
    try {
      const tasks = await (await fetch(src.api)).json();
      tasks.forEach(t => allTasks.push({
        ...t, _agent: src.agent, _type: src.type, _subtype: src.subtype || src.type, _api: src.api,
        _desc: t.description || t.topic || t.query || t.prompt || t.design_type || '-',
        _preview: t.script || t.prompt || t.result || null,
      }));
    } catch {}
  }

  allTasks.sort((a, b) => {
    const order = { processing: 0, pending: 1, completed: 2, failed: 3, cancelled: 3 };
    const oa = order[a.status] ?? 4, ob = order[b.status] ?? 4;
    if (oa !== ob) return oa - ob;
    return new Date(b.created_at) - new Date(a.created_at);
  });

  renderTaskFeed();
}

function renderTaskFeed() {
  const feed = document.getElementById('task-feed');
  const filtered = currentFilter === 'all' ? allTasks : allTasks.filter(t => t.status === currentFilter);

  // Update filter counts
  document.querySelectorAll('.filter-btn').forEach(b => {
    const f = b.dataset.filter;
    const count = f === 'all' ? allTasks.length : allTasks.filter(t => t.status === f).length;
    const label = { all: 'All', processing: 'Active', pending: 'Pending', completed: 'Completed', failed: 'Failed' }[f];
    b.textContent = `${label} (${count})`;
  });

  if (!filtered.length) {
    feed.innerHTML = '<div class="task-empty">No tasks found</div>';
    return;
  }

  feed.innerHTML = filtered.map(t => {
    const color = AGENT_COLORS[t._type] || 'var(--text-dim)';
    const hasResult = t.status === 'completed' && (t.result || t.result_url);
    const preview = t._preview ? esc(t._preview.substring(0, 120)) + (t._preview.length > 120 ? '...' : '') : '';

    return `<div class="task-row is-${t.status}">
      <div>
        <span class="task-agent-tag" style="color:${color};background:${color}15">${t._subtype}</span>
      </div>
      <div>
        <div class="task-desc">${esc(t._desc)}</div>
        ${t.status === 'processing' && preview ? '<div class="task-desc-sub">Working on it...</div>' : ''}
        ${t.status === 'completed' && t.result ? '<div class="task-result-preview">' + esc(t.result.substring(0, 200)) + '</div>' : ''}
        ${t.error ? '<div style="font-size:10px;color:var(--danger);margin-top:2px;font-family:var(--font-data);">' + esc(t.error) + '</div>' : ''}
      </div>
      <div style="font-family:var(--font-data);font-size:11px;color:var(--text-dim);">${t._agent}</div>
      <div><span class="task-status-pill ${t.status}">${t.status}</span></div>
      <div>${(t.status === 'processing' || t.status === 'pending') ? '<button class="task-cancel-btn" onclick="cancelTask(\''+t._api+'\',\''+t.id+'\',this)">Cancel</button>' : ''}</div>
      <div class="task-time">${fmtTime(t.created_at)}</div>
    </div>`;
  }).join('');
}

// ── CANCEL TASK ──
async function cancelTask(api, taskId, btn) {
  if (!confirm('Cancel this task?')) return;
  btn.disabled = true;
  btn.textContent = '...';
  try {
    await fetch(api + '/' + taskId, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'cancelled', error: 'Cancelled by user' })
    });
    await loadAll();
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Cancel';
    alert('Failed to cancel: ' + e.message);
  }
}

// ── CANVA OAUTH POPUP ──
async function canvaOAuthPopup() {
  // Confirm the customer has configured Client ID + Secret before opening
  // the popup, otherwise Canva responds with a confusing error page.
  try {
    const s = await (await fetch('/canva/status')).json();
    if (!s.configured) {
      alert('Add Canva Client ID + Secret in Settings first.\n\nThe callback URI to enter in your Canva integration is shown there.');
      return;
    }
  } catch {}
  const w = window.open('/canva/connect', '_blank', 'width=820,height=720');
  if (!w) {
    alert('Popup was blocked. Allow popups for this page and try again.');
    return;
  }
  // Poll status until the callback page closes the popup or the user gives up.
  const start = Date.now();
  const iv = setInterval(async () => {
    if (Date.now() - start > 5 * 60 * 1000) { clearInterval(iv); checkCanvaStatus(); return; }
    try {
      const r = await (await fetch('/canva/status')).json();
      if (r.connected) {
        clearInterval(iv);
        try { w.close(); } catch {}
        checkCanvaStatus();
      } else if (w.closed) {
        clearInterval(iv);
        checkCanvaStatus();
      }
    } catch {}
  }, 2000);
}

    } else {
      el.innerHTML = '<a href="#" onclick="canvaOAuthPopup(); return false;" style="font-family:var(--font-data);font-size:10px;color:var(--primary);text-decoration:none;display:flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid hsla(264 65% 49%/0.3);border-radius:6px;background:hsla(264 65% 49%/0.06);transition:all 0.2s;cursor:pointer" onmouseover="this.style.borderColor=\'var(--primary)\'" onmouseout="this.style.borderColor=\'hsla(264 65% 49%/0.3)\'">Connect Canva</a>';
    }
  } catch { el.innerHTML = ''; }
}

const AGENT_STYLES = {
  designer: 'color:hsl(45 93% 55%)',
  researcher: 'color:hsl(264 65% 49%)',
  scriptwriter: 'color:hsl(30 90% 55%)',
  marketeer: 'color:hsl(340 80% 55%)',
  assistant: 'color:hsl(210 90% 55%)',
  ads_optimizer: 'color:hsl(142 76% 36%)',
  community_manager: 'color:hsl(200 90% 55%)',
};
const AGENT_DESCRIPTIONS = {
  designer: 'Creates visual content (Instagram posts, carousels, thumbnails) using AI image generation or HTML rendering.',
  researcher: 'Scans social platforms (X, Reddit, TikTok) for trending topics, competitor activity, and content ideas in your niche.',
  scriptwriter: 'Writes video scripts, social posts, or thread copy based on a topic and tone you specify.',
  marketeer: 'Your marketing strategist — executes any marketing task: content plans, copywriting, SEO audits, ad strategy, etc.',
  assistant: 'Personal assistant with calendar access — can give daily overviews, plan meetings, or answer operational questions.',
  ads_optimizer: 'AI-driven Meta Ads optimizer — analyzes campaign ROAS, spend & CTR, then automatically pauses losers, scales winners, and adjusts budgets.',
  community_manager: 'Generates a weekly batch of draft community posts for a channel, following its archetype set. Drafts land in the review queue.',
};

function escHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function buildScheduleSummary(s) {
  const p = s.payload || {};
  switch (s.agent) {
    case 'designer': {
      const parts = [];
      if (p.auto_from_research) parts.push('Picks trending topic from latest research');
      else if (p.description) parts.push(`"${p.description.substring(0, 60)}${p.description.length > 60 ? '...' : ''}"`);
      parts.push(`${(p.design_type || 'instagram_post').replace(/_/g, ' ')} via ${p.engine || 'nanobanana'}`);
      if (p.brand) parts.push(`brand: ${p.brand}`);
      return parts.join(' · ');
    }
    case 'researcher': {
      const lang = p.language === 'EN' ? 'English' : 'Dutch';
      const platforms = Array.isArray(p.platforms) ? p.platforms.join(', ') : (p.platforms || 'x, reddit, tiktok');
      return `${lang} ${(p.type || 'daily_full').replace(/_/g, ' ')} scan · niche: ${p.niche || 'crypto'} · platforms: ${platforms}`;
    }
    case 'scriptwriter':
      return `${p.language || 'NL'} · type: ${p.type || 'script'}${p.prompt ? ' · "' + p.prompt.substring(0, 50) + '"' : ''}`;
    case 'marketeer':
      return p.query ? `"${escHtml(p.query.substring(0, 80))}${p.query.length > 80 ? '...' : ''}"` : 'Marketing strategy task';
    case 'assistant':
      return p.query ? `"${escHtml(p.query.substring(0, 80))}${p.query.length > 80 ? '...' : ''}"` : 'Calendar overview';
    case 'ads_optimizer':
      return `Analyzes campaign performance (${p.period || 'last_7d'}), auto-pauses ROAS < 0.8, scales ROAS > 2.5, sends Telegram report`;
    case 'community_manager': {
      const n = parseInt(p.post_count);
      const count = Number.isFinite(n) && n > 0 ? `${n}` : 'auto';
      return `Generates ${count} ${p.language || 'NL'} drafts for channel ${escHtml(p.channel_id || '?')} · spread across next 7 days`;
    }
    default:
      return Object.entries(p).map(([k,v]) => `${k}: ${v}`).join(' · ') || 'No details';
  }
}

async function loadSchedules() {
  try {
    const res = await fetch('/scheduled-tasks', { credentials: 'include' });
    if (!res.ok) { console.error('loadSchedules failed:', res.status); return; }
    const scheds = await res.json();
    const el = document.getElementById('sched-grid');
    if (!scheds.length) { el.innerHTML = '<span style="font-size:11px;color:var(--text-dim)">No scheduled tasks yet</span>'; return; }
    el.innerHTML = scheds.map(s => {
      const days = (s.days || []).map(d => d.substring(0,2).toUpperCase()).join(' ');
      const time = `${String(s.hour).padStart(2,'0')}:${String(s.minute).padStart(2,'0')} UTC`;
      const summary = buildScheduleSummary(s);
      const lastRun = s.last_run ? new Date(s.last_run).toLocaleString('nl-NL', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : 'never';
      return `
        <div class="sched-card ${s.enabled ? '' : 'disabled'}">
          <div class="sched-actions">
            <button class="sched-btn" onclick="toggleSchedule('${s.id}',${!s.enabled})">${s.enabled ? 'Pause' : 'Enable'}</button>
            <button class="sched-btn" onclick="editSchedule('${s.id}')">Edit</button>
            <button class="sched-btn del" onclick="deleteSchedule('${s.id}')">Del</button>
          </div>
          <div class="sched-name">${escHtml(s.name)}</div>
          <div class="sched-agent" style="${AGENT_STYLES[s.agent] || ''}">${AGENT_LABELS[s.agent] || s.agent}</div>
          <div class="sched-time"><span class="sched-badge ${s.enabled ? 'on' : 'off'}">${s.enabled ? 'active' : 'paused'}</span>${time} &middot; ${days}</div>
          <div class="sched-details">${summary}</div>
          <div class="sched-last">Last run: ${lastRun}</div>
        </div>`;
    }).join('');
  } catch { document.getElementById('sched-grid').innerHTML = ''; }
}

async function toggleSchedule(id, enabled) {
  await fetch('/scheduled-tasks/' + id, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ enabled }) });
  loadSchedules();
}

async function deleteSchedule(id) {
  if (!confirm('Delete this schedule?')) return;
  await fetch('/scheduled-tasks/' + id, { method: 'DELETE' });
  loadSchedules();
}

function updatePayloadFields() {
  const agent = document.getElementById('sched-agent').value;
  document.getElementById('sched-payload').innerHTML = PAYLOAD_FIELDS[agent] || '';
  document.getElementById('sched-agent-desc').textContent = AGENT_DESCRIPTIONS[agent] || '';
  // Toggle desc visibility for designer
  if (agent === 'designer') {
    const cb = document.getElementById('sp-auto_from_research');
    const descRow = document.getElementById('sp-desc-row');
    cb?.addEventListener('change', () => { descRow.style.display = cb.checked ? 'none' : 'block'; });
  }
  // Load channels for community_manager
  if (agent === 'community_manager') {
    populateCommunityChannelSelect();
  }
}

async function populateCommunityChannelSelect(selectedId) {
  const sel = document.getElementById('sp-channel_id');
  if (!sel) return;
  try {
    const res = await fetch('/community/channels', { credentials: 'include' });
    const channels = await res.json();
    const enabled = (channels || []).filter(c => c.enabled !== false);
    if (!enabled.length) {
      sel.innerHTML = '<option value="">No enabled channels — add one in Community Manager</option>';
      return;
    }
    sel.innerHTML = enabled.map(c => {
      const label = `${c.name}${c.archetype_set ? ' · ' + c.archetype_set : ' · no archetype set'}`;
      return `<option value="${escHtml(c.id)}">${escHtml(label)}</option>`;
    }).join('');
    if (selectedId) sel.value = selectedId;
  } catch {
    sel.innerHTML = '<option value="">Error loading channels</option>';
  }
}

function openScheduleModal(data) {
  document.getElementById('sched-edit-id').value = data?.id || '';
  document.getElementById('sched-modal-title').textContent = data ? 'EDIT SCHEDULE' : 'NEW SCHEDULE';
  document.getElementById('sched-name').value = data?.name || '';
  document.getElementById('sched-agent').value = data?.agent || 'designer';
  document.getElementById('sched-hour').value = data?.hour ?? 9;
  document.getElementById('sched-minute').value = data?.minute ?? 0;
  // Days
  document.querySelectorAll('.sched-day-btn').forEach(b => {
    const active = data?.days ? data.days.includes(b.dataset.day) : true;
    b.classList.toggle('active', active);
  });
  updatePayloadFields();
  // Fill payload fields after DOM is ready
  if (data?.payload) {
    setTimeout(() => {
      for (const [k, v] of Object.entries(data.payload)) {
        const el = document.getElementById('sp-' + k);
        if (!el) continue;
        if (el.type === 'checkbox') el.checked = !!v;
        else if (Array.isArray(v)) el.value = v.join(', ');
        else el.value = v;
      }
      // Show/hide desc row for designer
      const cb = document.getElementById('sp-auto_from_research');
      const descRow = document.getElementById('sp-desc-row');
      if (cb && descRow) descRow.style.display = cb.checked ? 'none' : 'block';
      // Re-populate community channel select with the saved selection (it's async)
      if (data?.agent === 'community_manager' && data?.payload?.channel_id) {
        populateCommunityChannelSelect(data.payload.channel_id);
      }
    }, 10);
  }
  document.getElementById('sched-modal-bg').classList.add('open');
}

function closeScheduleModal() {
  document.getElementById('sched-modal-bg').classList.remove('open');
}

document.querySelectorAll('.sched-day-btn').forEach(b => {
  b.addEventListener('click', () => b.classList.toggle('active'));
});

function collectPayload() {
  const agent = document.getElementById('sched-agent').value;
  const payload = {};
  const fields = document.getElementById('sched-payload').querySelectorAll('[id^="sp-"]');
  fields.forEach(el => {
    const key = el.id.replace('sp-', '');
    if (el.type === 'checkbox') payload[key] = el.checked;
    else if (key === 'platforms') payload[key] = el.value.split(',').map(s => s.trim()).filter(Boolean);
    else payload[key] = el.value;
  });
  return payload;
}

async function saveSchedule() {
  const id = document.getElementById('sched-edit-id').value;
  const days = [...document.querySelectorAll('.sched-day-btn.active')].map(b => b.dataset.day);
  const body = {
    name: document.getElementById('sched-name').value || 'Unnamed',
    agent: document.getElementById('sched-agent').value,
    hour: parseInt(document.getElementById('sched-hour').value) || 0,
    minute: parseInt(document.getElementById('sched-minute').value) || 0,
    days,
    payload: collectPayload(),
  };
  if (id) {
    await fetch('/scheduled-tasks/' + id, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  } else {
    await fetch('/scheduled-tasks', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  }
  closeScheduleModal();
  loadSchedules();
}

async function editSchedule(id) {
  const res = await fetch('/scheduled-tasks');
  const scheds = await res.json();
  const s = scheds.find(x => x.id === id);
  if (s) openScheduleModal(s);
}
