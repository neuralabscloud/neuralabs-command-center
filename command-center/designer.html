<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>try{var t=localStorage.getItem("cc_theme");if(t==="light")document.documentElement.setAttribute("data-theme","light");}catch(e){}</script>
<link rel="stylesheet" href="/theme.css">
<script src="/brand-loader.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Center — Designer Agent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: hsl(0 0% 0%); --bg-base: hsl(0 0% 3%); --bg-surface: hsl(0 0% 5%);
  --bg-card: hsl(0 0% 5%); --bg-card-hover: hsl(0 0% 8%); --bg-sidebar: hsl(0 0% 2%);
  --border: hsl(217 32% 20%); --border-glow: hsla(264 65% 49% / 0.3);
  --primary: hsl(264 65% 49%); --primary-dim: hsla(264 65% 49% / 0.5); --primary-glow: hsla(264 65% 65% / 0.4);
  --accent: hsl(264 65% 49%); --accent-dim: hsla(264 65% 49% / 0.5);
  --success: hsl(142 76% 36%); --danger: hsl(0 72% 51%); --warning: hsl(45 93% 55%); --premium: hsl(270 95% 65%);
  --text: hsl(210 40% 98%); --text-dim: hsl(215 20% 65%); --text-muted: hsl(217 32% 17%);
  --font-display: 'Akira Expanded', 'Orbitron', sans-serif;
  --font-data: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --radius: 10px; --sidebar-w: 62px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; overflow-x: hidden; width: 100%; }
body { font-family: var(--font-body); background: var(--bg-deep); color: var(--text); min-height: 100vh; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 80% 60% at 20% 10%, hsla(264 65% 49% / 0.024) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 80% 80%, hsla(264 65% 49% / 0.024) 0%, transparent 60%); pointer-events: none; }
body::after { content: ''; position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(var(--text-muted) 1px, transparent 1px), linear-gradient(90deg, var(--text-muted) 1px, transparent 1px); background-size: 60px 60px; opacity: 0.04; pointer-events: none; }
.layout { display: flex; min-height: 100vh; position: relative; z-index: 1; overflow-x: hidden; width: 100%; }
.sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 16px 0; position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; }
.sidebar-logo { font-family: var(--font-display); font-size: 10px; font-weight: 900; color: var(--primary); letter-spacing: 0.2em; margin-bottom: 28px; text-shadow: 0 0 20px var(--primary-glow); }
.sidebar-nav { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.nav-item { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: var(--text-dim); cursor: pointer; transition: all 0.2s; position: relative; border: 1px solid transparent; text-decoration: none; }
.nav-item:hover { color: var(--primary); background: hsla(264 65% 49% / 0.03); }
.nav-item.active { color: var(--primary); background: hsla(264 65% 49% / 0.063); border-color: var(--border-glow); box-shadow: 0 0 16px hsla(264 65% 49% / 0.063); }
.nav-item .tooltip { position: absolute; left: 52px; top: 50%; transform: translateY(-50%); background: var(--bg-card); border: 1px solid var(--border); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-family: var(--font-body); color: var(--text); white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
.nav-item:hover .tooltip { opacity: 1; }
.nav-item svg { width: 18px; height: 18px; }
.main { flex: 1; margin-left: var(--sidebar-w); padding: 28px 32px; display: flex; flex-direction: column; gap: 28px; }
.header-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; font-family: var(--font-data); }
.section-header { font-family: var(--font-display); font-size: 16px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text); margin-bottom: 18px; display: flex; align-items: center; gap: 14px; }
.section-header::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }

/* ── TASK FORM ──────────────────────────────── */
.task-form {
  background: linear-gradient(180deg, hsla(0 0% 6% / 1) 0%, hsla(0 0% 3% / 1) 100%);
  border: 1px solid var(--border); border-radius: 14px; padding: 24px;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.form-field { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--font-data); }
.form-select, .form-input, .form-textarea {
  background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); padding: 10px 12px; font-size: 13px; font-family: var(--font-body);
  outline: none; transition: border-color 0.2s;
}
.form-select:focus, .form-input:focus, .form-textarea:focus { border-color: var(--primary); }
.form-textarea { resize: vertical; min-height: 80px; grid-column: 1 / -1; }
.form-actions { display: flex; gap: 10px; align-items: center; }
.btn-submit {
  padding: 10px 24px; background: linear-gradient(135deg, var(--primary), hsl(270 65% 55%));
  border: none; border-radius: 8px; color: white; font-weight: 600; font-size: 13px;
  cursor: pointer; transition: all 0.2s; font-family: var(--font-body);
}
.btn-submit:hover { box-shadow: 0 0 24px hsla(264 65% 49% / 0.3); transform: translateY(-1px); }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.form-status { font-family: var(--font-data); font-size: 11px; color: var(--text-dim); }
.style-tag {
  font-family: var(--font-data); font-size: 11px; font-weight: 500;
  color: var(--text-dim); background: hsla(264 65% 49% / 0.08);
  border: 1px solid hsla(264 65% 49% / 0.2); border-radius: 4px;
  padding: 4px 10px; cursor: pointer; transition: all 0.2s; user-select: none;
}
.style-tag:hover { border-color: var(--primary); color: var(--primary); background: hsla(264 65% 49% / 0.1); }
.style-tag.active { border-color: var(--primary); color: var(--text); background: hsla(264 65% 49% / 0.18); }

/* ── TASK GALLERY ───────────────────────────── */
.tasks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.task-card {
  background: linear-gradient(180deg, hsla(0 0% 6% / 1) 0%, hsla(0 0% 3% / 1) 100%);
  border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
  transition: all 0.3s; position: relative;
}
.task-card:hover { border-color: hsla(264 65% 49% / 0.3); box-shadow: 0 8px 40px hsla(264 65% 49% / 0.08); transform: translateY(-2px); }
.task-thumb {
  width: 100%; height: 280px; object-fit: cover; background: var(--bg-surface);
  display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 12px;
}
.task-thumb img { width: 100%; height: 100%; object-fit: cover; }
.task-body { padding: 14px 16px; }
.task-type { font-family: var(--font-data); font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--primary); margin-bottom: 4px; }
.task-desc { font-size: 13px; color: var(--text); line-height: 1.4; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.task-footer { display: flex; align-items: center; justify-content: space-between; }
.task-status-badge {
  font-family: var(--font-data); font-size: 9px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; padding: 4px 10px; border-radius: 6px; display: inline-flex; align-items: center; gap: 5px;
}
.task-status-badge.pending { color: var(--warning); background: hsla(45 93% 55% / 0.08); }
.task-status-badge.processing { color: var(--primary); background: hsla(264 65% 49% / 0.08); }
.task-status-badge.completed { color: var(--success); background: hsla(142 76% 36% / 0.08); }
.task-status-badge.failed { color: var(--danger); background: hsla(0 72% 51% / 0.08); }
.task-status-badge.processing::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--primary); animation: pulse-glow 2s infinite; }
.task-time { font-family: var(--font-data); font-size: 10px; color: var(--text-muted); }
.task-link { font-family: var(--font-data); font-size: 10px; color: var(--primary); text-decoration: none; }
.task-link:hover { text-decoration: underline; }
.task-delete { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 4px; transition: color 0.2s; }
.task-delete:hover { color: var(--danger); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 13px; }

@keyframes pulse-glow { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes fade-up { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.fade-up { opacity: 0; animation: fade-up 0.5s ease-out forwards; }
.delay-1 { animation-delay: 0.05s; } .delay-2 { animation-delay: 0.10s; } .delay-3 { animation-delay: 0.15s; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── RESPONSIVE: MOBILE ── */
@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }
  .sidebar, .sidebar.open {
    position: fixed; left: 0; right: 0; bottom: 0; top: auto;
    width: 100%; min-height: auto; height: auto;
    flex-direction: row; border-right: none;
    border-top: 1px solid var(--border);
    padding: 6px 0 env(safe-area-inset-bottom, 4px);
    overflow-x: auto; overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    z-index: 120; background: var(--bg-sidebar);
    scrollbar-width: none; transform: none;
  }
  .sidebar::-webkit-scrollbar { display: none; }
  .sidebar::after {
    content: ''; position: sticky; right: 0; top: 0; bottom: 0;
    width: 28px; flex-shrink: 0;
    background: linear-gradient(90deg, transparent, var(--bg-sidebar));
    pointer-events: none;
  }
  .sidebar-logo { display: none; }
  .sidebar-nav { flex-direction: row; gap: 1px; flex: none; padding: 0 4px; }
  .nav-item { width: 36px; height: 36px; flex-shrink: 0; }
  .nav-item .tooltip { display: none; }
  .nav-item svg { width: 17px; height: 17px; }
  .sidebar .notif-bell { width: 36px; height: 36px; margin-top: 0; }

  .main { margin-left: 0; padding: 16px 14px 68px; gap: 20px; width: 100%; overflow-x: hidden; }
  .header-title { font-size: 17px; }
  .header-sub { font-size: 11px; }
  .form-grid { grid-template-columns: 1fr; }
  .tasks-grid { grid-template-columns: 1fr; }
}

@media (max-width: 480px) {
  .main { padding: 12px 10px 64px; gap: 16px; }
  .header-title { font-size: 15px; }
  .sidebar-nav { gap: 0; padding: 0 2px; }
  .nav-item { width: 33px; height: 33px; }
  .nav-item svg { width: 15px; height: 15px; }
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
  </aside>

  <main class="main">
    <div class="fade-up delay-1">
      <div class="header-title">DESIGNER AGENT</div>
      <div class="header-sub">Canva-powered design generation</div>
    </div>

    <!-- NEW TASK FORM -->
    <section class="fade-up delay-2">
      <div class="section-header">New Design Task</div>
      <div class="task-form">
        <div class="form-grid">
          <div class="form-field">
            <label class="form-label">Design Type</label>
            <select class="form-select" id="design-type">
              <option value="instagram_post">Instagram Post</option>
              <option value="instagram_carousel">Instagram Carousel</option>
              <option value="your_story">Story (IG/TikTok)</option>
              <option value="youtube_thumbnail">YouTube Thumbnail</option>
              <option value="youtube_banner">YouTube Banner</option>
              <option value="twitter_post">X / Twitter Post</option>
              <option value="facebook_post">Facebook Post</option>
              <option value="ad_creative">Ad Creative</option>
              <option value="infographic">Infographic</option>
              <option value="poster">Poster</option>
              <option value="presentation">Presentation</option>
              <option value="logo">Logo</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">Brand</label>
            <select class="form-select" id="design-brand"></select>
          </div>
          <div class="form-field">
            <label class="form-label">Brand Kit</label>
            <select class="form-select" id="design-brandkit">
              <option value="">None</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">Engine</label>
            <select class="form-select" id="design-engine">
              <option value="nanobanana">Nano Banana (Gemini)</option>
              <option value="playwright">Playwright (instant)</option>
              <option value="claude">Claude AI (Canva MCP)</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">Layout Template</label>
            <select class="form-select" id="design-template">
              <option value="default">Default</option>
              <option value="bold-impact">Bold Impact</option>
              <option value="clean-minimal">Clean Minimal</option>
              <option value="data-dense">Data Dense</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">Logo Position</label>
            <select class="form-select" id="design-logo-position">
              <option value="SouthEast">Bottom Right</option>
              <option value="South">Bottom Center</option>
              <option value="SouthWest">Bottom Left</option>
              <option value="NorthEast">Top Right</option>
              <option value="North">Top Center</option>
              <option value="NorthWest">Top Left</option>
              <option value="Center">Center</option>
              <option value="none">No logo</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">Logo Size</label>
            <select class="form-select" id="design-logo-size">
              <option value="small">Small</option>
              <option value="medium" selected>Medium</option>
              <option value="large">Large</option>
            </select>
          </div>
          <div class="form-field" id="slide-count-field" style="display:none">
            <label class="form-label">Slides</label>
            <input type="number" class="form-input" id="design-slides" min="2" max="10" value="3" />
          </div>
          <div class="form-field" id="aspect-ratio-field" style="grid-column: 1 / -1; display:none">
            <label class="form-label">Aspect Ratios <span style="font-weight:400;color:var(--text-dim)">(click to toggle — one creative will be generated per selected ratio)</span></label>
            <div id="aspect-chips" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">
              <span class="style-tag active" data-aspect="1:1">1:1 Square</span>
              <span class="style-tag" data-aspect="4:5">4:5 Portrait</span>
              <span class="style-tag" data-aspect="9:16">9:16 Story / Reels</span>
              <span class="style-tag" data-aspect="16:9">16:9 Landscape</span>
              <span class="style-tag" data-aspect="1.91:1">1.91:1 Wide / Link</span>
            </div>
          </div>
          <div class="form-field" style="grid-column: 1 / -1">
            <label class="form-label">Description</label>
            <textarea class="form-textarea" id="design-desc" placeholder=""></textarea>
          </div>
          <div class="form-field" style="grid-column: 1 / -1">
            <label class="form-label">Reference Images <span style="font-weight:400;color:var(--text-dim)">(optional — select one or more, used by Nano Banana as style/content reference)</span></label>
            <input type="file" id="design-ref-image" accept="image/*" multiple style="font-family:var(--font-data);font-size:11px;color:var(--text-dim);margin-top:4px">
          </div>
          <div style="grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 6px; padding: 0 2px; align-items: center" id="style-hints">
            <span style="font-family:var(--font-data);font-size:10px;color:var(--text-dim)">Loading tags...</span>
          </div>
          <div style="grid-column: 1 / -1; margin-top: -6px; text-align: right">
            <button type="button" id="edit-style-tags-btn" style="background:transparent;border:none;color:var(--text-dim);font-family:var(--font-data);font-size:10px;letter-spacing:0.05em;cursor:pointer;text-decoration:underline">Edit tags</button>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-submit" id="submit-btn" onclick="submitTask()">Submit Design Task</button>
          <span class="form-status" id="form-status"></span>
        </div>
      </div>
    </section>

    <!-- TASK GALLERY -->
    <section class="fade-up delay-3">
      <div class="section-header">Design Tasks</div>
      <div class="tasks-grid" id="tasks-grid">
        <div class="empty-state">No design tasks yet. Create one above.</div>
      </div>
    </section>
  </main>
</div>

<script>
const API = '/designer/tasks';

async function loadTasks() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(res.status);
    const tasks = await res.json();
    renderTasks(tasks);
  } catch(e) {
    document.getElementById('tasks-grid').innerHTML = '<div class="empty-state">Could not connect to Designer API (port 3004)</div>';
  }
}

function renderTasks(tasks) {
  if (!tasks.length) {
    document.getElementById('tasks-grid').innerHTML = '<div class="empty-state">No design tasks yet. Create one above.</div>';
    return;
  }

  const typeLabels = {
    instagram_post: 'Instagram Post', instagram_carousel: 'IG Carousel', your_story: 'Story', youtube_thumbnail: 'YT Thumbnail',
    youtube_banner: 'YT Banner', twitter_post: 'X Post', facebook_post: 'FB Post', ad_creative: 'Ad Creative',
    infographic: 'Infographic', poster: 'Poster', presentation: 'Presentation', logo: 'Logo'
  };

  document.getElementById('tasks-grid').innerHTML = tasks.map(t => {
    const time = new Date(t.created_at).toLocaleString('nl-NL', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
    return `<div class="task-card">
      <div class="task-thumb">
        ${t.result_thumbnail && !t.result_thumbnail.includes('canva.com/d/')
          ? `<img src="${t.result_thumbnail}" alt="Design preview" />`
          : t.result_url && t.result_url.includes('canva.com')
            ? `<a href="${t.result_url}" target="_blank" style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;text-decoration:none;flex-direction:column;gap:6px">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M15 9.5a3.5 3.5 0 11-5.2 3.8"/><circle cx="12" cy="12" r="1.5" fill="var(--primary)"/></svg>
                <span style="font-size:10px;color:var(--text-dim)">Open in Canva</span>
              </a>`
            : t.status === 'processing'
              ? '<span style="animation:pulse-glow 1.5s infinite">Generating...</span>'
              : t.status === 'pending'
                ? '<span>Awaiting processing</span>'
                : t.status === 'failed'
                  ? '<span style="color:var(--danger)">Failed</span>'
                  : '<span>No preview</span>'
        }
      </div>
      <div class="task-body">
        <div class="task-type">${typeLabels[t.design_type] || t.design_type}${t.aspect_ratio ? ' &middot; ' + t.aspect_ratio : ''} &middot; ${t.brand}</div>
        <div class="task-desc">${t.description}</div>
        <div class="task-footer">
          <span class="task-status-badge ${t.status}">${t.status}</span>
          <span class="task-time">${time}</span>
          ${t.result_url ? `<a class="task-link" href="${t.result_url}" target="_blank" ${t.result_url.startsWith('/generated') ? 'download' : ''}>${t.engine === 'playwright' || t.engine === 'nanobanana' ? 'Download' : t.engine === 'claude' ? 'Open Design' : 'Open in Canva'}</a>` : ''}
          <button class="task-delete" onclick="deleteTask('${t.id}')" title="Delete">&#x2715;</button>
        </div>
        ${t.error ? `<div style="margin-top:8px;font-size:10px;color:var(--danger);font-family:var(--font-data)">${t.error}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// Show/hide slide count and aspect ratio fields based on design type
document.getElementById('design-type').addEventListener('change', function() {
  document.getElementById('slide-count-field').style.display = this.value === 'instagram_carousel' ? '' : 'none';
  document.getElementById('aspect-ratio-field').style.display = this.value === 'ad_creative' ? '' : 'none';
});

// Aspect-ratio chip toggles (multi-select, always keep at least one active)
document.querySelectorAll('#aspect-chips .style-tag').forEach(el => {
  el.addEventListener('click', () => {
    el.classList.toggle('active');
    const active = document.querySelectorAll('#aspect-chips .style-tag.active');
    if (active.length === 0) el.classList.add('active');
  });
});

async function submitTask() {
  const btn = document.getElementById('submit-btn');
  const status = document.getElementById('form-status');
  const desc = document.getElementById('design-desc').value.trim();
  if (!desc) { status.textContent = 'Please enter a description'; return; }

  btn.disabled = true;
  status.textContent = 'Submitting...';

  const designType = document.getElementById('design-type').value;
  const slideCount = designType === 'instagram_carousel' ? parseInt(document.getElementById('design-slides').value) || 3 : null;
  const aspectRatios = designType === 'ad_creative'
    ? [...document.querySelectorAll('#aspect-chips .style-tag.active')].map(el => el.dataset.aspect)
    : null;

  try {
    const refImageInput = document.getElementById('design-ref-image');
    const hasRefImage = refImageInput.files && refImageInput.files.length > 0;

    const MAX_REF_MB = 50;
    if (hasRefImage) {
      const tooBig = Array.from(refImageInput.files).find(f => f.size > MAX_REF_MB * 1024 * 1024);
      if (tooBig) {
        const mb = (tooBig.size / (1024 * 1024)).toFixed(1);
        throw new Error(`"${tooBig.name}" is ${mb}MB — max ${MAX_REF_MB}MB per reference image.`);
      }
    }

    let res;
    if (hasRefImage) {
      const fd = new FormData();
      fd.append('design_type', designType);
      fd.append('brand', document.getElementById('design-brand').value);
      fd.append('brand_kit_id', document.getElementById('design-brandkit').value || '');
      fd.append('engine', document.getElementById('design-engine').value);
      fd.append('template', document.getElementById('design-template').value);
      fd.append('logo_position', document.getElementById('design-logo-position').value);
      fd.append('logo_size', document.getElementById('design-logo-size').value);
      if (slideCount) fd.append('slide_count', slideCount);
      if (aspectRatios && aspectRatios.length) {
        for (const ar of aspectRatios) fd.append('aspect_ratios', ar);
      }
      fd.append('description', desc);
      for (const file of refImageInput.files) {
        fd.append('ref_image', file);
      }
      res = await fetch(API, { method: 'POST', body: fd });
    } else {
      res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          design_type: designType,
          brand: document.getElementById('design-brand').value,
          brand_kit_id: document.getElementById('design-brandkit').value || null,
          engine: document.getElementById('design-engine').value,
          template: document.getElementById('design-template').value,
          logo_position: document.getElementById('design-logo-position').value,
          logo_size: document.getElementById('design-logo-size').value,
          slide_count: slideCount,
          aspect_ratios: aspectRatios,
          description: desc,
        }),
      });
    }
    if (!res.ok) {
      let msg = `Request failed (${res.status})`;
      try { const err = await res.json(); if (err && err.error) msg = err.error; } catch {}
      throw new Error(msg);
    }
    document.getElementById('design-desc').value = '';
    document.getElementById('design-ref-image').value = '';
    status.textContent = 'Task submitted!';
    loadTasks();
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
  } finally {
    btn.disabled = false;
    setTimeout(() => { status.textContent = ''; }, 3000);
  }
}

async function deleteTask(id) {
  await fetch(API + '/' + id, { method: 'DELETE' });
  loadTasks();
}

// ── STYLE TAGS (loaded from /style-tags, customer-editable) ──
const STYLE_PREFIX_RE = /^style\s*:\s*([^\n]*)/i;
let styleTagsCache = { categories: [] };

async function loadStyleTags() {
  const container = document.getElementById('style-hints');
  try {
    const res = await fetch('/style-tags');
    if (!res.ok) throw new Error(res.status);
    styleTagsCache = await res.json();
  } catch {
    styleTagsCache = { categories: [] };
  }
  renderStyleTags();
}

function renderStyleTags() {
  const container = document.getElementById('style-hints');
  const cats = (styleTagsCache.categories || []).filter(c => c.tags && c.tags.length);
  if (!cats.length) {
    container.innerHTML = '<span style="font-family:var(--font-data);font-size:10px;color:var(--text-dim)">No style tags yet. Click "Edit tags" to add some.</span>';
    return;
  }
  const labelStyle = 'font-family:var(--font-data);font-size:9px;color:var(--text-dim);letter-spacing:0.05em;margin-right:4px;align-self:center';
  const sepStyle = 'font-family:var(--font-data);font-size:9px;color:var(--text-dim);margin:0 2px;align-self:center';
  const parts = [];
  cats.forEach((cat, i) => {
    if (i > 0) parts.push(`<span style="${sepStyle}">|</span>`);
    parts.push(`<span style="${labelStyle}">${escapeHtml(cat.label.toUpperCase())}</span>`);
    cat.tags.forEach(tag => {
      parts.push(`<span class="style-tag" data-kw="${escapeAttr(tag.kw)}">${escapeHtml(tag.name)}</span>`);
    });
  });
  container.innerHTML = parts.join('');
  attachStyleTagHandlers();
  syncStyleTags();
}

function attachStyleTagHandlers() {
  document.querySelectorAll('#style-hints .style-tag').forEach(tag => {
    tag.addEventListener('click', () => {
      const kw = tag.dataset.kw;
      const ta = document.getElementById('design-desc');
      const match = ta.value.match(STYLE_PREFIX_RE);
      if (match) {
        const keywords = match[1].trim().split(/\s+/).filter(Boolean);
        const idx = keywords.indexOf(kw);
        if (idx >= 0) keywords.splice(idx, 1); else keywords.push(kw);
        if (keywords.length === 0) {
          ta.value = ta.value.replace(STYLE_PREFIX_RE, '').replace(/^\n+/, '');
        } else {
          ta.value = ta.value.replace(STYLE_PREFIX_RE, 'style: ' + keywords.join(' '));
        }
      } else {
        ta.value = 'style: ' + kw + (ta.value ? '\n' + ta.value : '');
      }
      syncStyleTags();
    });
  });
}

function syncStyleTags() {
  const ta = document.getElementById('design-desc');
  const match = ta.value.match(STYLE_PREFIX_RE);
  const active = match ? match[1].trim().split(/\s+/).filter(Boolean) : [];
  document.querySelectorAll('#style-hints .style-tag').forEach(t => {
    t.classList.toggle('active', active.includes(t.dataset.kw));
  });
}
document.getElementById('design-desc').addEventListener('input', syncStyleTags);

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return escapeHtml(s); }

// ── STYLE TAG EDITOR MODAL (structured per-category editor) ──
let editorState = null;
let editorModal = null;

function openStyleTagEditor() {
  // Deep-clone the current cache so cancel doesn't affect anything
  editorState = {
    categories: (styleTagsCache.categories || []).map(c => ({
      label: c.label,
      tags: (c.tags || []).map(t => ({ name: t.name, kw: t.kw })),
    })),
  };
  if (editorModal) editorModal.remove();
  editorModal = document.createElement('div');
  editorModal.id = 'style-tag-modal';
  editorModal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  editorModal.innerHTML = `
    <div style="background:hsl(0,0%,5%);border:1px solid hsl(217,32%,20%);border-radius:12px;padding:24px;width:100%;max-width:680px;max-height:90vh;display:flex;flex-direction:column;gap:14px;font-family:Inter,sans-serif;color:hsl(210,40%,98%)">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
        <div style="font-size:16px;font-weight:600">Manage Style Tags</div>
        <button type="button" id="style-tag-close" style="background:transparent;border:none;color:hsl(215,20%,65%);font-size:20px;cursor:pointer;line-height:1;padding:0 4px" aria-label="Close">×</button>
      </div>
      <div style="font-size:12px;color:hsl(215,20%,65%);line-height:1.5">
        Click a tag's name to rename it. The keyword is what gets injected into the prompt (defaults to the name when empty).
      </div>
      <div id="style-tag-editor-body" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding-right:4px"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between;padding-top:6px;border-top:1px solid hsl(217,32%,20%)">
        <button type="button" id="style-tag-add-cat" style="background:transparent;border:1px dashed hsl(217,32%,30%);color:hsl(210,40%,90%);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:12px">+ Add category</button>
        <div style="display:flex;gap:8px">
          <button type="button" id="style-tag-reset" style="background:transparent;border:1px solid hsl(217,32%,20%);color:hsl(215,20%,65%);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:12px">Reset to defaults</button>
          <button type="button" id="style-tag-cancel" style="background:transparent;border:1px solid hsl(217,32%,20%);color:hsl(215,20%,65%);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:12px">Cancel</button>
          <button type="button" id="style-tag-save" style="background:hsl(264,65%,49%);border:none;color:#fff;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500">Save</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(editorModal);

  editorModal.querySelector('#style-tag-close').onclick = closeEditor;
  editorModal.querySelector('#style-tag-cancel').onclick = closeEditor;
  editorModal.onclick = (e) => { if (e.target === editorModal) closeEditor(); };
  editorModal.querySelector('#style-tag-add-cat').onclick = () => {
    editorState.categories.push({ label: 'New Category', tags: [] });
    renderEditor();
    // Focus the new category label input
    setTimeout(() => {
      const inputs = editorModal.querySelectorAll('input.cat-label');
      const last = inputs[inputs.length - 1];
      if (last) { last.focus(); last.select(); }
    }, 10);
  };
  editorModal.querySelector('#style-tag-reset').onclick = async () => {
    if (!confirm('Reset all tags to the default set? Your custom tags will be lost.')) return;
    const res = await fetch('/style-tags', {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ categories: [] }),
    });
    if (!res.ok) { alert('Reset failed'); return; }
    closeEditor();
    await loadStyleTags();
  };
  editorModal.querySelector('#style-tag-save').onclick = async () => {
    const cleaned = {
      categories: editorState.categories
        .map(c => ({
          label: (c.label || '').trim() || 'Tags',
          tags: c.tags
            .map(t => ({ name: (t.name || '').trim(), kw: (t.kw || '').trim() || (t.name || '').trim() }))
            .filter(t => t.name),
        }))
        .filter(c => c.tags.length > 0),
    };
    const res = await fetch('/style-tags', {
      method: 'PUT', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(cleaned),
    });
    if (!res.ok) { alert('Save failed'); return; }
    closeEditor();
    await loadStyleTags();
  };

  renderEditor();
}

function closeEditor() {
  if (editorModal) { editorModal.remove(); editorModal = null; }
  editorState = null;
}

function renderEditor() {
  const body = editorModal.querySelector('#style-tag-editor-body');
  if (!editorState.categories.length) {
    body.innerHTML = '<div style="color:hsl(215,20%,65%);font-size:13px;text-align:center;padding:20px">No categories yet. Click "+ Add category" to start.</div>';
    return;
  }
  body.innerHTML = editorState.categories.map((cat, ci) => `
    <div style="border:1px solid hsl(217,32%,20%);border-radius:10px;padding:14px;background:hsl(0,0%,3%)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <input type="text" class="cat-label" data-ci="${ci}" value="${escapeAttr(cat.label)}" placeholder="Category name"
          style="flex:1;background:hsl(217,32%,15%);border:1px solid hsl(217,32%,20%);border-radius:6px;padding:7px 10px;color:hsl(210,40%,98%);font-size:13px;font-weight:500;font-family:Inter,sans-serif">
        <button type="button" class="cat-up" data-ci="${ci}" ${ci === 0 ? 'disabled' : ''}
          style="background:transparent;border:1px solid hsl(217,32%,20%);color:hsl(215,20%,65%);padding:5px 9px;border-radius:6px;cursor:${ci === 0 ? 'not-allowed' : 'pointer'};font-size:11px;opacity:${ci === 0 ? '0.4' : '1'}">↑</button>
        <button type="button" class="cat-down" data-ci="${ci}" ${ci === editorState.categories.length - 1 ? 'disabled' : ''}
          style="background:transparent;border:1px solid hsl(217,32%,20%);color:hsl(215,20%,65%);padding:5px 9px;border-radius:6px;cursor:${ci === editorState.categories.length - 1 ? 'not-allowed' : 'pointer'};font-size:11px;opacity:${ci === editorState.categories.length - 1 ? '0.4' : '1'}">↓</button>
        <button type="button" class="cat-del" data-ci="${ci}"
          style="background:transparent;border:1px solid hsl(0,72%,30%);color:hsl(0,72%,65%);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px">Delete</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <div style="display:grid;grid-template-columns:1fr 1fr 32px;gap:6px;font-size:10px;color:hsl(215,20%,55%);letter-spacing:0.05em;padding:0 2px;text-transform:uppercase">
          <div>Name</div><div>Keyword (sent to AI)</div><div></div>
        </div>
        ${cat.tags.map((tag, ti) => `
          <div style="display:grid;grid-template-columns:1fr 1fr 32px;gap:6px;align-items:center">
            <input type="text" class="tag-name" data-ci="${ci}" data-ti="${ti}" value="${escapeAttr(tag.name)}" placeholder="display name"
              style="background:hsl(217,32%,15%);border:1px solid hsl(217,32%,20%);border-radius:6px;padding:6px 9px;color:hsl(210,40%,98%);font-size:12px;font-family:Inter,sans-serif">
            <input type="text" class="tag-kw" data-ci="${ci}" data-ti="${ti}" value="${escapeAttr(tag.kw)}" placeholder="(same as name)"
              style="background:hsl(217,32%,15%);border:1px solid hsl(217,32%,20%);border-radius:6px;padding:6px 9px;color:hsl(210,40%,98%);font-size:12px;font-family:Inter,sans-serif">
            <button type="button" class="tag-del" data-ci="${ci}" data-ti="${ti}"
              style="background:transparent;border:1px solid hsl(0,72%,30%);color:hsl(0,72%,65%);padding:5px 0;border-radius:6px;cursor:pointer;font-size:14px;line-height:1" title="Delete tag">×</button>
          </div>
        `).join('')}
        <button type="button" class="tag-add" data-ci="${ci}"
          style="margin-top:4px;align-self:flex-start;background:transparent;border:1px dashed hsl(217,32%,25%);color:hsl(210,40%,90%);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:11px">+ Add tag</button>
      </div>
    </div>
  `).join('');

  // Attach handlers
  body.querySelectorAll('input.cat-label').forEach(el => {
    el.addEventListener('input', e => {
      editorState.categories[+e.target.dataset.ci].label = e.target.value;
    });
  });
  body.querySelectorAll('input.tag-name').forEach(el => {
    el.addEventListener('input', e => {
      editorState.categories[+e.target.dataset.ci].tags[+e.target.dataset.ti].name = e.target.value;
    });
  });
  body.querySelectorAll('input.tag-kw').forEach(el => {
    el.addEventListener('input', e => {
      editorState.categories[+e.target.dataset.ci].tags[+e.target.dataset.ti].kw = e.target.value;
    });
  });
  body.querySelectorAll('.cat-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const ci = +btn.dataset.ci;
      const cat = editorState.categories[ci];
      if (cat.tags.length && !confirm(`Delete category "${cat.label}" and its ${cat.tags.length} tag(s)?`)) return;
      editorState.categories.splice(ci, 1);
      renderEditor();
    });
  });
  body.querySelectorAll('.cat-up').forEach(btn => {
    btn.addEventListener('click', () => {
      const ci = +btn.dataset.ci;
      if (ci > 0) {
        const cats = editorState.categories;
        [cats[ci - 1], cats[ci]] = [cats[ci], cats[ci - 1]];
        renderEditor();
      }
    });
  });
  body.querySelectorAll('.cat-down').forEach(btn => {
    btn.addEventListener('click', () => {
      const ci = +btn.dataset.ci;
      const cats = editorState.categories;
      if (ci < cats.length - 1) {
        [cats[ci + 1], cats[ci]] = [cats[ci], cats[ci + 1]];
        renderEditor();
      }
    });
  });
  body.querySelectorAll('.tag-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const ci = +btn.dataset.ci;
      const ti = +btn.dataset.ti;
      editorState.categories[ci].tags.splice(ti, 1);
      renderEditor();
    });
  });
  body.querySelectorAll('.tag-add').forEach(btn => {
    btn.addEventListener('click', () => {
      const ci = +btn.dataset.ci;
      editorState.categories[ci].tags.push({ name: '', kw: '' });
      renderEditor();
      // Focus the newly added tag's name input
      setTimeout(() => {
        const inputs = body.querySelectorAll(`input.tag-name[data-ci="${ci}"]`);
        const last = inputs[inputs.length - 1];
        if (last) last.focus();
      }, 10);
    });
  });
}

document.getElementById('edit-style-tags-btn').addEventListener('click', openStyleTagEditor);
loadStyleTags();

// Populate brand dropdown from /brands
async function loadBrandOptions() {
  try {
    const res = await fetch('/brands');
    if (!res.ok) return;
    const data = await res.json();
    const names = Object.keys(data).sort();
    const sel = document.getElementById('design-brand');
    const current = sel.value;
    sel.innerHTML = names.map(n => `<option value="${n}">${n}</option>`).join('');
    if (current && names.includes(current)) sel.value = current;
  } catch {}
}
loadBrandOptions();

// Populate brand kit dropdown from connected Canva (empty if not connected).
// Names are suffixed with "(canva)" so users know the data origin.
async function loadBrandKitOptions() {
  try {
    const res = await fetch('/canva/brand-kits');
    if (!res.ok) return;
    const data = await res.json();
    const kits = Array.isArray(data.kits) ? data.kits : [];
    const sel = document.getElementById('design-brandkit');
    const current = sel.value;
    sel.innerHTML = '<option value="">None</option>' +
      kits.map(k => `<option value="${k.id}">${(k.name || k.id)} (canva)</option>`).join('');
    if (current && kits.some(k => k.id === current)) sel.value = current;
  } catch {}
}
loadBrandKitOptions();

// Load tasks and poll every 10 seconds
loadTasks();
setInterval(loadTasks, 10000);
