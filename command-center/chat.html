<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>try{var t=localStorage.getItem("cc_theme");if(t==="light")document.documentElement.setAttribute("data-theme","light");}catch(e){}</script>
<link rel="stylesheet" href="/theme.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: hsl(0 0% 0%); --bg-base: hsl(0 0% 3%); --bg-surface: hsl(0 0% 5%);
  --bg-card: hsl(0 0% 5%); --bg-card-hover: hsl(0 0% 8%); --bg-sidebar: hsl(0 0% 2%);
  --border: hsl(217 32% 20%); --border-glow: hsla(264 65% 49% / 0.3);
  --primary: hsl(264 65% 49%); --primary-dim: hsla(264 65% 49% / 0.5); --primary-glow: hsla(264 65% 65% / 0.4);
  --accent: hsl(264 65% 49%); --success: hsl(142 76% 36%); --danger: hsl(0 72% 51%);
  --warning: hsl(45 93% 55%); --premium: hsl(270 95% 65%);
  --text: hsl(210 40% 98%); --text-dim: hsl(215 20% 65%); --text-muted: hsl(217 32% 17%);
  --font-display: 'Akira Expanded', 'Orbitron', sans-serif;
  --font-data: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --radius: 10px; --sidebar-w: 62px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; overflow: hidden; width: 100%; }
body { font-family: var(--font-body); background: var(--bg-deep); color: var(--text); height: 100dvh; height: 100vh; overflow: hidden; width: 100%; }
@supports (height: 100dvh) { body { height: 100dvh; } }
body::before { content: ''; position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 80% 60% at 20% 10%, hsla(264 65% 49% / 0.024) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 80% 80%, hsla(264 65% 49% / 0.024) 0%, transparent 60%); pointer-events: none; }
.layout { display: flex; height: 100%; width: 100%; position: relative; z-index: 1; overflow: hidden; }
.sidebar { width: var(--sidebar-w); min-height: 100vh; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 16px 0; position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; }
.sidebar-logo { font-family: var(--font-display); font-size: 10px; font-weight: 900; color: var(--primary); letter-spacing: 0.2em; margin-bottom: 28px; text-shadow: 0 0 20px var(--primary-glow); }
.sidebar-nav { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.nav-item { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: var(--text-dim); cursor: pointer; transition: all 0.2s; position: relative; border: 1px solid transparent; text-decoration: none; }
.nav-item:hover { color: var(--primary); background: hsla(264 65% 49% / 0.03); }
.nav-item.active { color: var(--primary); background: hsla(264 65% 49% / 0.063); border-color: var(--border-glow); box-shadow: 0 0 16px hsla(264 65% 49% / 0.063); }
.nav-item .tooltip { position: absolute; left: 52px; top: 50%; transform: translateY(-50%); background: var(--bg-card); border: 1px solid var(--border); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-family: var(--font-body); color: var(--text); white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
.nav-item:hover .tooltip { opacity: 1; }
.nav-item svg { width: 18px; height: 18px; }
@keyframes pulse-glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

.main {
  flex: 1; margin-left: var(--sidebar-w); display: flex; flex-direction: column; height: 100%;
}
.chat-header {
  padding: 20px 32px 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between;
}
.header-left { flex: 1; }
.header-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; font-family: var(--font-data); }
.new-chat-btn {
  width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--border);
  background: transparent; color: var(--text-dim); display: flex; align-items: center;
  justify-content: center; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.new-chat-btn:hover { color: var(--primary); border-color: var(--primary); background: hsla(264 65% 49% / 0.04); }
.new-chat-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 24px 32px; display: flex; flex-direction: column; gap: 16px;
}
.chat-messages::-webkit-scrollbar { width: 6px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.msg { max-width: 75%; display: flex; flex-direction: column; gap: 4px; animation: msg-in 0.25s ease-out; }
@keyframes msg-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { align-self: flex-end; }
.msg.assistant { align-self: flex-start; }
.msg-bubble {
  padding: 12px 16px; border-radius: 12px; font-size: 13px; line-height: 1.7;
  font-family: var(--font-data); white-space: pre-wrap; word-break: break-word;
}
.msg.user .msg-bubble {
  background: hsla(264 65% 49% / 0.15); border: 1px solid hsla(264 65% 49% / 0.3); color: var(--text);
}
.msg.assistant .msg-bubble {
  background: var(--bg-card); border: 1px solid var(--border); color: var(--text);
}
.msg-label {
  font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em;
  font-family: var(--font-data); color: var(--text-dim); padding: 0 4px;
}
.msg.user .msg-label { text-align: right; }
.msg-bubble code {
  background: hsla(0 0% 100% / 0.06); padding: 1px 5px; border-radius: 4px; font-size: 12px;
}
.msg-bubble pre {
  background: hsla(0 0% 100% / 0.04); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 14px; overflow-x: auto; margin: 8px 0; font-size: 12px;
}

.chat-input-wrap {
  padding: 16px 32px 20px; border-top: 1px solid var(--border);
  background: linear-gradient(180deg, hsla(0 0% 3% / 0.8), hsla(0 0% 0% / 1));
}
.chat-input-row { display: flex; gap: 10px; align-items: flex-end; }
.chat-textarea {
  flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 16px; color: var(--text); font-family: var(--font-data); font-size: 13px;
  resize: none; outline: none; min-height: 44px; max-height: 150px; line-height: 1.5;
  transition: border-color 0.2s;
}
.chat-textarea:focus { border-color: var(--primary); }
.chat-textarea::placeholder { color: var(--text-dim); }
.chat-send {
  width: 44px; height: 44px; border-radius: 12px; border: none; cursor: pointer;
  background: linear-gradient(135deg, var(--primary), hsl(264 65% 65%));
  color: white; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
}
.chat-send:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--primary-glow); }
.chat-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.chat-send svg { width: 18px; height: 18px; }

.chat-upload {
  width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--border);
  background: transparent; color: var(--text-dim); display: flex; align-items: center;
  justify-content: center; cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.chat-upload:hover { color: var(--primary); border-color: var(--primary); background: hsla(264 65% 49% / 0.04); }
.chat-upload svg { width: 18px; height: 18px; }
.chat-upload.uploading { opacity: 0.5; pointer-events: none; }

.chat-skills-btn {
  width: 44px; height: 44px; border-radius: 12px; border: 1px solid var(--border);
  background: transparent; color: var(--text-dim); display: flex; align-items: center;
  justify-content: center; cursor: pointer; transition: all 0.2s; flex-shrink: 0; position: relative;
}
.chat-skills-btn:hover { color: var(--primary); border-color: var(--primary); background: hsla(264 65% 49% / 0.04); }
.chat-skills-btn.active { color: var(--primary); border-color: var(--primary); background: hsla(264 65% 49% / 0.08); }
.chat-skills-btn svg { width: 18px; height: 18px; }

.skills-panel {
  display: none; position: absolute; bottom: calc(100% + 8px); left: 0; right: 0;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
  padding: 0; max-height: 420px; overflow: hidden; z-index: 50;
  box-shadow: 0 -8px 32px hsla(0 0% 0% / 0.6);
  animation: skills-in 0.2s ease-out;
}
.skills-panel.open { display: flex; flex-direction: column; }
@keyframes skills-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.skills-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.skills-panel-title { font-family: var(--font-data); font-size: 12px; font-weight: 600; color: var(--text); letter-spacing: 0.05em; text-transform: uppercase; }
.skills-panel-close {
  width: 24px; height: 24px; border-radius: 6px; border: none; background: transparent;
  color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all 0.15s;
}
.skills-panel-close:hover { color: var(--text); background: hsla(0 0% 100% / 0.05); }

.skills-search {
  margin: 10px 16px 6px; padding: 8px 12px; background: var(--bg-surface);
  border: 1px solid var(--border); border-radius: 8px; color: var(--text);
  font-family: var(--font-data); font-size: 12px; outline: none; transition: border-color 0.2s;
}
.skills-search:focus { border-color: var(--primary); }
.skills-search::placeholder { color: var(--text-dim); }

.skills-list { overflow-y: auto; padding: 6px 8px 12px; flex: 1; }
.skills-list::-webkit-scrollbar { width: 4px; }
.skills-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.skills-category {
  font-family: var(--font-data); font-size: 10px; font-weight: 600; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.08em; padding: 10px 8px 4px; user-select: none;
}

.skill-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px;
  cursor: pointer; transition: all 0.15s; border: 1px solid transparent;
}
.skill-item:hover { background: hsla(264 65% 49% / 0.06); border-color: hsla(264 65% 49% / 0.15); }
.skill-item-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.skill-item-text { flex: 1; min-width: 0; }
.skill-item-name { font-family: var(--font-data); font-size: 12px; font-weight: 500; color: var(--text); }
.skill-item-desc { font-family: var(--font-data); font-size: 10px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.file-preview {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px; margin-bottom: 8px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
  font-size: 12px; color: var(--text-dim); font-family: var(--font-data);
}
.file-preview .file-icon { color: var(--primary); flex-shrink: 0; }
.file-preview .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
.file-preview .file-remove {
  width: 20px; height: 20px; border-radius: 50%; border: none; background: hsla(0 72% 51% / 0.15);
  color: var(--danger); cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; line-height: 1; transition: all 0.2s; flex-shrink: 0;
}
.file-preview .file-remove:hover { background: hsla(0 72% 51% / 0.3); }

.typing-indicator { display: flex; gap: 4px; padding: 8px 0; }
.typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); animation: typing 1.2s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%, 60%, 100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-4px); } }

.welcome { text-align: center; margin: auto; max-width: 500px; }
.welcome-title { font-family: var(--font-display); font-size: 16px; letter-spacing: 0.1em; margin-bottom: 8px; color: var(--text); }
.welcome-sub { font-size: 12px; color: var(--text-dim); line-height: 1.8; font-family: var(--font-data); }
.quick-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; justify-content: center; }
.quick-btn {
  font-family: var(--font-data); font-size: 11px; padding: 8px 14px; border-radius: 8px;
  border: 1px solid var(--border); background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.2s;
}
.quick-btn:hover { color: var(--primary); border-color: var(--primary); background: hsla(264 65% 49% / 0.04); }

/* ── Mobile menu toggle ── */
.mobile-menu-btn {
  display: none; width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border);
  background: transparent; color: var(--text-dim); cursor: pointer; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s;
}
.mobile-menu-btn:hover { color: var(--primary); border-color: var(--primary); }
.mobile-menu-btn svg { width: 18px; height: 18px; }
.sidebar-overlay {
  display: none; position: fixed; inset: 0; background: hsla(0 0% 0% / 0.6);
  z-index: 99; opacity: 0; transition: opacity 0.2s;
}
.sidebar-overlay.active { display: block; opacity: 1; }

/* ── Responsive ── */
@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }
  .sidebar, .sidebar.open {
    position: fixed; left: 0; right: 0; bottom: 0; top: auto;
    width: 100%; min-height: auto; height: auto;
    flex-direction: row; border-right: none;
    border-top: 1px solid var(--border);
    padding: 6px 0 env(safe-area-inset-bottom, 4px);
    overflow-x: auto; overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    z-index: 120; background: var(--bg-sidebar);
    scrollbar-width: none; transform: none;
  }
  .sidebar::-webkit-scrollbar { display: none; }
  .sidebar::after {
    content: ''; position: sticky; right: 0; top: 0; bottom: 0;
    width: 28px; flex-shrink: 0;
    background: linear-gradient(90deg, transparent, var(--bg-sidebar));
    pointer-events: none;
  }
  .sidebar-logo { display: none; }
  .sidebar-nav { flex-direction: row; gap: 1px; flex: none; padding: 0 4px; }
  .nav-item { width: 36px; height: 36px; flex-shrink: 0; }
  .nav-item .tooltip { display: none; }
  .nav-item svg { width: 17px; height: 17px; }
  .sidebar .notif-bell { width: 36px; height: 36px; margin-top: 0; }
  .sidebar > .nav-item:last-child { display: none; }
  .mobile-menu-btn { display: none !important; }
  .sidebar-overlay { display: none !important; }
  .main { margin-left: 0; width: 100%; overflow-x: hidden; padding-bottom: 68px; }
  .chat-header { padding: 14px 16px 12px; }
  .header-title { font-size: 17px; }
  .header-sub { font-size: 11px; }
  .chat-messages { padding: 16px 12px; }
  .msg { max-width: 90%; }
  .msg-bubble { padding: 10px 14px; font-size: 13px; }
  .chat-input-wrap { padding: 8px 10px calc(env(safe-area-inset-bottom, 4px) + 8px); overflow: hidden; }
  .chat-input-row { gap: 6px; max-width: 100%; }
  .chat-textarea { padding: 10px 12px; font-size: 14px; min-height: 40px; min-width: 0; }
  .chat-send { width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0; }
  .chat-upload { width: 40px; height: 40px; border-radius: 10px; }
  .chat-skills-btn { width: 40px; height: 40px; border-radius: 10px; }
  .skills-panel { left: 8px; right: 8px; bottom: auto; max-height: 50vh; }
  .welcome { padding: 0 8px; }
  .welcome-title { font-size: 14px; }
  .quick-actions { gap: 6px; }
  .quick-btn { font-size: 11px; padding: 7px 12px; }
}

@media (max-width: 380px) {
  .chat-header { padding: 12px 10px 10px; }
  .chat-messages { padding: 12px 8px; }
  .chat-input-wrap { padding: 8px 8px 12px; }
  .msg { max-width: 95%; }
  .header-title { font-size: 15px; }
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <main class="main">
    <div class="chat-header">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="header-left">
        <div class="header-title" id="chat-assistant-title">ASSISTANT</div>
        <div class="header-sub">Zet taken uit bij je agents, stel vragen en wees up to date over je business!</div>
      </div>
    </div>

    <div class="chat-messages" id="chat-messages">
      <div class="welcome">
        <div class="welcome-title">Waarmee kan ik helpen?</div>
        <div class="welcome-sub">
          Ik heb live toegang tot je bots, alle agents, 49 skills, calendar en web search.
          Ik kan taken aanmaken, marketing advies geven, designs maken, en meer.
        </div>
        <div class="quick-actions">
          <button class="quick-btn" onclick="sendQuick('Hoe presteren mijn bots vandaag?')">Bot performance</button>
          <button class="quick-btn" onclick="sendQuick('Welke agents hebben taken openstaan?')">Agent status</button>
          <button class="quick-btn" onclick="sendQuick('Maak een Instagram carousel over onze trading resultaten')">Design maken</button>
          <button class="quick-btn" onclick="sendQuick('Wat is de totale PnL en equity?')">Portfolio overzicht</button>
          <button class="quick-btn" onclick="sendQuick('Welke skills heb ik allemaal beschikbaar?')">Skills overzicht</button>
          <button class="quick-btn" onclick="sendQuick('Wat staat er vandaag op mijn agenda?')">Agenda</button>
        </div>
      </div>
    </div>

    <div class="chat-input-wrap" style="position:relative;">
      <div id="skills-panel" class="skills-panel">
        <div class="skills-panel-header">
          <span class="skills-panel-title">Skills</span>
          <button class="skills-panel-close" onclick="toggleSkillsPanel()">&times;</button>
        </div>
        <input type="text" class="skills-search" id="skills-search" placeholder="Zoek skill..." oninput="filterSkills(this.value)">
        <div class="skills-list" id="skills-list"></div>
      </div>
      <div id="file-preview-area"></div>
      <div class="chat-input-row">
        <input type="file" id="file-input" accept="audio/*,video/*,.mp3,.mp4,.wav,.ogg,.aac,.m4a,.webm,.mkv,.avi,.mov,.flac,.pdf,application/pdf,text/*,.txt,.md,.markdown,.srt,.vtt,.csv,.json,.log" style="display:none" onchange="handleFileSelect(event)">
        <button class="new-chat-btn" onclick="clearChat()" title="New chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="chat-skills-btn" id="skills-btn" onclick="toggleSkillsPanel()" title="Skills">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        </button>
        <button class="chat-upload" id="upload-btn" onclick="document.getElementById('file-input').click()" title="Upload bestand">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <textarea class="chat-textarea" id="chat-input" placeholder="Stel een vraag..." rows="1" onkeydown="handleKey(event)"></textarea>
        <button class="chat-send" id="chat-send" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </main>
</div>

<script src="/auth-guard.js"></script>
<script src="/sidebar.js"></script>
<script src="/notif-panel.js"></script>
<script>
// ── Mobile sidebar toggle ──
function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('active');
}
function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('active');
}
</script>
<script>
const messagesEl = document.getElementById('chat-messages');
const inputEl = document.getElementById('chat-input');
const sendBtn = document.getElementById('chat-send');
let sending = false;
let ASSISTANT_NAME = 'Assistant';

// Load assistant name from brand config
fetch('/brand').then(r => r.json()).then(b => {
  if (b && b.assistant_name) {
    ASSISTANT_NAME = b.assistant_name;
    const titleEl = document.getElementById('chat-assistant-title');
    if (titleEl) titleEl.textContent = ASSISTANT_NAME.toUpperCase();
    const brandPrefix = (b && b.company_name) ? b.company_name : 'Command Center';
    document.title = brandPrefix + ' — ' + ASSISTANT_NAME;
    // Relabel any already-rendered messages
    document.querySelectorAll('.msg.assistant .msg-label').forEach(el => { el.textContent = ASSISTANT_NAME; });
  }
}).catch(() => {});

// ── Persistent session ──
const SESSION_KEY = 'cc_chat_session';
const HISTORY_KEY = 'cc_chat_history';

  sessionId = 'session_' + Date.now().toString(36);
  localStorage.setItem(SESSION_KEY, sessionId);

// Restore chat history from localStorage
function saveHistory() {
  const msgs = [];
  messagesEl.querySelectorAll('.msg').forEach(el => {
    const role = el.classList.contains('user') ? 'user' : 'assistant';
    const bubble = el.querySelector('.msg-bubble');
    if (bubble) msgs.push({ role, html: bubble.innerHTML });
  });
  localStorage.setItem(HISTORY_KEY, JSON.stringify(msgs));
}

function restoreHistory() {
  try {
    const msgs = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    if (!msgs.length) return;
    const welcome = messagesEl.querySelector('.welcome');
    if (welcome) welcome.remove();
    msgs.forEach(m => {
      const div = document.createElement('div');
      div.className = 'msg ' + m.role;
      const label = m.role === 'user' ? 'Jij' : ASSISTANT_NAME;
      div.innerHTML = `<div class="msg-label">${label}</div><div class="msg-bubble">${m.html}</div>`;
      messagesEl.appendChild(div);
    });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  } catch {}
}
restoreHistory();

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + 'px';
});

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendQuick(text) {
  const welcome = messagesEl.querySelector('.welcome');
  if (welcome) welcome.remove();
  inputEl.value = text;
  sendMessage();
}

function appendMsg(role, text, isHtml) {
  const welcome = messagesEl.querySelector('.welcome');
  if (welcome) welcome.remove();

  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const label = role === 'user' ? 'Jij' : ASSISTANT_NAME;

  let html = isHtml ? text : text;
  if (!isHtml && role === 'assistant') {
    html = text
      .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  }

  div.innerHTML = `<div class="msg-label">${label}</div><div class="msg-bubble">${!isHtml && role === 'user' ? escHtml(text) : html}</div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  saveHistory();
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing';
  div.innerHTML = '<div class="msg-label">' + ASSISTANT_NAME + '</div><div class="msg-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderSkills(filter) {
  const list = document.getElementById('skills-list');
  const q = (filter || '').toLowerCase();
  let html = '';
  for (const cat of SKILLS) {
    const filtered = cat.skills.filter(s => !q || s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q) || s.slug.includes(q));
    if (!filtered.length) continue;
    html += `<div class="skills-category">${cat.cat}</div>`;
    for (const s of filtered) {
      html += `<div class="skill-item" onclick="selectSkill('${s.slug}', '${s.name.replace(/'/g, "\\'")}')">
        <div class="skill-item-icon" style="background:${cat.color}">${cat.icon}</div>
        <div class="skill-item-text">
          <div class="skill-item-name">${s.name}</div>
          <div class="skill-item-desc">${s.desc}</div>
        </div>
      </div>`;
    }
  }
  if (!html) html = '<div style="padding:16px;text-align:center;color:var(--text-dim);font-size:12px;">Geen skills gevonden</div>';
  list.innerHTML = html;
}

function toggleSkillsPanel() {
  const panel = document.getElementById('skills-panel');
  const btn = document.getElementById('skills-btn');
  const isOpen = panel.classList.contains('open');
  if (isOpen) {
    panel.classList.remove('open');
    btn.classList.remove('active');
  } else {
    panel.classList.add('open');
    btn.classList.add('active');
    document.getElementById('skills-search').value = '';
    renderSkills();
    setTimeout(() => document.getElementById('skills-search').focus(), 50);
  }
}

// ── File upload handling ──
let pendingFile = null;
const TEXT_EXTS = ['.txt','.md','.markdown','.srt','.vtt','.csv','.json','.log'];
const TEXT_MAX_CHARS = 150000;

function isTextFile(name) {
  const n = name.toLowerCase();
  return TEXT_EXTS.some(ext => n.endsWith(ext));
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  pendingFile = file;
  showFilePreview(file.name);
  inputEl.focus();
  if (!inputEl.value.trim()) {
    const lower = file.name.toLowerCase();
    if (lower.endsWith('.pdf')) inputEl.value = 'Lees en vat dit PDF bestand samen';
    else if (isTextFile(file.name)) inputEl.value = 'Verwerk de inhoud van dit bestand';
    else inputEl.value = 'Transcribeer dit bestand';
  }
}

function showFilePreview(name) {
  const isPdf = name.toLowerCase().endsWith('.pdf');
  const icon = isPdf
    ? '<svg class="file-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>'
    : '<svg class="file-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>';
  const area = document.getElementById('file-preview-area');
  area.innerHTML = `<div class="file-preview">
    ${icon}
    <span class="file-name">${escHtml(name)}</span>
    <button class="file-remove" onclick="clearPendingFile()" title="Verwijder">&times;</button>
  </div>`;
}

function clearPendingFile() {
  pendingFile = null;
  document.getElementById('file-preview-area').innerHTML = '';
  document.getElementById('file-input').value = '';
}

async function uploadFile(file) {
  const formData = new FormData();
  formData.append('file', file);
  const res = await fetch('/media/upload', { method: 'POST', body: formData });
  if (!res.ok) throw new Error('Upload mislukt');
  return await res.json();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || sending) return;

  sending = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  let messageText = text;
  let uploadedFileName = null;

  // Upload file first if pending
  if (pendingFile) {
    const fileName = pendingFile.name;
    appendMsg('user', text + '\n📎 ' + fileName);
    const uploadBtn = document.getElementById('upload-btn');
    uploadBtn.classList.add('uploading');
    showTyping();
    try {
      if (isTextFile(fileName)) {
        // Read text content client-side and inline into the message
        const content = await pendingFile.text();
        const truncated = content.length > TEXT_MAX_CHARS
          ? content.slice(0, TEXT_MAX_CHARS) + `\n\n[...afgekapt, totaal ${content.length} tekens]`
          : content;
        messageText = `${text}\n\n[Inhoud van ${fileName}]:\n\`\`\`\n${truncated}\n\`\`\``;
      } else {
        const result = await uploadFile(pendingFile);
        uploadedFileName = result.name;
        messageText = text + `\n\n[Geüpload bestand: ${uploadedFileName}]`;
      }
    } catch (e) {
      removeTyping();
      appendMsg('assistant', 'Upload mislukt: ' + e.message);
      sending = false;
      sendBtn.disabled = false;
      uploadBtn.classList.remove('uploading');
      return;
    }
    uploadBtn.classList.remove('uploading');
    clearPendingFile();
  } else {
    appendMsg('user', text);
    showTyping();
  }

  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 10 * 60 * 1000);
    const res = await fetch('/ctrl/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: messageText, sessionId }),
      signal: controller.signal,
    });
    clearTimeout(timeoutId);
    removeTyping();

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: `Server error (${res.status})` }));
      appendMsg('assistant', 'Fout: ' + (err.error || `Server error ${res.status}`));
    } else {
      const data = await res.json();
      appendMsg('assistant', data.reply);
    }
  } catch (e) {
    removeTyping();
    appendMsg('assistant', e.name === 'AbortError' ? 'Timeout: de transcriptie duurde te lang. Probeer een kleiner model (tiny/base).' : 'Verbindingsfout: ' + e.message);
  }

  sending = false;
  sendBtn.disabled = false;
  inputEl.focus();
}
