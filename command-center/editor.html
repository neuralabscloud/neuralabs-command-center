<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Platform — Video Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: hsl(0 0% 0%); --bg-base: hsl(0 0% 3%); --bg-surface: hsl(0 0% 5%);
  --bg-card: hsl(0 0% 5%); --bg-card-hover: hsl(0 0% 8%); --bg-sidebar: hsl(0 0% 2%);
  --border: hsl(217 32% 20%); --border-glow: hsla(264 65% 49% / 0.3);
  --primary: hsl(264 65% 49%); --primary-dim: hsla(264 65% 49% / 0.5); --primary-glow: hsla(264 65% 65% / 0.4);
  --accent: hsl(264 65% 49%); --accent-dim: hsla(264 65% 49% / 0.5);
  --success: hsl(142 76% 36%); --success-dim: hsla(142 76% 36% / 0.4);
  --danger: hsl(0 72% 51%); --danger-dim: hsla(0 72% 51% / 0.4);
  --warning: hsl(45 93% 55%); --warning-dim: hsla(45 93% 55% / 0.4); --premium: hsl(270 95% 65%);
  --text: hsl(210 40% 98%); --text-dim: hsl(215 20% 65%); --text-muted: hsl(217 32% 17%);
  --font-display: 'Akira Expanded', 'Orbitron', sans-serif;
  --font-data: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --radius: 10px; --sidebar-w: 62px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; overflow-x: hidden; width: 100%; }
body { font-family: var(--font-body); background: var(--bg-deep); color: var(--text); min-height: 100vh; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 80% 60% at 20% 10%, hsla(264 65% 49% / 0.02) 0%, transparent 60%),
              radial-gradient(ellipse 60% 50% at 80% 80%, hsla(264 65% 49% / 0.02) 0%, transparent 60%);
  pointer-events: none;
}
body::after {
  content: ''; position: fixed; inset: 0; z-index: 0;
  background-image: linear-gradient(var(--text-muted) 1px, transparent 1px), linear-gradient(90deg, var(--text-muted) 1px, transparent 1px);
  background-size: 60px 60px; opacity: 0.04; pointer-events: none;
}

/* ── LAYOUT ───────────────────────────────── */
.layout { display: flex; min-height: 100vh; position: relative; z-index: 1; overflow-x: hidden; width: 100%; }

/* ── SIDEBAR ──────────────────────────────── */
.sidebar {
  width: var(--sidebar-w); min-height: 100vh; background: var(--bg-sidebar);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  align-items: center; padding: 16px 0; position: fixed; left: 0; top: 0; bottom: 0; z-index: 100;
}
.sidebar-logo { font-family: var(--font-display); font-size: 10px; font-weight: 900; color: var(--primary); letter-spacing: 0.2em; margin-bottom: 28px; text-shadow: 0 0 20px var(--primary-glow); }
.sidebar-nav { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.nav-item {
  width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
  border-radius: 8px; color: var(--text-dim); cursor: pointer; transition: all 0.2s;
  position: relative; border: 1px solid transparent; text-decoration: none;
}
.nav-item:hover { color: var(--primary); background: hsla(264 65% 49% / 0.03); }
.nav-item.active { color: var(--primary); background: hsla(264 65% 49% / 0.06); border-color: var(--border-glow); box-shadow: 0 0 16px hsla(264 65% 49% / 0.06); }
.nav-item .tooltip {
  position: absolute; left: 52px; top: 50%; transform: translateY(-50%);
  background: var(--bg-card); border: 1px solid var(--border); padding: 4px 10px;
  border-radius: 6px; font-size: 11px; font-family: var(--font-body); color: var(--text);
  white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.15s;
}
.nav-item:hover .tooltip { opacity: 1; }
.nav-item svg { width: 18px; height: 18px; }

/* ── MAIN AREA ────────────────────────────── */
.main {
  flex: 1; margin-left: var(--sidebar-w);
  display: flex; flex-direction: column; height: 100vh;
}

/* ── HEADER ───────────────────────────────── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; border-bottom: 1px solid var(--border);
}
.header-title {
  font-family: var(--font-display); font-size: 18px; font-weight: 700;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-sub { font-size: 11px; color: var(--text-dim); font-family: var(--font-data); margin-top: 2px; }

/* ── EDITOR LAYOUT ────────────────────────── */
.editor-layout {
  flex: 1; display: flex; gap: 0; min-height: 0; overflow: hidden;
}
.editor-preview {
  flex: 1; padding: 16px; display: flex; flex-direction: column; min-width: 0;
}
.editor-controls {
  width: 320px; border-left: 1px solid var(--border);
  display: flex; flex-direction: column; min-height: 0;
}

/* ── TAB BAR ──────────────────────────────── */
.tab-bar {
  display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.tab-btn {
  flex: 1; padding: 10px 8px; background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--text-dim); font-family: var(--font-body); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.05em;
}
.tab-btn:hover { color: var(--text); background: hsla(0 0% 100% / 0.02); }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-content { flex: 1; overflow-y: auto; min-height: 0; }

/* ── SCENE EDITOR PANEL ──────────────────── */
.scene-editor-panel { padding: 16px; }
.panel-header {
  font-family: var(--font-display); font-size: 10px; font-weight: 700; color: var(--primary);
  letter-spacing: 0.15em; margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
}
.panel-badge {
  font-family: var(--font-data); font-size: 9px; padding: 2px 8px; border-radius: 4px;
  background: var(--accent); color: white; letter-spacing: 0.05em;
}
.empty-state { color: var(--text-dim); font-size: 13px; text-align: center; padding: 40px 20px; }
.fields-scroll { display: flex; flex-direction: column; gap: 12px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--font-data); }
.field-input {
  background: var(--bg-surface); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); padding: 8px 10px; font-size: 13px; font-family: var(--font-body);
  outline: none; transition: border-color 0.2s;
}
.field-input:focus { border-color: var(--primary); }
.field-textarea { resize: vertical; min-height: 60px; }
.field-select {
  background: var(--bg-surface); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); padding: 8px 10px; font-size: 13px; font-family: var(--font-body);
  outline: none; cursor: pointer;
}
.field-select:focus { border-color: var(--primary); }
.field-range { width: 100%; accent-color: var(--primary); }
.field-value { font-family: var(--font-data); font-size: 12px; color: var(--text-dim); }
.field-divider { height: 1px; background: var(--border); margin: 4px 0; }
.color-input-wrap { display: flex; gap: 8px; align-items: center; }
.color-swatch {
  width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 6px;
  cursor: pointer; padding: 0; background: none;
}
.color-text { flex: 1; }

/* ── TEMPLATE GALLERY ─────────────────────── */
.template-gallery { padding: 16px; }
.template-grid { display: flex; flex-direction: column; gap: 10px; }
.template-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 16px; cursor: pointer; transition: all 0.2s; text-align: left;
  display: flex; flex-direction: column; gap: 4px; position: relative;
}
.template-card:hover { border-color: var(--primary-dim); box-shadow: 0 0 20px hsla(264 65% 49% / 0.06); transform: translateY(-1px); }
.template-icon { font-size: 20px; }
.template-name { font-weight: 600; font-size: 14px; color: var(--text); }
.template-desc { font-size: 12px; color: var(--text-dim); line-height: 1.4; }
.template-ratio {
  position: absolute; top: 12px; right: 12px;
  font-family: var(--font-data); font-size: 10px; color: var(--accent);
  border: 1px solid var(--accent-dim); border-radius: 4px; padding: 2px 6px;
}

/* ── PROJECT SETTINGS ─────────────────────── */
.project-settings { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.settings-row { display: flex; flex-direction: column; gap: 4px; }
.settings-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; font-family: var(--font-data); }
.aspect-buttons { display: flex; gap: 6px; }
.aspect-btn {
  flex: 1; padding: 8px; background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-dim); font-family: var(--font-data); font-size: 12px;
  cursor: pointer; transition: all 0.2s; text-align: center;
}
.aspect-btn:hover { border-color: var(--primary-dim); color: var(--text); }
.aspect-btn.active { border-color: var(--primary); color: var(--primary); background: hsla(264 65% 49% / 0.06); }
.export-btn {
  padding: 10px 16px; background: linear-gradient(135deg, var(--accent), hsl(264 65% 65%));
  border: none; border-radius: 8px; color: white; font-weight: 600; font-size: 13px;
  cursor: pointer; transition: all 0.2s; font-family: var(--font-body);
}
.export-btn:hover { box-shadow: 0 0 24px hsla(264 65% 49% / 0.25); transform: translateY(-1px); }

/* ── TIMELINE ─────────────────────────────── */
.editor-timeline {
  border-top: 1px solid var(--border); padding: 12px 16px;
  margin-left: var(--sidebar-w); flex-shrink: 0;
}
.timeline-panel { display: flex; flex-direction: column; gap: 10px; }
.timeline-header {
  display: flex; align-items: center; justify-content: space-between;
}
.timeline-title {
  font-family: var(--font-display); font-size: 10px; font-weight: 700;
  color: var(--primary); letter-spacing: 0.15em;
}
.timeline-duration { font-family: var(--font-data); font-size: 11px; color: var(--text-dim); }
.timeline-scenes {
  display: flex; gap: 4px; min-height: 48px; align-items: stretch;
}
.timeline-scene {
  background: var(--bg-card); border: 1px solid var(--border); border-left: 3px solid;
  border-radius: 6px; padding: 6px 10px; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 8px; position: relative; min-width: 0;
  flex-shrink: 0;
}
.timeline-scene:hover { border-color: var(--primary-dim); }
.timeline-scene.selected { border-color: var(--primary); box-shadow: 0 0 12px hsla(264 65% 49% / 0.08); background: var(--bg-card-hover); }
.scene-icon { font-weight: 700; font-size: 13px; flex-shrink: 0; }
.scene-label { font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
.scene-time { font-family: var(--font-data); font-size: 10px; color: var(--text-dim); flex-shrink: 0; }
.scene-delete {
  position: absolute; top: -6px; right: -6px; width: 18px; height: 18px;
  background: var(--danger); border: none; border-radius: 50%; color: white;
  font-size: 12px; line-height: 1; cursor: pointer; display: none;
  align-items: center; justify-content: center;
}
.timeline-scene:hover .scene-delete { display: flex; }
.scene-move-left {
  position: absolute; left: -6px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 50%; color: var(--text-dim); font-size: 12px; cursor: pointer;
  display: none; align-items: center; justify-content: center; line-height: 1;
}
.timeline-scene:hover .scene-move-left { display: flex; }

/* ── ADD SCENE ROW ────────────────────────── */
.timeline-add-row { display: flex; align-items: center; gap: 8px; }
.add-label { font-family: var(--font-data); font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; }
.add-scene-btn {
  display: flex; align-items: center; gap: 6px; padding: 6px 12px;
  background: transparent; border: 1px solid; border-radius: 6px;
  font-size: 11px; font-family: var(--font-body); cursor: pointer;
  transition: all 0.2s; text-transform: capitalize;
}
.add-scene-btn:hover { background: hsla(0 0% 100% / 0.03); }

/* ── WELCOME OVERLAY ──────────────────────── */
.welcome-overlay {
  position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center;
  background: rgba(6,8,13,0.85); backdrop-filter: blur(8px); cursor: pointer;
  margin-left: var(--sidebar-w);
}
.welcome-content { text-align: center; }
.welcome-icon { font-size: 48px; margin-bottom: 16px; }
.welcome-title {
  font-family: var(--font-display); font-size: 28px; font-weight: 900;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.welcome-sub { color: var(--text-dim); font-size: 14px; }

/* ── SCROLLBAR ────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── REMOTION PLAYER OVERRIDES ────────────── */
.editor-preview video { border-radius: 8px; }

/* ── RESPONSIVE: MOBILE ── */
@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }
  .sidebar, .sidebar.open {
    position: fixed; left: 0; right: 0; bottom: 0; top: auto;
    width: 100%; min-height: auto; height: auto;
    flex-direction: row; border-right: none;
    border-top: 1px solid var(--border);
    padding: 6px 0 env(safe-area-inset-bottom, 4px);
    overflow-x: auto; overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    z-index: 120; background: var(--bg-sidebar);
    scrollbar-width: none; transform: none;
  }
  .sidebar::-webkit-scrollbar { display: none; }
  .sidebar::after {
    content: ''; position: sticky; right: 0; top: 0; bottom: 0;
    width: 28px; flex-shrink: 0;
    background: linear-gradient(90deg, transparent, var(--bg-sidebar));
    pointer-events: none;
  }
  .sidebar-logo { display: none; }
  .sidebar-nav { flex-direction: row; gap: 1px; flex: none; padding: 0 4px; }
  .nav-item { width: 36px; height: 36px; flex-shrink: 0; }
  .nav-item .tooltip { display: none; }
  .nav-item svg { width: 17px; height: 17px; }
  .sidebar .notif-bell { width: 36px; height: 36px; margin-top: 0; }
  .sidebar > .nav-item:last-child { display: none; }

  .main { margin-left: 0; padding: 16px 14px 68px; gap: 20px; width: 100%; overflow-x: hidden; }
  .header { padding: 0 0 12px; flex-wrap: wrap; gap: 8px; }
  .header-title { font-size: 17px; }
  .header-sub { font-size: 11px; }
  .editor-layout { flex-direction: column; }
  .editor-controls { width: 100%; border-left: none; border-top: 1px solid var(--border); }
  .editor-preview { padding: 10px; }
  .editor-timeline { margin-left: 0; padding: 10px 12px; }
  .timeline-scenes { overflow-x: auto; }
  .welcome-overlay { margin-left: 0; }
  .welcome-title { font-size: 20px; }
}

@media (max-width: 480px) {
  .main { padding: 10px 8px 68px; gap: 14px; }
  .header { padding: 0 0 8px; }
  .header-title { font-size: 15px; }
  .header-sub { font-size: 10px; }
  .editor-preview { padding: 6px; }
  .editor-timeline { padding: 8px; }
  .tab-btn { font-size: 10px; padding: 8px 4px; }
  .scene-editor-panel { padding: 10px; }
  .template-gallery { padding: 10px; }
  .project-settings { padding: 10px; }
  .welcome-title { font-size: 16px; }
  .welcome-sub { font-size: 12px; }
}
</style>
</head>
<body>
  <div class="layout">

    <!-- ── SIDEBAR ────────────────────────── -->
    <aside class="sidebar">
  </aside>

    <!-- ── MAIN ───────────────────────────── -->
    <div class="main">
      <div class="header">
        <div>
          <div class="header-title">VIDEO EDITOR</div>
          <div class="header-sub">Remotion-powered video creation</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="mode-btn" id="mode-editor" onclick="switchMode('editor')">Manual Editor</button>
          <button class="mode-btn" id="mode-tasks" onclick="switchMode('tasks')">Video Tasks</button>
          <button class="mode-btn active" id="mode-aigen" onclick="switchMode('aigen')">AI Generate</button>
        </div>
      </div>

      <!-- EDITOR MODE -->
      <div id="editor-root" style="flex: 1; display: none; flex-direction: column; min-height: 0;"></div>

      <!-- TASKS MODE -->
      <div id="tasks-panel" style="display:none; flex:1; flex-direction:column; gap:24px; overflow-y:auto; padding-bottom:20px;">
        <!-- New Task Form -->
        <div style="background:linear-gradient(180deg, hsla(0 0% 6% / 1) 0%, hsla(0 0% 3% / 1) 100%); border:1px solid var(--border); border-radius:14px; padding:20px;">
          <div style="font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:0.12em;color:var(--text);margin-bottom:16px;">NEW VIDEO TASK</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;">
            <div>
              <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;font-family:var(--font-data);margin-bottom:4px;">Template</div>
              <select id="vt-template" style="width:100%;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px;font-family:var(--font-body);outline:none;">
                <option value="trading-recap">Trading Recap</option>
                <option value="education">Education / Tutorial</option>
                <option value="social-clip">Social Clip</option>
                <option value="announcement">Announcement</option>
                <option value="custom">Custom (describe below)</option>
              </select>
            </div>
            <div>
              <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;font-family:var(--font-data);margin-bottom:4px;">Format</div>
              <select id="vt-ratio" style="width:100%;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px;font-family:var(--font-body);outline:none;">
                <option value="9:16">9:16 (TikTok/Reels)</option>
                <option value="16:9">16:9 (YouTube)</option>
                <option value="1:1">1:1 (Square)</option>
              </select>
            </div>
            <div>
              <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;font-family:var(--font-data);margin-bottom:4px;">Brand</div>
              <select id="vt-brand" style="width:100%;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px;font-family:var(--font-body);outline:none;">
                <option value="Default">Default</option>
              </select>
            </div>
          </div>
          <div style="margin-bottom:12px;">
            <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;font-family:var(--font-data);margin-bottom:4px;">Description</div>
            <textarea id="vt-desc" placeholder="Describe the video content: what text, what data, what style..." style="width:100%;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:13px;font-family:var(--font-body);outline:none;resize:vertical;min-height:70px;"></textarea>
          </div>
          <div style="display:flex;gap:10px;align-items:center;">
            <button id="vt-submit" onclick="submitVideoTask()" style="padding:10px 24px;background:linear-gradient(135deg, var(--primary), hsl(270 65% 55%));border:none;border-radius:8px;color:white;font-weight:600;font-size:13px;cursor:pointer;transition:all 0.2s;font-family:var(--font-body);">Submit Video Task</button>
            <span id="vt-status" style="font-family:var(--font-data);font-size:11px;color:var(--text-dim);"></span>
          </div>
        </div>

        <!-- Media Library -->
        <div style="background:linear-gradient(180deg, hsla(0 0% 6% / 1) 0%, hsla(0 0% 3% / 1) 100%); border:1px solid var(--border); border-radius:14px; padding:20px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
            <div style="font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:0.12em;color:var(--text);">MEDIA LIBRARY</div>
            <div style="display:flex;gap:8px;align-items:center;">
              <span id="media-path" style="font-family:var(--font-data);font-size:10px;color:var(--text-muted);">~/command-center/public/media/</span>
              <label style="padding:6px 14px;background:hsla(264 65% 49% / 0.06);color:var(--primary);border:1px solid hsla(264 65% 49% / 0.15);border-radius:6px;cursor:pointer;font-family:var(--font-data);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.2s;">
                Upload
                <input type="file" id="media-upload" style="display:none" multiple accept="image/*,video/*,audio/*" onchange="uploadMedia(this.files)">
              </label>
            </div>
          </div>
          <div id="media-grid" style="display:grid;grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));gap:10px;"></div>
          <div id="media-empty" style="color:var(--text-dim);font-size:12px;text-align:center;padding:20px;">Drop files in <code style="color:var(--primary)">public/media/</code> or upload above</div>
        </div>

        <!-- Task List -->
        <div>
          <div style="font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:0.12em;color:var(--text);margin-bottom:14px;">TASK QUEUE</div>
          <div id="video-tasks-list"></div>
        </div>
      </div>

      <!-- AI GENERATE MODE -->
      <div id="aigen-panel" style="display:flex; flex:1; flex-direction:column; gap:24px; overflow-y:auto; padding:20px 24px 20px;">

        <!-- Generate Form -->
        <div style="background:linear-gradient(180deg, hsla(0 0% 6% / 1) 0%, hsla(0 0% 3% / 1) 100%); border:1px solid var(--border); border-radius:14px; padding:20px;">
          <div style="font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:0.12em;color:var(--text);margin-bottom:16px;">AI VIDEO GENERATION</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;">
            <div>
              <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;font-family:var(--font-data);margin-bottom:4px;">Model</div>
              <select id="ai-model" style="width:100%;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px;font-family:var(--font-body);outline:none;">
                <optgroup label="Google">
                  <option value="google/veo-3" selected>Veo 3 — best quality + audio</option>
                  <option value="google/veo-3-fast">Veo 3 Fast — sneller</option>
                  <option value="google/veo-3-1">Veo 3.1 — nieuwste</option>
                  <option value="google/veo-2">Veo 2 — solide kwaliteit</option>
                </optgroup>
                <optgroup label="xAI">
                  <option value="xai/grok-imagine-video">Grok Video — generatie + editing</option>
                  <option value="xai/grok-extend-video">Grok Extend — video verlengen</option>
                  <option value="xai/grok-reference-video">Grok Reference — van image</option>
                </optgroup>
                <optgroup label="Wan (Pruna)">
                  <option value="pruna/wan-t2v">Wan Text-to-Video</option>
                  <option value="pruna/wan-i2v">Wan Image-to-Video</option>
                  <option value="pruna/p-video">P-Video — snel (7 sec)</option>
                </optgroup>
              </select>
            </div>
            <div>
              <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;font-family:var(--font-data);margin-bottom:4px;">Aspect Ratio</div>
              <select id="ai-ratio" style="width:100%;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px;font-family:var(--font-body);outline:none;">
                <option value="16:9">16:9 (Landscape)</option>
                <option value="9:16">9:16 (Portrait / Reels)</option>
                <option value="1:1">1:1 (Square)</option>
              </select>
            </div>
            <div>
              <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;font-family:var(--font-data);margin-bottom:4px;">Duration</div>
              <select id="ai-duration" style="width:100%;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px;font-family:var(--font-body);outline:none;">
                <option value="5">5 seconds</option>
                <option value="8" selected>8 seconds (max)</option>
              </select>
            </div>
          </div>
          <div style="margin-bottom:12px;">
            <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;font-family:var(--font-data);margin-bottom:4px;">Prompt</div>
            <textarea id="ai-prompt" placeholder="Describe the video: camera movement, subject, style, mood, lighting..." style="width:100%;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:13px;font-family:var(--font-body);outline:none;resize:vertical;min-height:80px;"></textarea>
          </div>
          <div style="margin-bottom:12px;">
            <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em;font-family:var(--font-data);margin-bottom:4px;">Reference Image (optioneel)</div>
            <div style="display:flex;gap:10px;align-items:center;">
              <label style="padding:8px 16px;background:hsla(264 65% 49% / 0.06);color:var(--primary);border:1px solid hsla(264 65% 49% / 0.15);border-radius:8px;cursor:pointer;font-family:var(--font-data);font-size:11px;transition:all 0.2s;">
                Upload Image
                <input type="file" id="ai-ref-image" style="display:none" accept="image/*" onchange="previewRefImage(this)">
              </label>
              <span id="ai-ref-name" style="font-family:var(--font-data);font-size:11px;color:var(--text-dim);"></span>
              <button id="ai-ref-clear" style="display:none;background:none;border:none;color:var(--danger);cursor:pointer;font-size:12px;" onclick="clearRefImage()">&#x2715; Remove</button>
            </div>
            <div id="ai-ref-preview" style="margin-top:8px;display:none;">
              <img id="ai-ref-thumb" style="max-height:120px;border-radius:8px;border:1px solid var(--border);" />
            </div>
          </div>
          <div style="display:flex;gap:10px;align-items:center;">
            <button id="ai-submit" onclick="submitAIVideo()" style="padding:10px 24px;background:linear-gradient(135deg, var(--primary), hsl(270 65% 55%));border:none;border-radius:8px;color:white;font-weight:600;font-size:13px;cursor:pointer;transition:all 0.2s;font-family:var(--font-body);">Generate Video</button>
            <span id="ai-status" style="font-family:var(--font-data);font-size:11px;color:var(--text-dim);"></span>
          </div>
        </div>

        <!-- AI Video Tasks -->
        <div>
          <div style="font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:0.12em;color:var(--text);margin-bottom:14px;">GENERATED VIDEOS</div>
          <div id="ai-video-list"></div>
        </div>
      </div>

    </div>
  </div>

  <style>
    .mode-btn {
      font-family: var(--font-data); font-size: 11px; letter-spacing: 0.06em;
      padding: 6px 16px; border-radius: 6px; cursor: pointer; transition: all 0.2s;
      border: 1px solid var(--border); background: transparent; color: var(--text-dim);
    }
    .mode-btn:hover { color: var(--text); border-color: var(--primary-dim); }
    .mode-btn.active { color: var(--primary); border-color: var(--primary); background: hsla(264 65% 49% / 0.06); }
    .vt-card {
      background: linear-gradient(180deg, hsla(0 0% 6% / 1) 0%, hsla(0 0% 3% / 1) 100%);
      border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 16px; transition: all 0.2s;
    }
    .vt-card:hover { border-color: hsla(264 65% 49% / 0.2); }
    .vt-badge {
      font-family: var(--font-data); font-size: 9px; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 4px 10px; border-radius: 6px; display: inline-flex; align-items: center; gap: 5px;
    }
    .vt-badge.pending { color: var(--warning); background: hsla(45 93% 55% / 0.08); }
    .vt-badge.processing { color: var(--primary); background: hsla(264 65% 49% / 0.08); }
    .vt-badge.completed { color: var(--success); background: hsla(142 76% 36% / 0.08); }
    .vt-badge.failed { color: var(--danger); background: hsla(0 72% 51% / 0.08); }
    .vt-badge.processing::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--primary); animation: pulse-glow 2s infinite; }
    @keyframes pulse-glow { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .media-item {
      border: 2px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer;
      transition: all 0.2s; position: relative; aspect-ratio: 1;
    }
    .media-item:hover { border-color: var(--primary-dim); }
    .media-item.selected { border-color: var(--primary); box-shadow: 0 0 12px hsla(264 65% 49% / 0.2); }
    .media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; }
    .media-item-label {
      position: absolute; bottom: 0; left: 0; right: 0; padding: 4px 6px;
      background: hsla(0 0% 0% / 0.7); font-family: var(--font-data); font-size: 8px;
      color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .media-item-type {
      position: absolute; top: 4px; right: 4px; font-family: var(--font-data); font-size: 8px;
      padding: 2px 5px; border-radius: 4px; background: hsla(0 0% 0% / 0.6); color: var(--text-dim);
      text-transform: uppercase;
    }
    .media-item-check {
      position: absolute; top: 4px; left: 4px; width: 18px; height: 18px; border-radius: 50%;
      background: var(--primary); color: white; font-size: 11px; display: none;
      align-items: center; justify-content: center;
    }
    .media-item.selected .media-item-check { display: flex; }
    .media-item-delete {
      position: absolute; top: 4px; right: 4px; width: 18px; height: 18px; border-radius: 50%;
      background: hsla(0 72% 51% / 0.8); color: white; font-size: 10px; border: none; cursor: pointer;
      display: none; align-items: center; justify-content: center; line-height: 1;
    }
    .media-item:hover .media-item-delete { display: flex; }
    .media-item:hover .media-item-type { display: none; }
  </style>

  <script>
    function switchMode(mode) {
      const editor = document.getElementById('editor-root');
      const tasks = document.getElementById('tasks-panel');
      const aigen = document.getElementById('aigen-panel');
      const btnEditor = document.getElementById('mode-editor');
      const btnTasks = document.getElementById('mode-tasks');
      const btnAigen = document.getElementById('mode-aigen');
      editor.style.display = mode === 'editor' ? 'flex' : 'none';
      tasks.style.display = mode === 'tasks' ? 'flex' : 'none';
      aigen.style.display = mode === 'aigen' ? 'flex' : 'none';
      btnEditor.classList.toggle('active', mode === 'editor');
      btnTasks.classList.toggle('active', mode === 'tasks');
      btnAigen.classList.toggle('active', mode === 'aigen');
      if (mode === 'tasks') loadVideoTasks();
      if (mode === 'aigen') loadAIVideos();
    }

    async function loadVideoTasks() {
      try {
        const res = await fetch('/video/tasks');
        const tasks = await res.json();
        const el = document.getElementById('video-tasks-list');
        if (!tasks.length) { el.innerHTML = '<div style="color:var(--text-dim);font-size:12px;text-align:center;padding:30px;">No video tasks yet</div>'; return; }
        const tplLabels = { 'trading-recap': 'Trading Recap', 'education': 'Education', 'social-clip': 'Social Clip', 'announcement': 'Announcement', 'custom': 'Custom' };
        el.innerHTML = tasks.map(t => {
          const time = new Date(t.created_at).toLocaleString('nl-NL', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
          return `<div class="vt-card">
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                <span style="font-family:var(--font-data);font-size:10px;color:var(--primary);text-transform:uppercase;letter-spacing:0.06em;">${tplLabels[t.template] || t.template}</span>
                <span style="font-family:var(--font-data);font-size:10px;color:var(--text-muted);">${t.aspect_ratio} &middot; ${t.brand}</span>
              </div>
              <div style="font-size:13px;color:var(--text);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.description}</div>
              ${t.error ? '<div style="font-size:10px;color:var(--danger);margin-top:4px;font-family:var(--font-data);">' + t.error + '</div>' : ''}
              ${t.result_url ? '<a href="' + t.result_url + '" target="_blank" style="font-size:10px;color:var(--primary);font-family:var(--font-data);text-decoration:none;margin-top:4px;display:inline-block;">Download video</a>' : ''}
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">
              <span class="vt-badge ${t.status}">${t.status}</span>
              <span style="font-family:var(--font-data);font-size:10px;color:var(--text-muted);">${time}</span>
            </div>
            <button onclick="deleteVideoTask('${t.id}')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:4px;" title="Delete">&#x2715;</button>
          </div>`;
        }).join('');
      } catch(e) {
        document.getElementById('video-tasks-list').innerHTML = '<div style="color:var(--danger);font-size:12px;text-align:center;padding:20px;">Could not connect to API</div>';
      }
    }

    async function submitVideoTask() {
      const desc = document.getElementById('vt-desc').value.trim();
      if (!desc) { document.getElementById('vt-status').textContent = 'Enter a description'; return; }
      const btn = document.getElementById('vt-submit');
      btn.disabled = true;
      document.getElementById('vt-status').textContent = 'Submitting...';
      try {
        await fetch('/video/tasks', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            template: document.getElementById('vt-template').value,
            aspect_ratio: document.getElementById('vt-ratio').value,
            brand: document.getElementById('vt-brand').value,
            description: desc,
          }),
        });
        document.getElementById('vt-desc').value = '';
        document.getElementById('vt-status').textContent = 'Task submitted!';
        loadVideoTasks();
        setTimeout(() => { document.getElementById('vt-status').textContent = ''; }, 3000);
      } catch(e) { document.getElementById('vt-status').textContent = 'Error: ' + e.message; }
      finally { btn.disabled = false; }
    }

    async function deleteVideoTask(id) {
      await fetch('/video/tasks/' + id, { method: 'DELETE' });
      loadVideoTasks();
    }

    // ── MEDIA LIBRARY ──────────────────────
    let selectedMedia = new Set();

    async function loadMedia() {
      try {
        const res = await fetch('/media/list');
        const files = await res.json();
        const grid = document.getElementById('media-grid');
        const empty = document.getElementById('media-empty');
        if (!files.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
        empty.style.display = 'none';

        grid.innerHTML = files.map(f => {
          const isSelected = selectedMedia.has(f.name);
          const preview = f.type === 'image'
            ? `<img src="${f.path}" alt="${f.name}" />`
            : f.type === 'video'
              ? `<video src="${f.path}" muted></video>`
              : `<div style="display:flex;align-items:center;justify-content:center;height:100%;background:var(--bg-surface);color:var(--text-dim);font-size:20px;">${f.type === 'audio' ? '♪' : '?'}</div>`;
          return `<div class="media-item ${isSelected ? 'selected' : ''}" onclick="toggleMedia('${f.name}')" title="${f.name} (${(f.size/1024).toFixed(0)}KB)">
            ${preview}
            <span class="media-item-check">&#10003;</span>
            <span class="media-item-type">${f.type}</span>
            <button class="media-item-delete" onclick="event.stopPropagation();deleteMedia('${f.name}')" title="Delete">&#x2715;</button>
            <div class="media-item-label">${f.name}</div>
          </div>`;
        }).join('');
      } catch { document.getElementById('media-empty').style.display = 'block'; }
    }

    function toggleMedia(name) {
      if (selectedMedia.has(name)) selectedMedia.delete(name);
      else selectedMedia.add(name);
      loadMedia();
    }

    async function uploadMedia(files) {
      for (const file of files) {
        const formData = new FormData();
        formData.append('file', file);
        try {
          await fetch('/media/upload', { method: 'POST', body: formData });
        } catch(e) { console.error('Upload failed:', e); }
      }
      loadMedia();
    }

    async function deleteMedia(name) {
      await fetch('/media/' + name, { method: 'DELETE' });
      selectedMedia.delete(name);
      loadMedia();
    }

    // Override submitVideoTask to include selected media
    const _origSubmitVideoTask = submitVideoTask;
    submitVideoTask = async function() {
      const desc = document.getElementById('vt-desc').value.trim();
      if (!desc) { document.getElementById('vt-status').textContent = 'Enter a description'; return; }
      const btn = document.getElementById('vt-submit');
      btn.disabled = true;
      document.getElementById('vt-status').textContent = 'Submitting...';
      try {
        await fetch('/video/tasks', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            template: document.getElementById('vt-template').value,
            aspect_ratio: document.getElementById('vt-ratio').value,
            brand: document.getElementById('vt-brand').value,
            description: desc,
            media_files: [...selectedMedia],
          }),
        });
        document.getElementById('vt-desc').value = '';
        selectedMedia.clear();
        document.getElementById('vt-status').textContent = 'Task submitted!';
        loadVideoTasks();
        loadMedia();
        setTimeout(() => { document.getElementById('vt-status').textContent = ''; }, 3000);
      } catch(e) { document.getElementById('vt-status').textContent = 'Error: ' + e.message; }
      finally { btn.disabled = false; }
    };

    // Load media when switching to tasks mode
    const _origSwitchMode = switchMode;
    switchMode = function(mode) {
      _origSwitchMode(mode);
      if (mode === 'tasks') loadMedia();
    };

    // ── AI VIDEO GENERATION ───────────────────
    let aiRefFile = null;

    function previewRefImage(input) {
      const file = input.files[0];
      if (!file) return;
      aiRefFile = file;
      document.getElementById('ai-ref-name').textContent = file.name;
      document.getElementById('ai-ref-clear').style.display = 'inline';
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('ai-ref-thumb').src = e.target.result;
        document.getElementById('ai-ref-preview').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }

    function clearRefImage() {
      aiRefFile = null;
      document.getElementById('ai-ref-image').value = '';
      document.getElementById('ai-ref-name').textContent = '';
      document.getElementById('ai-ref-clear').style.display = 'none';
      document.getElementById('ai-ref-preview').style.display = 'none';
    }

    async function submitAIVideo() {
      const prompt = document.getElementById('ai-prompt').value.trim();
      if (!prompt) { document.getElementById('ai-status').textContent = 'Enter a prompt'; return; }
      const btn = document.getElementById('ai-submit');
      btn.disabled = true;
      document.getElementById('ai-status').textContent = 'Submitting...';

      try {
        const formData = new FormData();
        formData.append('model', document.getElementById('ai-model').value);
        formData.append('aspect_ratio', document.getElementById('ai-ratio').value);
        formData.append('duration', document.getElementById('ai-duration').value);
        formData.append('prompt', prompt);
        if (aiRefFile) formData.append('ref_image', aiRefFile);

        const res = await fetch('/video/ai-generate', { method: 'POST', body: formData });
        if (!res.ok) throw new Error('Failed');
        document.getElementById('ai-prompt').value = '';
        clearRefImage();
        document.getElementById('ai-status').textContent = 'Video generation started!';
        loadAIVideos();
        setTimeout(() => { document.getElementById('ai-status').textContent = ''; }, 3000);
      } catch(e) { document.getElementById('ai-status').textContent = 'Error: ' + e.message; }
      finally { btn.disabled = false; }
    }

    async function loadAIVideos() {
      try {
        const res = await fetch('/video/ai-generate');
        const tasks = await res.json();
        const el = document.getElementById('ai-video-list');
        if (!tasks.length) { el.innerHTML = '<div style="color:var(--text-dim);font-size:12px;text-align:center;padding:30px;">No AI videos generated yet</div>'; return; }
        el.innerHTML = tasks.map(t => {
          const time = new Date(t.created_at).toLocaleString('nl-NL', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
          const modelName = t.model.split('/').pop();
          return `<div class="vt-card">
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                <span style="font-family:var(--font-data);font-size:10px;color:var(--primary);text-transform:uppercase;letter-spacing:0.06em;">${modelName}</span>
                <span style="font-family:var(--font-data);font-size:10px;color:var(--text-muted);">${t.aspect_ratio} &middot; ${t.duration}s</span>
              </div>
              <div style="font-size:13px;color:var(--text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${t.prompt}</div>
              ${t.error ? '<div style="font-size:10px;color:var(--danger);margin-top:4px;font-family:var(--font-data);">' + t.error + '</div>' : ''}
              ${t.result_url ? `<div style="margin-top:8px;">
                <video src="${t.result_url}" controls style="max-width:100%;max-height:200px;border-radius:8px;border:1px solid var(--border);"></video>
                <a href="${t.result_url}" target="_blank" download style="display:inline-block;margin-top:4px;font-size:10px;color:var(--primary);font-family:var(--font-data);text-decoration:none;">Download video</a>
              </div>` : ''}
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">
              <span class="vt-badge ${t.status}">${t.status}</span>
              <span style="font-family:var(--font-data);font-size:10px;color:var(--text-muted);">${time}</span>
            </div>
            <button onclick="deleteAIVideo('${t.id}')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:4px;" title="Delete">&#x2715;</button>
          </div>`;
        }).join('');
      } catch(e) {
        document.getElementById('ai-video-list').innerHTML = '<div style="color:var(--danger);font-size:12px;text-align:center;padding:20px;">Could not load AI videos</div>';
      }
    }

    async function deleteAIVideo(id) {
      await fetch('/video/ai-generate/' + id, { method: 'DELETE' });
      loadAIVideos();
    }

    // Poll AI video tasks every 15s when on aigen tab
    setInterval(() => {
      if (document.getElementById('aigen-panel').style.display !== 'none') loadAIVideos();
    }, 15000);
  </script>

  <script type="module" src="/src/editor/main.tsx"></script>
<script src="/auth-guard.js"></script>
<script src="/sidebar.js"></script>
<script src="/notif-panel.js"></script>
<script src="/brand-loader.js"></script>
</body>
</html>
