<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>try{var t=localStorage.getItem("cc_theme");if(t==="light")document.documentElement.setAttribute("data-theme","light");}catch(e){}</script>
<link rel="stylesheet" href="/theme.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Operations Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/iso-office.css">
<style>
/* ── CSS VARIABLES ──────────────────────────────── */
:root {
  --bg-deep: hsl(0 0% 0%);
  --bg-base: hsl(0 0% 3%);
  --bg-surface: hsl(0 0% 5%);
  --bg-card: hsl(0 0% 5%);
  --bg-card-hover: hsl(0 0% 8%);
  --bg-sidebar: hsl(0 0% 2%);
  --border: hsl(217 32% 20%);
  --border-glow: hsla(264 65% 49% / 0.3);
  --primary: hsl(264 65% 49%);
  --primary-dim: hsla(264 65% 49% / 0.5);
  --primary-glow: hsla(264 65% 65% / 0.4);
  --accent: hsl(264 65% 49%);
  --accent-dim: hsla(264 65% 49% / 0.5);
  --success: hsl(142 76% 36%);
  --success-dim: hsla(142 76% 36% / 0.4);
  --danger: hsl(0 72% 51%);
  --danger-dim: hsla(0 72% 51% / 0.4);
  --warning: hsl(45 93% 55%);
  --warning-dim: hsla(45 93% 55% / 0.4);
  --premium: hsl(270 95% 65%);
  --text: hsl(210 40% 98%);
  --text-dim: hsl(215 20% 65%);
  --text-muted: hsl(217 32% 17%);
  --font-display: 'Akira Expanded', 'Orbitron', sans-serif;
  --font-data: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --radius: 10px;
  --sidebar-w: 62px;
  --feed-w: 272px;
}

/* ── RESET ──────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── ATMOSPHERIC BG ─────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, hsla(264 65% 49% / 0.024) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, hsla(264 65% 49% / 0.024) 0%, transparent 60%);
  pointer-events: none;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(var(--text-muted) 1px, transparent 1px),
    linear-gradient(90deg, var(--text-muted) 1px, transparent 1px);
  background-size: 60px 60px;
  opacity: 0.04;
  pointer-events: none;
}

/* ── LAYOUT ─────────────────────────────────────── */
.layout {
  display: flex;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

/* ── LEFT SIDEBAR ───────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  min-height: 100vh;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0;
  position: fixed;
  left: 0; top: 0; bottom: 0;
  z-index: 100;
}
.sidebar-logo {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 900;
  color: var(--primary);
  letter-spacing: 0.2em;
  margin-bottom: 28px;
  text-shadow: 0 0 20px var(--primary-glow);
}
.sidebar-nav { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.nav-item {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  border: 1px solid transparent;
  text-decoration: none;
}
.nav-item:hover { color: var(--primary); background: hsla(264 65% 49% / 0.03); }
.nav-item.active {
  color: var(--primary);
  background: hsla(264 65% 49% / 0.063);
  border-color: var(--border-glow);
  box-shadow: 0 0 16px hsla(264 65% 49% / 0.063);
}
.nav-item .tooltip {
  position: absolute;
  left: 52px; top: 50%;
  transform: translateY(-50%);
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-family: var(--font-body);
  color: var(--text);
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
}
.nav-item:hover .tooltip { opacity: 1; }
.nav-item svg { width: 18px; height: 18px; }

/* ── MAIN CONTENT ───────────────────────────────── */
.main {
  flex: 1;
  margin-left: var(--sidebar-w);
  margin-right: var(--feed-w);
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

/* ── HEADER ─────────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header-sub {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
  font-family: var(--font-data);
}
.header-right {
  display: flex; align-items: center; gap: 14px;
}
.status-badge {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-data);
  font-size: 11px;
  color: var(--success);
  background: hsla(142 76% 36% / 0.03);
  border: 1px solid hsla(142 76% 36% / 0.125);
  padding: 5px 12px;
  border-radius: 20px;
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--success);
  animation: pulse-glow 2s infinite;
}

/* ── BRIEFING BANNER ────────────────────────────── */
.briefing {
  background: linear-gradient(180deg, hsl(0 0% 5%), hsl(0 0% 3%));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 26px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  position: relative;
  overflow: hidden;
}
.briefing::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--primary-dim), transparent);
}
.briefing-item-label {
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-family: var(--font-data);
  margin-bottom: 8px;
}
.briefing-item-value {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.briefing-item-meta {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 4px;
  font-family: var(--font-data);
}

/* ── SECTION HEADERS ────────────────────────────── */
.section-header {
  font-family: var(--font-display);
  font-size: 16px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: hsl(210 40% 98%);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.section-header::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

/* ── SOCIAL CARDS ───────────────────────────────── */
.social-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}
.brand-card {
  background: linear-gradient(180deg, hsla(0 0% 6% / 1) 0%, hsla(0 0% 3% / 1) 100%);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 0;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}
.brand-card::before {
  content: '';
  position: absolute; inset: -1px;
  border-radius: 14px;
  padding: 1px;
  background: linear-gradient(135deg, transparent 30%, var(--primary-glow) 70%, transparent 100%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  opacity: 0;
  transition: opacity 0.4s;
}
.brand-card:hover::before { opacity: 1; }
.brand-card:hover { border-color: hsla(264 65% 49% / 0.3); box-shadow: 0 8px 40px hsla(264 65% 49% / 0.08), 0 0 1px hsla(264 65% 49% / 0.2); transform: translateY(-2px); }

.brand-header {
  padding: 18px 20px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid hsla(217 32% 20% / 0.4);
}
.brand-avatar {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  background: linear-gradient(135deg, hsla(264 65% 49% / 0.15), hsla(264 65% 49% / 0.05));
  border: 1px solid hsla(264 65% 49% / 0.2);
}
.brand-name {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--text);
}
.brand-platforms-count {
  font-family: var(--font-data);
  font-size: 9px;
  color: var(--text-dim);
  margin-top: 1px;
}
.brand-total {
  margin-left: auto;
  text-align: right;
}
.brand-total-value {
  font-family: var(--font-data);
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.brand-total-label {
  font-size: 8px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 2px;
}

.brand-body { padding: 6px 0; }

.platform-row {
  display: flex;
  align-items: center;
  padding: 10px 20px;
  gap: 12px;
  transition: background 0.2s;
}
.platform-row:hover { background: hsla(264 65% 49% / 0.02); }
.platform-row + .platform-row { border-top: 1px solid hsla(217 32% 20% / 0.2); }

.platform-icon {
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--font-data);
  letter-spacing: 0;
  flex-shrink: 0;
}
.platform-icon.tt { color: hsl(270 95% 65%); background: hsla(270 95% 65% / 0.1); }
.platform-icon.ig { color: hsl(330 70% 55%); background: linear-gradient(135deg, hsla(330 70% 55% / 0.1), hsla(270 70% 55% / 0.1)); }
.platform-icon.yt { color: hsl(0 72% 51%); background: hsla(0 72% 51% / 0.1); }
.platform-icon.x { color: hsl(210 40% 98%); background: hsla(210 40% 98% / 0.08); }

.platform-info { flex: 1; min-width: 0; }
.platform-label {
  font-size: 10px;
  color: var(--text-dim);
  font-family: var(--font-data);
  margin-bottom: 2px;
}
.platform-metric-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.platform-followers {
  font-family: var(--font-data);
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}
.platform-eng {
  font-family: var(--font-data);
  font-size: 11px;
  font-weight: 500;
  color: var(--primary);
}

.platform-change {
  font-family: var(--font-data);
  font-size: 10px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 6px;
  white-space: nowrap;
  flex-shrink: 0;
}
.platform-change.up { color: var(--success); background: hsla(142 76% 36% / 0.08); }
.platform-change.down { color: var(--danger); background: hsla(0 72% 51% / 0.08); }
.platform-change.neutral { color: var(--text-dim); background: hsla(217 32% 20% / 0.2); }

.platform-loading {
  color: var(--text-dim);
  font-family: var(--font-data);
  font-size: 10px;
  animation: pulse-glow 1.5s infinite;
  flex: 1;
  text-align: center;
}

.brand-footer {
  padding: 10px 20px 14px;
  border-top: 1px solid hsla(217 32% 20% / 0.3);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.brand-footer-stat {
  font-family: var(--font-data);
  font-size: 9px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.brand-footer-stat span { color: var(--text-dim); font-weight: 600; }

/* ── AGENTS SECTION ─────────────────────────────── */
.agents-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}
@keyframes agent-border-scan {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}
@keyframes agent-shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(200%); }
}
@keyframes agent-task-blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

.agent-card {
  background: linear-gradient(180deg, hsla(0 0% 6% / 1) 0%, hsla(0 0% 3% / 1) 100%);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 0;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}
/* Animated scanning border for running agents */
.agent-card.is-running::before {
  content: '';
  position: absolute; inset: -1px;
  border-radius: 14px;
  padding: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--agent-glow, hsla(264 65% 49% / 0.4)) 25%, transparent 50%, var(--agent-glow, hsla(264 65% 49% / 0.3)) 75%, transparent 100%);
  background-size: 200% 100%;
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  animation: agent-border-scan 3s linear infinite;
}
/* Static glow on hover for non-running */
.agent-card:not(.is-running)::before {
  content: '';
  position: absolute; inset: -1px;
  border-radius: 14px;
  padding: 1px;
  background: linear-gradient(135deg, transparent 30%, var(--agent-glow, hsla(264 65% 49% / 0.4)) 70%, transparent 100%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  opacity: 0;
  transition: opacity 0.4s;
}
.agent-card:not(.is-running):hover::before { opacity: 1; }
.agent-card:hover { border-color: hsla(264 65% 49% / 0.3); box-shadow: 0 8px 40px hsla(264 65% 49% / 0.08), 0 0 1px hsla(264 65% 49% / 0.2); transform: translateY(-2px); }

.agent-card-header {
  padding: 18px 20px 14px;
  display: flex;
  align-items: center;
  gap: 14px;
  border-bottom: 1px solid hsla(217 32% 20% / 0.4);
}
.agent-avatar {
  width: 42px; height: 42px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  position: relative;
}
.agent-avatar-bg {
  position: absolute; inset: 0;
  border-radius: 12px;
  opacity: 0.12;
}
.agent-header-info { flex: 1; }
.agent-name {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--text);
  margin-bottom: 2px;
}
.agent-role {
  font-size: 10px;
  color: var(--text-dim);
  font-family: var(--font-data);
}
.agent-status {
  font-family: var(--font-data);
  font-size: 9px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 6px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
}
.agent-status.running { color: var(--success); background: hsla(142 76% 36% / 0.08); }
.agent-status.running::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse-glow 2s infinite; }
.agent-status.idle { color: var(--warning); background: hsla(45 93% 55% / 0.08); }
.agent-status.idle::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--warning); opacity: 0.5; }
.agent-status.queued { color: var(--accent); background: hsla(264 65% 49% / 0.08); }
.agent-status.queued::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0.5; }
.agent-status.offline { color: var(--danger); background: hsla(0 72% 51% / 0.08); }
.agent-status.offline::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--danger); }
.health-row { display: flex; gap: 10px; margin-top: 6px; font-family: var(--font-data); font-size: 9px; letter-spacing: 0.04em; }
.health-tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px; border-radius: 4px; background: hsla(0 0% 100% / 0.03); border: 1px solid var(--border); }
.health-tag .dot { width: 5px; height: 5px; border-radius: 50%; }
.health-tag .dot.ok { background: var(--success); }
.health-tag .dot.err { background: var(--danger); }

.agent-card-body { padding: 16px 20px; }
.agent-progress-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.agent-progress {
  flex: 1;
  height: 4px;
  background: hsla(217 32% 20% / 0.4);
  border-radius: 4px;
  overflow: hidden;
}
.agent-progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}
/* Glow tip */
.agent-progress-fill::after {
  content: '';
  position: absolute; right: 0; top: -1px; bottom: -1px; width: 12px;
  border-radius: 0 4px 4px 0;
  filter: blur(4px);
  background: inherit;
  opacity: 0.6;
}
/* Shimmer sweep on running progress bars */
.is-running .agent-progress-fill::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, hsla(0 0% 100% / 0.15) 50%, transparent 100%);
  animation: agent-shimmer 2s ease-in-out infinite;
}
.agent-progress-pct {
  font-family: var(--font-data);
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
  min-width: 32px;
  text-align: right;
}
.agent-task {
  font-family: var(--font-data);
  font-size: 10px;
  color: var(--text-dim);
  line-height: 1.4;
}
/* Blinking cursor after task text for running agents */
.is-running .agent-task::after {
  content: '▋';
  color: var(--agent-color, var(--primary));
  font-size: 10px;
  margin-left: 2px;
  animation: agent-task-blink 1s step-end infinite;
}

.agent-card-footer {
  padding: 10px 20px 14px;
  border-top: 1px solid hsla(217 32% 20% / 0.3);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.agent-footer-label {
  font-family: var(--font-data);
  font-size: 9px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.agent-footer-label span { color: var(--text); font-weight: 600; }

/* ── KANBAN ──────────────────────────────────────── */
.kanban {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
}
.kanban-col {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  min-height: 160px;
}
.kanban-col-header {
  font-family: var(--font-data);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.kanban-count {
  background: var(--bg-card);
  padding: 1px 7px;
  border-radius: 4px;
  font-size: 10px;
  color: var(--text-dim);
}
.kanban-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  margin-bottom: 8px;
  font-size: 12px;
  cursor: default;
  transition: all 0.2s;
}
.kanban-card:hover {
  border-color: var(--border-glow);
  box-shadow: 0 0 16px hsla(264 65% 49% / 0.024);
}
.kanban-card-tag {
  font-family: var(--font-data);
  font-size: 9px;
  letter-spacing: 0.08em;
  padding: 2px 6px;
  border-radius: 3px;
  display: inline-block;
  margin-top: 6px;
}

/* ── SOP LIBRARY ────────────────────────────────── */
.sop-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
.sop-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  transition: all 0.25s;
}
.sop-card:hover {
  border-color: var(--border-glow);
  box-shadow: 0 0 24px hsla(264 65% 49% / 0.03);
}
.sop-title {
  font-family: var(--font-data);
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 4px;
}
.sop-desc {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 12px;
  line-height: 1.5;
}
.sop-btn {
  font-family: var(--font-data);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: hsla(264 65% 49% / 0.063);
  color: var(--primary);
  border: 1px solid hsla(264 65% 49% / 0.145);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
.sop-btn:hover {
  background: hsla(264 65% 49% / 0.094);
  box-shadow: 0 0 20px hsla(264 65% 49% / 0.08);
}

/* ── RIGHT FEED ─────────────────────────────────── */
.feed {
  width: var(--feed-w);
  position: fixed;
  right: 0; top: 0; bottom: 0;
  background: var(--bg-sidebar);
  border-left: 1px solid var(--border);
  padding: 20px 16px;
  overflow-y: auto;
  z-index: 100;
}
.feed-title {
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: 0.2em;
  color: var(--primary);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.feed-title .live-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--primary);
  animation: pulse-glow 2s infinite;
}
.feed-item {
  padding: 12px 0;
  border-bottom: 1px solid hsla(217 32% 20% / 0.094);
}
.feed-item-time {
  font-family: var(--font-data);
  font-size: 10px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.feed-item-text {
  font-size: 12px;
  line-height: 1.5;
  color: var(--text-dim);
}
.feed-item-text strong { color: var(--text); font-weight: 500; }
.feed-tag {
  font-family: var(--font-data);
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 3px;
  display: inline-block;
  margin-top: 4px;
}
.task-feed-row {
  padding: 10px 0 10px 8px;
  border-bottom: 1px solid hsla(217 32% 20% / 0.2);
  border-left: 2px solid transparent;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.task-feed-row.is-processing { border-left-color: var(--primary); }
.task-feed-row.is-pending { border-left-color: var(--warning); }
.task-feed-row.is-completed { border-left-color: var(--success); opacity: 0.7; }
.task-feed-row.is-failed { border-left-color: var(--danger); opacity: 0.7; }
.task-feed-row.is-cancelled { border-left-color: var(--text-dim); opacity: 0.6; }
.task-feed-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}
.task-feed-tag {
  font-family: var(--font-data);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 3px;
}
.task-feed-time {
  font-family: var(--font-data);
  font-size: 9px;
  color: var(--text-muted);
}
.task-feed-desc {
  font-size: 11px;
  color: var(--text);
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;

  text-transform: uppercase;

}

/* ── ANIMATIONS ─────────────────────────────────── */
@keyframes pulse-glow {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 currentColor; }
  50% { opacity: 0.6; box-shadow: 0 0 8px 2px currentColor; }
}
@keyframes fade-up {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-up {
  opacity: 0;
  animation: fade-up 0.5s ease-out forwards;
}
.delay-1 { animation-delay: 0.05s; }
.delay-2 { animation-delay: 0.10s; }
.delay-3 { animation-delay: 0.15s; }
.delay-4 { animation-delay: 0.20s; }
.delay-5 { animation-delay: 0.25s; }
.delay-6 { animation-delay: 0.30s; }
.delay-7 { animation-delay: 0.35s; }
.delay-8 { animation-delay: 0.40s; }

/* ── SCROLLBAR ──────────────────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── MOBILE NAV BUTTONS ────────────────────────── */
.mobile-nav { display: none; }
.mobile-nav-btn {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.mobile-nav-btn:hover, .mobile-nav-btn.active { color: var(--primary); border-color: var(--border-glow); }
.mobile-nav-btn svg { width: 18px; height: 18px; }
.mobile-overlay {
  display: none;
  position: fixed; inset: 0;
  background: hsla(0 0% 0% / 0.6);
  z-index: 90;
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}
.mobile-overlay.visible { display: block; }

/* ── RESPONSIVE: TABLET (≤1024px) ──────────────── */
@media (max-width: 1024px) {
  :root { --feed-w: 0px; }
  .feed {
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    width: 280px;
    z-index: 110;
  }
  .feed.open { transform: translateX(0); }
  .sidebar {

    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);

  }
  .sidebar.open { transform: translateX(0); }
  :root { --sidebar-w: 0px; }
  .main { margin-right: 0; margin-left: 0; }

}

/* ── RESPONSIVE: MOBILE (≤768px) ───────────────── */
@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }

  /* Sidebar becomes bottom bar */
  .sidebar, .sidebar.open {
    position: fixed;
    left: 0; right: 0; bottom: 0; top: auto;

    flex-direction: row;

  .sidebar .notif-bell { width: 36px; height: 36px; margin-top: 0; }

  .main {

  .header { flex-direction: column; align-items: flex-start; gap: 12px; }
  .header-title { font-size: 16px; }

  .briefing-item-value { font-size: 13px; }

/* ── RESPONSIVE: SMALL MOBILE (≤480px) ─────────── */

}

<body>

<div class="mobile-overlay" id="mobile-overlay" onclick="closeAllMobile()"></div>
<div class="layout">

  <!-- ── LEFT SIDEBAR ──────────────────────────── -->
  <aside class="sidebar">
  </aside>

  <!-- ── MAIN CONTENT ──────────────────────────── -->
  <main class="main">

    <!-- HEADER -->
    <div class="header fade-up delay-1">
      <div>
        <div class="header-title" id="header-title">COMMAND CENTER</div>
        <div class="header-sub" id="datetime"></div>
      </div>
      <div class="header-right">
        <div class="status-badge">
          <span class="status-dot"></span>
          ALL SYSTEMS ONLINE
        </div>
        <div class="mobile-nav">
          <button class="mobile-nav-btn" id="menu-btn" onclick="toggleSidebar()" aria-label="Menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <button class="mobile-nav-btn" id="feed-btn" onclick="toggleFeed()" aria-label="Activity feed">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M12 4h9M4 8l4 4-4 4"/></svg>

        </div>
      </div>
    </div>

    <!-- STRIPE / REVENUE -->
    <section class="fade-up delay-2" id="stripe-section" style="display:none;">
      <div class="section-header">Business Revenue <button id="blur-toggle" onclick="toggleBlur()" style="font-family:var(--font-data);font-size:10px;background:none;border:1px solid var(--border);color:var(--text-dim);padding:3px 10px;border-radius:6px;cursor:pointer;margin-left:8px;transition:all 0.2s;">Hide</button></div>
      <div id="stripe-grid" style="display:grid;grid-template-columns:repeat(5,1fr);gap:14px;transition:filter 0.3s;"></div>

    <section class="fade-up delay-5">
      <div class="section-header" style="margin-bottom:0">Social Performance</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div id="last-refresh" style="font-family:var(--font-data);font-size:10px;color:var(--text-muted)"></div>
        <div style="display:flex;gap:8px">
<button id="refresh-btn" onclick="refreshAllData(true)" style="font-family:var(--font-data);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;background:hsla(264 65% 49% / 0.063);color:var(--primary);border:1px solid hsla(264 65% 49% / 0.145);padding:6px 14px;border-radius:6px;cursor:pointer;transition:all 0.2s">↻ Force Refresh</button>
        </div>

    <!-- SYSTEM HEALTH (full width) -->
    <section class="fade-up delay-6">

        <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
          <div style="font-family:var(--font-data);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim)">System Health</div>
          <div id="sys-host-label" style="font-family:var(--font-data);font-size:10px;color:var(--text-muted)"></div>
        </div>
        <div id="system-health" style="padding:16px"></div>

  </main>

  <!-- ── RIGHT FEED ────────────────────────────── -->
  <aside class="feed">
    <div class="feed-title"><span class="live-dot"></span> TASK FEED</div>
    <div id="task-feed-list"></div>
  </aside>

</div>

<script>
// ── DATE/TIME ──────────────────────────────────
function updateTime() {
  const now = new Date();
  document.getElementById('datetime').textContent =
    now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) +
    ' — ' + now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
updateTime();
setInterval(updateTime, 1000);

// ── BRAND TITLE ────────────────────────────────
fetch('/brand', { credentials: 'include' })
  .then(r => r.ok ? r.json() : null)
  .then(b => {
    if (!b || !b.company_name) return;
    const el = document.getElementById('header-title');
    if (el) el.textContent = String(b.company_name).toUpperCase() + ' COMMAND CENTER';
  })
  .catch(() => {});

// ── HELPERS ────────────────────────────────────
function sparkline(data, color) {
  const max = Math.max(...data);
  return data.map(v =>
    `<div class="sparkline-bar" style="height:${Math.max(8, (v/max)*100)}%;background:${color};opacity:${0.4 + (v/max)*0.6}"></div>`
  ).join('');
}
function fmtNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return String(n);
}

// ── CONFIG ─────────────────────────────────────
let YT_KEY = null;
async function loadYouTubeKey() {
  try {
    const res = await fetch('/youtube-key', { credentials: 'include' });
    if (!res.ok) return;
    const j = await res.json();
    YT_KEY = j.key || null;
  } catch {}
}

// ── BRANDS CONFIG (dynamic — built from /social/connections) ─────
let BRANDS = [];
const platformState = {};

async function loadBrandsFromConnections() {
  try {
    const res = await fetch('/social/connections', { credentials: 'include' });
    if (!res.ok) return;
    const { connections = [] } = await res.json();
    const brands = [];
    for (const c of connections) {
      if (c.platform === 'instagram' && c.username) {
        brands.push({
          name: (c.name || c.username).toUpperCase(),
          platforms: [{ type: 'ig', handle: c.username, label: 'Instagram' }]
        });
      } else if (c.platform === 'youtube' && c.handle) {
        brands.push({
          name: (c.name || c.handle.replace(/^@/, '')).toUpperCase(),
          platforms: [{ type: 'yt', handle: c.handle, label: 'YouTube' }]
        });
      }
    }
    BRANDS = brands;
    BRANDS.forEach(b => b.platforms.forEach(p => {
      const key = p.type + '_' + p.handle;
      platformState[key] = { followers: '—', engagement: '—', change: '', up: true, loading: true, label: p.type === 'yt' ? 'Subscribers' : 'Followers' };
    }));
  } catch (e) { console.error('[NL] Failed to load brands:', e); }
}

const PLATFORM_LABELS = { ig: 'Instagram', yt: 'YouTube' };

function renderSocialCards() {
  document.getElementById('social-grid').innerHTML = BRANDS.map(brand => {
    const platformData = brand.platforms.map(p => ({ ...p, state: platformState[p.type + '_' + p.handle] }));
    const totalFollowers = platformData.reduce((sum, p) => {
      const f = p.state?.followers;
      if (!f || f === '—' || f === 'Err') return sum;
      const num = parseFloat(f.replace(/[KMB]/g, m => ({ K: 'e3', M: 'e6', B: 'e9' }[m])));
      return sum + (isNaN(num) ? 0 : num);
    }, 0);

    return `<div class="brand-card">
      <div class="brand-header">
        <div class="brand-avatar">${brand.name[0]}</div>
        <div>
          <div class="brand-name">${brand.name}</div>
          <div class="brand-platforms-count">${brand.platforms.length} platform${brand.platforms.length > 1 ? 's' : ''}</div>
        </div>
        <div class="brand-total">
          <div class="brand-total-value">${totalFollowers > 0 ? fmtNum(totalFollowers) : '—'}</div>
          <div class="brand-total-label">Total Reach</div>
        </div>
      </div>
      <div class="brand-body">
        ${platformData.map(p => {
          const s = p.state;
          return `<div class="platform-row">
            <div class="platform-icon ${p.type}">${p.type.toUpperCase()}</div>
            ${s.loading
              ? `<span class="platform-loading">Fetching...</span>`
              : `<div class="platform-info">
                  <div class="platform-label">${PLATFORM_LABELS[p.type] || p.type}</div>
                  <div class="platform-metric-row">
                    <span class="platform-followers">${s.followers}</span>
                    ${s.engagement && s.engagement !== '—' ? `<span class="platform-eng">${s.engagement} eng</span>` : ''}
                  </div>
                </div>
                <span class="platform-change ${s.change ? (s.up ? 'up' : 'down') : 'neutral'}">${s.change || '—'}</span>`
            }
          </div>`;
        }).join('')}
      </div>
      <div class="brand-footer">
        <span class="brand-footer-stat"><span>${brand.platforms.length}</span> connected</span>
        <span class="brand-footer-stat">${platformData.some(p => p.state?.loading) ? '<span style="animation:pulse-glow 1.5s infinite">syncing</span>' : '<span>synced</span>'}</span>
      </div>
    </div>`;
  }).join('');
}

function showRefreshTime() {
  const ts = localStorage.getItem('ctrl_refresh_ts');
  const el = document.getElementById('last-refresh');
  if (ts && el) {
    const d = new Date(parseInt(ts));
    el.textContent = 'Last refresh: ' + d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
  }
}

function updatePlatform(type, handle, fields) {
  const key = type + '_' + handle;
  Object.assign(platformState[key], fields, { loading: false });
  renderSocialCards();
}

const CACHE_MAX_AGE = 24 * 60 * 60 * 1000; // 24 hours

function cacheSet(key, data) {
  localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data }));
}

function cacheGet(key) {
  const raw = localStorage.getItem(key);
  if (!raw) return null;
  try {
    const parsed = JSON.parse(raw);
    // Support old format (no ts wrapper) and new format
    if (parsed.ts && parsed.data) return parsed;
    // Old format: raw data, treat as expired so it refreshes once
    return { ts: 0, data: parsed };
  } catch { return null; }
}

function cacheIsFresh(key) {
  const entry = cacheGet(key);
  return entry && (Date.now() - entry.ts) < CACHE_MAX_AGE;
}

// ── INSTAGRAM FETCH (multi-profile, sequential) ──
async function fetchInstagram() {
  const handles = BRANDS.flatMap(b => b.platforms.filter(p => p.type === 'ig').map(p => p.handle));
  for (const h of handles) {
    try { await fetchInstagramProfile(h); } catch(e) { console.error('[NL] IG fetch error:', h, e); }
  }
}

async function fetchInstagramProfile(handle) {
  const cacheKey = 'ctrl_ig_' + handle;
  if (cacheIsFresh(cacheKey)) { console.log('[NL] IG cache fresh:', handle); applyInstagramProfile(cacheGet(cacheKey).data, handle); return; }

  try {
    const res = await fetch('/social/ig/stats?handle=' + encodeURIComponent(handle), { credentials: 'include' });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Niet gekoppeld');
    }
    const data = await res.json();
    cacheSet(cacheKey, data);
    applyInstagramProfile(data, handle);
  } catch(e) { updatePlatform('ig', handle, { followers: '—', engagement: '—', change: e.message, up: false }); }
}

function applyInstagramProfile(data, handle) {
  const followers = data.followersCount || 0;
  const posts = data.latestPosts || [];

  const totalEng = posts.reduce((a, p) => a + (p.likesCount || 0) + (p.commentsCount || 0), 0);
  const avgEng = posts.length > 0 && followers > 0
    ? ((totalEng / posts.length) / followers * 100).toFixed(1) + '%'
    : '—';
  const totalLikes = posts.reduce((a, p) => a + (p.likesCount || 0), 0);

  updatePlatform('ig', handle, {
    followers: followers ? fmtNum(followers) : '—',
    engagement: avgEng,
    change: fmtNum(totalLikes) + ' likes', up: true, label: 'Followers'
  });
}

// ── YOUTUBE FETCH (multi-profile) ─────────────
async function fetchYouTubeData() {
  const handles = BRANDS.flatMap(b => b.platforms.filter(p => p.type === 'yt').map(p => p.handle));
  for (const h of handles) {
    try { await fetchYouTubeProfile(h); } catch(e) { console.error('[NL] YT fetch error:', h, e); }
  }
}

async function fetchYouTubeProfile(handle) {
  const cacheKey = 'ctrl_yt_' + handle;
  if (cacheIsFresh(cacheKey)) {
    console.log('[NL] YT cache fresh:', handle);
    const yt = cacheGet(cacheKey).data;
    updatePlatform('yt', handle, { followers: fmtNum(yt.subs), engagement: yt.eng, change: fmtNum(yt.totalViews)+' views', up: true, label: 'Subscribers' });
    return;
  }
  if (!YT_KEY) {
    updatePlatform('yt', handle, { followers: '—', engagement: '—', change: 'YouTube API key not configured', up: false, label: 'Subscribers' });
    return;
  }
  try {
    const chRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&forHandle=${handle}&key=${YT_KEY}`);
    if (!chRes.ok) throw new Error(chRes.status === 403 ? 'API quota exceeded' : 'API error ' + chRes.status);
    const chData = await chRes.json();
    if (chData.error) throw new Error(chData.error.message?.substring(0, 40) || 'API error');
    if (!chData.items?.length) { updatePlatform('yt', handle, { followers: '—', change: 'Not found' }); return; }
    const ch = chData.items[0];
    const subs = parseInt(ch.statistics.subscriberCount) || 0;
    const totalVids = parseInt(ch.statistics.videoCount) || 0;
    if (totalVids === 0) { updatePlatform('yt', handle, { followers: fmtNum(subs), engagement: '—', change: 'No content yet', label: 'Subscribers' }); return; }

    const srRes = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${ch.id}&order=date&maxResults=10&type=video&key=${YT_KEY}`);
    const videoIds = ((await srRes.json()).items || []).map(i => i.id.videoId).filter(Boolean);
    if (!videoIds.length) { updatePlatform('yt', handle, { followers: fmtNum(subs), engagement: '—', change: totalVids+' videos', label: 'Subscribers' }); return; }

    const vRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${videoIds.join(',')}&key=${YT_KEY}`);
    const videos = (await vRes.json()).items || [];
    const views = videos.map(v => parseInt(v.statistics.viewCount) || 0);
    const likes = videos.map(v => parseInt(v.statistics.likeCount) || 0);
    const comments = videos.map(v => parseInt(v.statistics.commentCount) || 0);
    const totalViews = views.reduce((a,b) => a+b, 0);
    const totalEng = likes.reduce((a,b) => a+b, 0) + comments.reduce((a,b) => a+b, 0);
    const eng = totalViews > 0 ? (totalEng / totalViews * 100).toFixed(1) + '%' : '—';

    cacheSet(cacheKey, { subs, totalViews, eng });
    updatePlatform('yt', handle, { followers: fmtNum(subs), engagement: eng, change: fmtNum(totalViews)+' views', up: true, label: 'Subscribers' });
  } catch(e) { updatePlatform('yt', handle, { followers: 'Err', engagement: '—', change: e.message, up: false }); }
}

function sysLineChart(values, color, { height = 54, max = null, fill = true } = {}) {
  const vals = (values && values.length) ? values : [0];
  const w = 100, h = height;
  const mx = max !== null ? max : Math.max(1, ...vals);
  const pts = vals.map((v, i) => {
    const x = vals.length > 1 ? (i / (vals.length - 1)) * w : w / 2;
    const y = h - (v / mx) * (h - 4) - 2;
    return x.toFixed(2) + ',' + y.toFixed(2);
  }).join(' ');
  const fillPts = vals.length > 1 ? `${0},${h} ${pts} ${w},${h}` : `${0},${h} ${pts} ${w},${h}`;
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block">
    ${fill ? `<polygon points="${fillPts}" fill="${color}" opacity="0.12"/>` : ''}
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.3" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
  </svg>`;
}

function fmtBytes(n) {
  if (!n) return '0 B';
  const u = ['B','KB','MB','GB'];
  let i = 0; while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
  return n.toFixed(i === 0 ? 0 : 1) + ' ' + u[i];
}

function statTile({ label, value, sub, color = 'var(--text)', chart = '', accent = 'var(--primary)' }) {
  return `<div style="background:hsl(0 0% 4%);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:6px;min-height:110px">
    <div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px">
      <div style="font-family:var(--font-data);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim)">${label}</div>
      <div style="font-size:10px;color:var(--text-muted);font-family:var(--font-data)">${sub || ''}</div>
    </div>
    <div style="font-family:var(--font-data);font-size:22px;font-weight:600;color:${color};letter-spacing:-0.01em">${value}</div>
    <div style="margin-top:auto">${chart}</div>
  </div>`;
}

function pctColor(p) {
  return p > 85 ? 'var(--danger)' : p > 70 ? 'var(--warning)' : 'var(--success)';
}

    ];

      </div>`;
    }).join('') : '<div style="padding:14px;color:var(--text-dim);font-size:11px">No services reported</div>';

    const procsHtml = (health.top_processes || []).length ? health.top_processes.map(p => `

      </div>`).join('') : '<div style="padding:14px;color:var(--text-dim);font-size:11px">No process data</div>';

    el.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">${tilesTop.join('')}</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px">${tilesBottom.join('')}</div>

          <div style="padding:10px 12px;font-family:var(--font-data);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 60px 60px;gap:8px">

          </div>
          ${procsHtml}
        </div>
      </div>`;
  } catch (e) {
    el.innerHTML = '<div style="color:var(--danger);font-size:11px">Could not load health data</div>';
  }
}

    if (a.isCommunity) {
      const nowMs = Date.now();
      const drafts = communityTasks.filter(t => t.status === 'draft').length;
      const scheduled = communityTasks.filter(t => t.status === 'scheduled').length;
      const published = communityTasks.filter(t => t.status === 'published').length;
      const failed = communityTasks.filter(t => t.status === 'failed').length;
      const firingSoon = communityTasks.some(t => {
        if (t.status !== 'scheduled') return false;
        const when = Date.parse(t.scheduled_at || '');
        return isFinite(when) && when - nowMs <= 15*60*1000 && when - nowMs > -60*1000;
      });
      const nextPost = communityTasks
        .filter(t => t.status === 'scheduled' && Date.parse(t.scheduled_at || '') > nowMs)
        .sort((x, y) => Date.parse(x.scheduled_at) - Date.parse(y.scheduled_at))[0];
      const status = firingSoon ? 'running' : (scheduled > 0 || drafts > 0) ? 'queued' : 'idle';
      const statusText = firingSoon ? 'Publishing soon…'
        : nextPost ? `Next: ${fmtTaskTime(nextPost.scheduled_at)}`
        : scheduled > 0 ? `${scheduled} scheduled`
        : drafts > 0 ? `${drafts} draft(s) awaiting review`
        : 'No posts queued';
      return `<div class="agent-card ${status === 'running' ? 'is-running' : ''}" style="--agent-glow: hsla(${a.hsl} / 0.4); --agent-color: ${a.color}">
        <div class="agent-card-header">
          <div class="agent-avatar"><div class="agent-avatar-bg" style="background:${a.color}"></div><span style="position:relative;z-index:1">${a.emoji}</span></div>
          <div class="agent-header-info"><div class="agent-name">${a.name}</div><div class="agent-role">${a.role}</div></div>
          <span class="agent-status ${status}">${status}</span>
        </div>
        <div class="agent-card-body">
          <div style="display:flex;gap:12px;margin-bottom:8px;font-family:var(--font-data);font-size:11px;">
            <span style="color:var(--text-dim)">${drafts} draft</span>
            <span style="color:var(--warning)">${scheduled} scheduled</span>
            <span style="color:var(--success)">${published} published</span>
            ${failed ? '<span style="color:var(--danger)">'+failed+' failed</span>' : ''}
          </div>
          <div class="agent-task">${statusText}</div>
        </div>
        <div class="agent-card-footer">
          <span class="agent-footer-label">channels <span>${communityChannels.length}</span></span>
          <a href="community-manager.html" style="font-family:var(--font-data);font-size:10px;color:var(--primary);text-decoration:none;">Open</a>
        </div>
      </div>`;
    }

    const tc = taskCounts[a.name] || { pending: 0, processing: 0, completed: 0 };
    const status = tc.processing > 0 ? 'running' : tc.pending > 0 ? 'queued' : tc.completed > 0 ? 'idle' : 'idle';
    const statusText = tc.processing > 0 ? `Processing ${tc.processing}` : tc.pending > 0 ? `${tc.pending} pending` : 'Awaiting assignment';

    return `<div class="agent-card ${status === 'running' ? 'is-running' : ''}" style="--agent-glow: hsla(${a.hsl} / 0.4); --agent-color: ${a.color}">
      <div class="agent-card-header">
        <div class="agent-avatar"><div class="agent-avatar-bg" style="background:${a.color}"></div><span style="position:relative;z-index:1">${a.emoji}</span></div>
        <div class="agent-header-info"><div class="agent-name">${a.name}</div><div class="agent-role">${a.role}</div></div>
        <span class="agent-status ${status}">${status}</span>
      </div>
      <div class="agent-card-body">
        <div style="display:flex;gap:12px;margin-bottom:8px;font-family:var(--font-data);font-size:11px;">
          <span style="color:var(--warning)">${tc.pending} pending</span>
          <span style="color:var(--primary)">${tc.processing} active</span>
          <span style="color:var(--success)">${tc.completed} done</span>
        </div>
        <div class="agent-task">${statusText}</div>
      </div>
      <div class="agent-card-footer">
        <span class="agent-footer-label"><span>${tc.pending + tc.processing + tc.completed}</span> total tasks</span>
        <span class="agent-footer-label">status <span>${status}</span></span>
      </div>
    </div>`;
  }).join('');
}
renderAiTeam();
setInterval(renderAiTeam, 10000);

// ── AGENT TASK FEED (right sidebar) ────────────
const TASK_FEED_SOURCES = [
  { api: '/avatar/tasks',       agent: 'CONTENT',  subtype: 'AVATAR',     color: 'hsl(180 70% 45%)' },
  { api: '/video-agent/tasks',  agent: 'CONTENT',  subtype: 'VIDEO AGENT',color: 'hsl(180 70% 45%)' },
  { api: '/scriptwriter/tasks', agent: 'SCRIPT',   subtype: 'SCRIPT',     color: 'hsl(30 90% 55%)' },
  { api: '/designer/tasks',     agent: 'DESIGN',   subtype: 'DESIGN',     color: 'var(--warning)' },
  { api: '/video/tasks',        agent: 'VIDEO',    subtype: 'REMOTION',   color: 'var(--danger)' },
  { api: '/video/ai-generate',  agent: 'VIDEO',    subtype: 'AI GEN',     color: 'var(--danger)' },
  { api: '/research/tasks',     agent: 'RESEARCH', subtype: 'RESEARCH',   color: 'var(--accent)' },
];

function fmtTaskTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  const diff = Date.now() - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return d.toLocaleString('nl-NL', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function escTask(s) {
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

async function loadTaskFeed() {
  const el = document.getElementById('task-feed-list');
  if (!el) return;
  const all = [];
  await Promise.all(TASK_FEED_SOURCES.map(async src => {
    try {
      const tasks = await (await fetch(src.api)).json();
      if (Array.isArray(tasks)) {
        tasks.forEach(t => all.push({
          ...t,
          _agent: src.agent,
          _subtype: src.subtype,
          _color: src.color,
          _desc: t.description || t.topic || t.query || t.prompt || t.design_type || '-',
        }));
      }
    } catch {}
  }));

  all.sort((a, b) => {
    const order = { processing: 0, pending: 1, completed: 2, failed: 3, cancelled: 4 };
    const oa = order[a.status] ?? 5, ob = order[b.status] ?? 5;
    if (oa !== ob) return oa - ob;
    return new Date(b.created_at) - new Date(a.created_at);
  });

  const list = all.slice(0, 25);
  if (!list.length) {
    el.innerHTML = '<div style="color:var(--text-dim);font-size:11px;padding:12px 0">No tasks yet</div>';
    return;
  }
  el.innerHTML = list.map(t => `
    <div class="task-feed-row is-${t.status}">
      <div class="task-feed-meta">
        <span class="task-feed-tag" style="color:${t._color};background:${t._color}15">${t._subtype}</span>
        <span class="task-feed-time">${fmtTaskTime(t.created_at)}</span>
      </div>
      <div class="task-feed-desc">${escTask(t._desc)}</div>
      <div class="task-feed-status" style="color:${t._color}">${t.status}</div>
    </div>
  `).join('');
}
loadTaskFeed();
setInterval(loadTaskFeed, 10000);

// ── MOBILE NAVIGATION ─────────────────────────
function toggleSidebar() {
  // Only used on tablet (≤1024 & >768) — on mobile sidebar is bottom bar
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('mobile-overlay');
  const feed = document.querySelector('.feed');
  feed.classList.remove('open');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('visible', sidebar.classList.contains('open'));
}
function toggleFeed() {
  const feed = document.querySelector('.feed');
  const overlay = document.getElementById('mobile-overlay');
  const sidebar = document.querySelector('.sidebar');
  sidebar.classList.remove('open');
  feed.classList.toggle('open');
  overlay.classList.toggle('visible', feed.classList.contains('open'));
}
function closeAllMobile() {
  document.querySelector('.sidebar').classList.remove('open');
  document.querySelector('.feed').classList.remove('open');
  document.getElementById('mobile-overlay').classList.remove('visible');
}
// Close panels on resize back to desktop
window.addEventListener('resize', function() {
  if (window.innerWidth > 1024) closeAllMobile();
});
