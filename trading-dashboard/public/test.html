<!DOCTYPE html>
<html><body>
<h1>Dashboard Test</h1>
<p id="out">Loading...</p>
<script>
try {
  const ws = new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host);
  ws.onopen = () => document.getElementById('out').textContent = 'WebSocket OK!';
  ws.onerror = () => document.getElementById('out').textContent = 'WebSocket FAILED';
} catch(e) {
  document.getElementById('out').textContent = 'Error: ' + e.message;
}
</script>
</body></html>
